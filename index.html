<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShiftPro</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Heebo,sans-serif}
body{background:#0F172A;color:#E2E8F0;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}
.hidden{display:none !important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1E293B}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;background:#060B14}
.login-wrap::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:48px 48px;z-index:0}
.login-wrap::after{content:"";position:absolute;top:-20%;right:-10%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.login-card{width:100%;max-width:460px;background:rgba(15,23,42,0.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:40px;box-shadow:0 32px 80px rgba(0,0,0,0.5);position:relative;z-index:1}
.logo-box{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 8px 24px rgba(59,130,246,0.3)}
.logo-name{font-weight:900;font-size:18px;color:#F1F5F9}
.logo-sub{font-size:11px;color:#475569;margin-top:2px}
h1{font-weight:800;font-size:24px;color:#F1F5F9;letter-spacing:-0.5px;margin-bottom:6px}
.subtitle{font-size:13px;color:#475569;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#64748B;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
.field input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 16px;color:#F1F5F9;font-size:14px;outline:none;transition:all 0.2s}
.field input:focus{background:rgba(59,130,246,0.06);border-color:rgba(59,130,246,0.5)}
.btn-primary{width:100%;padding:14px 0;background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;border-radius:14px;color:white;font-weight:800;font-size:15px;box-shadow:0 8px 24px rgba(59,130,246,0.3);margin-top:8px}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.switch-link{text-align:center;margin-top:20px;font-size:13px;color:#475569}
.switch-link a{color:#60A5FA;font-weight:700;text-decoration:none;cursor:pointer}
.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:12px;padding:12px 16px;color:#FCA5A5;font-size:13px;margin-bottom:12px}

/* APP */
.app{min-height:100vh;background:#0F172A}
.header{background:linear-gradient(135deg,#1E293B,#0F172A);border-bottom:1px solid #1E3A5F;padding:0 20px;position:sticky;top:0;z-index:40}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:10px}
.nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:7px 12px;border-radius:8px;border:none;background:transparent;color:#94A3B8;font-weight:600;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:5px;position:relative}
.nav-btn.active{background:#3B82F6;color:white}
.nav-btn .badge{background:#EF4444;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
.user-info{display:flex;align-items:center;gap:10px}
.user-name{font-size:13px;font-weight:700;color:#E2E8F0}
.user-role{font-size:11px;color:#64748B}
.btn-logout{background:#1E293B;border:1px solid #334155;color:#64748B;border-radius:8px;padding:6px 12px;font-weight:600;font-size:12px}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}

.card{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:16px}
.card h2{font-weight:800;font-size:20px;color:#E2E8F0;margin-bottom:12px}
.card-title{font-weight:700;font-size:14px;color:#E2E8F0;margin-bottom:14px}

.grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:16px}
.kpi-icon{font-size:22px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:900;line-height:1}
.kpi-label{font-size:11px;font-weight:700;color:#94A3B8;margin-top:4px}
.kpi-sub{font-size:10px;color:#475569;margin-top:2px}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.quick-btn{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:18px 16px;text-align:right;position:relative}
.quick-btn .q-icon{font-size:28px;margin-bottom:8px}
.quick-btn .q-label{font-weight:700;font-size:14px;color:#E2E8F0}
.quick-btn .q-sub{font-size:11px;color:#64748B;margin-top:3px}

table{width:100%;border-collapse:collapse}
th{text-align:right;padding:10px;font-size:12px;color:#64748B;font-weight:600;border-bottom:1px solid #334155}
td{padding:10px;border-bottom:1px solid #0F172A;font-size:13px}

.btn-add{background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;color:white;border-radius:10px;padding:10px 20px;font-weight:700;font-size:14px}
.btn-danger{background:#EF444422;border:1px solid #EF444444;color:#EF4444;border-radius:8px;padding:6px 12px;font-weight:700;font-size:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-input{width:100%;background:#0F172A;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#E2E8F0;font-size:13px;outline:none}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10B981;color:white;padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999}
.toast.err{background:#EF4444}

.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.loading-logo{font-size:48px;margin-bottom:12px}

@media (max-width: 640px) {
  .btn-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .header-inner .user-info .user-name,.header-inner .user-info .user-role{display:none}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG — הכנס כאן את פרטי Supabase שלך
// ══════════════════════════════════════════════════════
const SUPABASE_URL = "https://zszlqoisokjgvplrcbic.supabase.co";
const SUPABASE_KEY = "sb_publishable_b6ZEtYrgGIQT8WxkahGzZg_iHTYMasi";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let state = {
  view: "login",    // login | loading | home | schedule | employees | vacations
  user: null,
  profile: null,
  business: null,
  employees: [],
  vacations: [],
  schedule: {},
  toast: null,
};

const DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const SHIFTS = [
  { id:"morning",   label:"בוקר",   hours:"07:00-15:00", color:"#F59E0B" },
  { id:"afternoon", label:"צהריים", hours:"15:00-23:00", color:"#10B981" },
  { id:"night",     label:"לילה",   hours:"23:00-07:00", color:"#6366F1" },
];

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function $(id) { return document.getElementById(id); }
function e(tag, props = {}, children = []) {
  const el = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if (k === "class") el.className = v;
    else if (k === "onclick") el.onclick = v;
    else if (k === "onsubmit") el.onsubmit = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === "string" || typeof c === "number") el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}
function showToast(msg, type = "success") {
  state.toast = { msg, type };
  render();
  setTimeout(() => { state.toast = null; render(); }, 3000);
}
function today() { return new Date().toISOString().split("T")[0]; }
function getWeekDates(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset*7 - d.getDay());
  return Array.from({length:7}, (_,i) => {
    const x = new Date(d); x.setDate(d.getDate()+i); return x.toISOString().split("T")[0];
  });
}

// ══════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════
async function checkAuth() {
  state.view = "loading";
  render();
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) { state.view = "login"; render(); return; }
  await loadUserData(session.user);
}

async function loadUserData(user) {
  state.user = user;
  const { data: profile } = await sb.from("profiles")
    .select("*, business:businesses(*)")
    .eq("id", user.id).single();
  if (!profile) { state.view = "login"; render(); return; }
  state.profile = profile;
  state.business = profile.business;
  await loadEmployees();
  await loadVacations();
  state.view = "home";
  render();
}

async function loadEmployees() {
  if (!state.profile?.business_id) return;
  const { data } = await sb.from("profiles")
    .select("*").eq("business_id", state.profile.business_id)
    .eq("is_deleted", false).order("name");
  state.employees = data || [];
}

async function loadVacations() {
  if (!state.profile?.business_id) return;
  const empIds = state.employees.map(e => e.id);
  if (empIds.length === 0) { state.vacations = []; return; }
  const { data } = await sb.from("vacations").select("*").in("employee_id", empIds);
  state.vacations = data || [];
}

async function handleLogin(email, password) {
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  const { data: { user } } = await sb.auth.getUser();
  await loadUserData(user);
}

async function handleRegister(name, businessName, email, password) {
  // Create user
  const { data: authData, error: authErr } = await sb.auth.signUp({
    email, password,
    options: { data: { name } }
  });
  if (authErr) throw authErr;

  // Create business
  const { data: biz, error: bizErr } = await sb.from("businesses")
    .insert({ name: businessName, owner_id: authData.user.id })
    .select().single();
  if (bizErr) throw bizErr;

  // Update profile to link business & set as admin
  await sb.from("profiles").update({
    business_id: biz.id, role: "admin", name
  }).eq("id", authData.user.id);

  await loadUserData(authData.user);
}

async function handleLogout() {
  await sb.auth.signOut();
  state = { view: "login", user: null, profile: null, business: null, employees: [], vacations: [], schedule: {}, toast: null };
  render();
}

// ══════════════════════════════════════════════════════
// EMPLOYEE ACTIONS
// ══════════════════════════════════════════════════════
async function addEmployee(data) {
  const { error } = await sb.from("profiles").insert({
    id: crypto.randomUUID(),
    name: data.name,
    email: data.email,
    phone: data.phone || null,
    id_number: data.idNumber || null,
    role: data.role || "employee",
    business_id: state.profile.business_id,
    max_shifts_per_week: 5,
  });
  if (error) { showToast("שגיאה: " + error.message, "err"); return; }
  await loadEmployees();
  showToast("עובד נוסף ✓");
  render();
}

async function deleteEmployee(id) {
  if (!confirm("למחוק את העובד לצמיתות?")) return;
  await sb.from("profiles").update({ is_deleted: true }).eq("id", id);
  await loadEmployees();
  showToast("עובד נמחק", "err");
  render();
}

async function addVacation(data) {
  const { error } = await sb.from("vacations").insert({
    employee_id: data.employeeId,
    start_date: data.startDate,
    end_date: data.endDate,
    reason: data.reason || null,
    status: "pending"
  });
  if (error) { showToast("שגיאה: " + error.message, "err"); return; }
  await loadVacations();
  showToast("בקשת חופשה נרשמה ✓");
  render();
}

async function updateVacationStatus(id, status) {
  await sb.from("vacations").update({ status }).eq("id", id);
  await loadVacations();
  showToast(status === "approved" ? "חופשה אושרה ✓" : "חופשה נדחתה");
  render();
}

// ══════════════════════════════════════════════════════
// VIEWS — LOGIN
// ══════════════════════════════════════════════════════
function viewLoading() {
  return e("div", { class:"loading" }, [
    e("div", { class:"loading-logo" }, "📅"),
    e("div", { style:"font-weight:800;color:#E2E8F0;font-size:20px" }, "ShiftPro"),
    e("div", { style:"color:#64748B;font-size:14px" }, "טוען...")
  ]);
}

let loginMode = "login"; // login | register

function viewLogin() {
  const isRegister = loginMode === "register";
  const wrap = e("div", { class:"login-wrap" });
  const card = e("div", { class:"login-card" });

  // Logo
  card.appendChild(e("div", { class:"logo-box" }, [
    e("div", { class:"logo-icon" }, "📅"),
    e("div", {}, [
      e("div", { class:"logo-name" }, "ShiftPro"),
      e("div", { class:"logo-sub" }, "מערכת ניהול משמרות")
    ])
  ]));

  card.appendChild(e("h1", {}, isRegister ? "הרשמה חינם" : "ברוך הבא"));
  card.appendChild(e("p", { class:"subtitle" }, isRegister ? "צור חשבון למנהל ראשי" : "הכנס פרטים להמשך"));

  const errBox = e("div", { class:"err hidden", id:"err-box" });
  card.appendChild(errBox);

  const form = e("form", {
    onsubmit: async (ev) => {
      ev.preventDefault();
      const btn = form.querySelector("button[type=submit]");
      btn.disabled = true;
      errBox.classList.add("hidden");
      try {
        if (isRegister) {
          await handleRegister(
            form.querySelector('[name=name]').value,
            form.querySelector('[name=businessName]').value,
            form.querySelector('[name=email]').value,
            form.querySelector('[name=password]').value
          );
        } else {
          await handleLogin(
            form.querySelector('[name=email]').value,
            form.querySelector('[name=password]').value
          );
        }
      } catch (err) {
        errBox.textContent = "⚠️ " + (err.message || "שגיאה");
        errBox.classList.remove("hidden");
        btn.disabled = false;
      }
    }
  });

  if (isRegister) {
    form.appendChild(field("שם מלא", "name", "text", true, "ישראל ישראלי"));
    form.appendChild(field("שם העסק", "businessName", "text", true, "החברה שלי"));
  }
  form.appendChild(field("אימייל", "email", "email", true, "you@example.com"));
  form.appendChild(field("סיסמה", "password", "password", true, "••••••••"));

  form.appendChild(e("button", { type:"submit", class:"btn-primary" },
    isRegister ? "צור חשבון →" : "כניסה למערכת →"));

  card.appendChild(form);

  card.appendChild(e("div", { class:"switch-link" }, [
    isRegister ? "יש לך כבר חשבון? " : "עסק חדש? ",
    e("a", {
      onclick: () => { loginMode = isRegister ? "login" : "register"; render(); }
    }, isRegister ? "כניסה →" : "הרשמה חינם →")
  ]));

  wrap.appendChild(card);
  return wrap;
}

function field(label, name, type = "text", required = false, placeholder = "") {
  return e("div", { class:"field" }, [
    e("label", {}, label + (required ? " *" : "")),
    e("input", { name, type, required: required ? "required" : null, placeholder })
  ]);
}

// ══════════════════════════════════════════════════════
// VIEWS — APP
// ══════════════════════════════════════════════════════
function viewApp() {
  const app = e("div", { class:"app" });
  app.appendChild(viewHeader());
  const main = e("div", { class:"main" });

  if (state.view === "home") main.appendChild(viewHome());
  else if (state.view === "employees") main.appendChild(viewEmployees());
  else if (state.view === "vacations") main.appendChild(viewVacations());
  else if (state.view === "schedule") main.appendChild(viewSchedule());

  app.appendChild(main);
  return app;
}

function viewHeader() {
  const pendingVacs = state.vacations.filter(v => v.status === "pending").length;
  const tabs = [
    { id:"home",       icon:"🏠", label:"בית" },
    { id:"schedule",   icon:"📅", label:"סידור" },
    { id:"employees",  icon:"👥", label:"עובדים" },
    { id:"vacations",  icon:"🌴", label:"חופשות", badge: pendingVacs },
  ];

  return e("header", { class:"header" }, [
    e("div", { class:"header-inner" }, [
      e("div", { style:"display:flex;align-items:center;gap:10px" }, [
        e("div", { class:"logo-icon" }, "📅"),
        e("div", {}, [
          e("div", { style:"font-weight:900;font-size:15px;color:#E2E8F0" }, "ShiftPro"),
          e("div", { style:"font-size:11px;color:#64748B" }, state.business?.name || "")
        ])
      ]),
      e("div", { class:"nav" }, tabs.map(t =>
        e("button", {
          class: "nav-btn" + (state.view === t.id ? " active" : ""),
          onclick: () => { state.view = t.id; render(); }
        }, [
          t.icon + " " + t.label,
          t.badge > 0 ? e("span", { class:"badge" }, String(t.badge)) : null
        ])
      )),
      e("div", { class:"user-info" }, [
        e("div", {}, [
          e("div", { class:"user-name" }, state.profile?.name || ""),
          e("div", { class:"user-role" }, state.profile?.role === "admin" ? "מנהל ראשי" : "עובד")
        ]),
        e("button", { class:"btn-logout", onclick: handleLogout }, "יציאה")
      ])
    ])
  ]);
}

function viewHome() {
  const wrap = e("div");
  wrap.appendChild(e("div", { style:"margin-bottom:24px" }, [
    e("div", { style:"font-size:13px;color:#64748B" }, new Date().toLocaleDateString("he-IL", { weekday:"long", day:"numeric", month:"long" })),
    e("h1", { style:"font-weight:900;font-size:26px;margin-top:4px" }, `שלום ${(state.profile?.name || "").split(" ")[0]} 👋`)
  ]));

  const pendingVacs = state.vacations.filter(v => v.status === "pending").length;

  // KPI cards
  const kpis = [
    { icon:"👥", label:"עובדים", value: state.employees.length, color:"#3B82F6" },
    { icon:"🌴", label:"חופשות ממתינות", value: pendingVacs, color:"#F59E0B" },
    { icon:"📅", label:"משמרות/שבוע", value: SHIFTS.length * 7, color:"#10B981" },
    { icon:"✓", label:"סטטוס", value:"פעיל", color:"#10B981" },
  ];
  const kpiGrid = e("div", { class:"grid-kpi" });
  kpis.forEach(k => {
    kpiGrid.appendChild(e("div", { class:"kpi", style:`border-color:${k.color}33` }, [
      e("div", { class:"kpi-icon" }, k.icon),
      e("div", { class:"kpi-value", style:`color:${k.color}` }, String(k.value)),
      e("div", { class:"kpi-label" }, k.label)
    ]));
  });
  wrap.appendChild(kpiGrid);

  // Quick actions
  const quick = e("div", { class:"btn-grid" });
  [
    { icon:"👥", label:"עובדים", sub:"ניהול הצוות", view:"employees" },
    { icon:"🌴", label:"חופשות", sub:`${pendingVacs} ממתינות`, view:"vacations" },
    { icon:"📅", label:"סידור עבודה", sub:"שיבוץ השבוע", view:"schedule" },
    { icon:"⚙️", label:"הגדרות", sub:"בקרוב...", view:null },
  ].forEach(item => {
    quick.appendChild(e("button", {
      class:"quick-btn",
      onclick: () => { if (item.view) { state.view = item.view; render(); } }
    }, [
      e("div", { class:"q-icon" }, item.icon),
      e("div", { class:"q-label" }, item.label),
      e("div", { class:"q-sub" }, item.sub)
    ]));
  });
  wrap.appendChild(quick);

  return wrap;
}

function viewEmployees() {
  const wrap = e("div");

  wrap.appendChild(e("div", { style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px" }, [
    e("h2", { style:"font-weight:900;font-size:22px" }, "👥 עובדים"),
    e("button", {
      class:"btn-add",
      onclick: () => { showEmployeeForm(); }
    }, "+ הוסף עובד")
  ]));

  const formArea = e("div", { id:"emp-form-area" });
  wrap.appendChild(formArea);

  if (state.employees.length === 0) {
    wrap.appendChild(e("div", { class:"card", style:"text-align:center;padding:40px" }, [
      e("div", { style:"font-size:48px;margin-bottom:12px" }, "👥"),
      e("div", { style:"color:#64748B" }, "אין עובדים עדיין. לחץ על \"+ הוסף עובד\" להתחיל")
    ]));
  } else {
    const list = e("div", { class:"card" });
    const tbl = e("table");
    tbl.appendChild(e("thead", {}, [e("tr", {}, [
      e("th", {}, "שם"),
      e("th", {}, "אימייל"),
      e("th", {}, "תפקיד"),
      e("th", {}, "")
    ])]));
    const tbody = e("tbody");
    state.employees.forEach(emp => {
      tbody.appendChild(e("tr", {}, [
        e("td", { style:"font-weight:700" }, emp.name),
        e("td", { style:"color:#94A3B8" }, emp.email || "—"),
        e("td", {}, emp.role === "admin" ? "מנהל ראשי" : emp.role === "manager" ? "מנהל משמרת" : "עובד"),
        e("td", {}, e("button", {
          class:"btn-danger",
          onclick: () => deleteEmployee(emp.id)
        }, "🗑️ מחק"))
      ]));
    });
    tbl.appendChild(tbody);
    list.appendChild(tbl);
    wrap.appendChild(list);
  }

  return wrap;
}

function showEmployeeForm() {
  const area = $("emp-form-area");
  if (!area) return;
  if (area.innerHTML) { area.innerHTML = ""; return; }

  const card = e("div", { class:"card" });
  card.appendChild(e("div", { class:"card-title" }, "עובד חדש"));

  const form = e("form", {
    onsubmit: async (ev) => {
      ev.preventDefault();
      const d = {
        name: form.querySelector('[name=name]').value,
        email: form.querySelector('[name=email]').value,
        idNumber: form.querySelector('[name=idNumber]').value,
        role: form.querySelector('[name=role]').value,
      };
      await addEmployee(d);
      area.innerHTML = "";
    }
  });

  form.appendChild(e("div", { class:"form-row" }, [
    e("div", {}, [e("label", { style:"font-size:12px;color:#94A3B8;display:block;margin-bottom:4px" }, "שם מלא *"),
      e("input", { name:"name", required:"required", placeholder:"ישראל ישראלי", class:"form-input" })]),
    e("div", {}, [e("label", { style:"font-size:12px;color:#94A3B8;display:block;margin-bottom:4px" }, "אימייל *"),
      e("input", { name:"email", type:"email", required:"required", placeholder:"name@example.com", class:"form-input" })])
  ]));
  form.appendChild(e("div", { class:"form-row" }, [
    e("div", {}, [e("label", { style:"font-size:12px;color:#94A3B8;display:block;margin-bottom:4px" }, "תעודת זהות"),
      e("input", { name:"idNumber", placeholder:"000000000", class:"form-input" })]),
    e("div", {}, [e("label", { style:"font-size:12px;color:#94A3B8;display:block;margin-bottom:4px" }, "תפקיד"),
      e("select", { name:"role", class:"form-input" }, [
        e("option", { value:"employee" }, "עובד"),
        e("option", { value:"manager" }, "מנהל משמרת")
      ])])
  ]));
  form.appendChild(e("div", { style:"display:flex;gap:8px;margin-top:8px" }, [
    e("button", { type:"submit", class:"btn-primary", style:"flex:1" }, "שמור"),
    e("button", { type:"button", onclick: () => { area.innerHTML = ""; }, style:"background:#334155;border:none;color:#94A3B8;border-radius:10px;padding:11px 18px;font-weight:600" }, "ביטול")
  ]));

  card.appendChild(form);
  area.appendChild(card);
}

function viewVacations() {
  const wrap = e("div");

  wrap.appendChild(e("div", { style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px" }, [
    e("h2", { style:"font-weight:900;font-size:22px" }, "🌴 חופשות"),
    e("button", {
      class:"btn-add",
      onclick: () => { showVacationForm(); }
    }, "+ בקשת חופשה")
  ]));

  const formArea = e("div", { id:"vac-form-area" });
  wrap.appendChild(formArea);

  if (state.vacations.length === 0) {
    wrap.appendChild(e("div", { class:"card", style:"text-align:center;padding:40px" }, [
      e("div", { style:"font-size:48px;margin-bottom:12px" }, "🌴"),
      e("div", { style:"color:#64748B" }, "אין בקשות חופשה עדיין")
    ]));
  } else {
    const card = e("div", { class:"card" });
    const tbl = e("table");
    tbl.appendChild(e("thead", {}, [e("tr", {}, [
      e("th", {}, "עובד"),
      e("th", {}, "מתאריך"),
      e("th", {}, "עד"),
      e("th", {}, "סטטוס"),
      e("th", {}, "")
    ])]));
    const tbody = e("tbody");
    state.vacations.sort((a,b) => b.created_at.localeCompare(a.created_at)).forEach(vac => {
      const emp = state.employees.find(e => e.id === vac.employee_id);
      const statusColor = vac.status === "approved" ? "#10B981" : vac.status === "rejected" ? "#EF4444" : "#F59E0B";
      const statusLabel = vac.status === "approved" ? "אושרה ✓" : vac.status === "rejected" ? "נדחתה ✗" : "ממתין";
      tbody.appendChild(e("tr", {}, [
        e("td", { style:"font-weight:700" }, emp?.name || "—"),
        e("td", {}, vac.start_date),
        e("td", {}, vac.end_date),
        e("td", {}, e("span", { style:`color:${statusColor};font-weight:700;font-size:12px` }, statusLabel)),
        e("td", {}, vac.status === "pending" ? e("div", { style:"display:flex;gap:4px" }, [
          e("button", { style:"background:#10B98122;border:1px solid #10B98144;color:#10B981;border-radius:6px;padding:4px 10px;font-size:12px", onclick: () => updateVacationStatus(vac.id, "approved") }, "אשר"),
          e("button", { style:"background:#EF444422;border:1px solid #EF444444;color:#EF4444;border-radius:6px;padding:4px 10px;font-size:12px", onclick: () => updateVacationStatus(vac.id, "rejected") }, "דחה")
        ]) : "")
      ]));
    });
    tbl.appendChild(tbody);
    card.appendChild(tbl);
    wrap.appendChild(card);
  }

  return wrap;
}

function showVacationForm() {
  const area = $("vac-form-area");
  if (!area) return;
  if (area.innerHTML) { area.innerHTML = ""; return; }

  const card = e("div", { class:"card" });
  card.appendChild(e("div", { class:"card-title" }, "בקשת חופשה"));

  const form = e("form", {
    onsubmit: async (ev) => {
      ev.preventDefault();
      const d = {
        employeeId: form.querySelector('[name=employeeId]').value,
        startDate: form.querySelector('[name=startDate]').value,
        endDate: form.querySelector('[name=endDate]').value,
        reason: form.querySelector('[name=reason]').value,
      };
      await addVacation(d);
      area.innerHTML = "";
    }
  });

  const empSelect = e("select", { name:"employeeId", required:"required", class:"form-input" });
  state.employees.forEach(emp => empSelect.appendChild(e("option", { value: emp.id }, emp.name)));

  form.appendChild(e("div", {}, [
    e("label", { style:"font-size:12px;color:#94A3B8;display:block;margin-bottom:4px" }, "עובד *"),
    empSelect
  ]));
  form.appendChild(e("div", { class:"form-row", style:"margin-top:12px" }, [
    e("div", {}, [e("label", { style:"font-size:12px;color:#94A3B8;display:block;margin-bottom:4px" }, "מתאריך *"),
      e("input", { name:"startDate", type:"date", required:"required", min: today(), class:"form-input" })]),
    e("div", {}, [e("label", { style:"font-size:12px;color:#94A3B8;display:block;margin-bottom:4px" }, "עד *"),
      e("input", { name:"endDate", type:"date", required:"required", min: today(), class:"form-input" })])
  ]));
  form.appendChild(e("div", { style:"margin-top:12px" }, [
    e("label", { style:"font-size:12px;color:#94A3B8;display:block;margin-bottom:4px" }, "סיבה"),
    e("input", { name:"reason", placeholder:"אופציונלי", class:"form-input" })
  ]));
  form.appendChild(e("div", { style:"display:flex;gap:8px;margin-top:12px" }, [
    e("button", { type:"submit", class:"btn-primary", style:"flex:1" }, "שלח"),
    e("button", { type:"button", onclick: () => { area.innerHTML = ""; }, style:"background:#334155;border:none;color:#94A3B8;border-radius:10px;padding:11px 18px;font-weight:600" }, "ביטול")
  ]));

  card.appendChild(form);
  area.appendChild(card);
}

function viewSchedule() {
  const wrap = e("div");
  wrap.appendChild(e("h2", { style:"font-weight:900;font-size:22px;margin-bottom:16px" }, "📅 סידור שבועי"));

  const card = e("div", { class:"card" });
  const weekDates = getWeekDates(0);

  const tbl = e("table");
  const thead = e("thead");
  const hdrRow = e("tr", {}, [e("th", { style:"width:100px" }, "משמרת")]);
  weekDates.forEach((d, i) => {
    const dt = new Date(d);
    const isToday = d === today();
    hdrRow.appendChild(e("th", { style: isToday ? "color:#60A5FA" : "" }, [
      e("div", { style:"font-size:11px" }, DAYS[dt.getDay()]),
      e("div", { style:"font-size:16px;font-weight:800;color:#E2E8F0" }, String(dt.getDate()))
    ]));
  });
  thead.appendChild(hdrRow);
  tbl.appendChild(thead);

  const tbody = e("tbody");
  SHIFTS.forEach(shift => {
    const row = e("tr");
    row.appendChild(e("td", {}, [
      e("div", { style:`font-weight:700;color:${shift.color}` }, shift.label),
      e("div", { style:"font-size:11px;color:#475569" }, shift.hours)
    ]));
    weekDates.forEach(d => {
      row.appendChild(e("td", { style:"text-align:center" }, 
        e("div", { style:"font-size:10px;color:#334155" }, "—")
      ));
    });
    tbody.appendChild(row);
  });
  tbl.appendChild(tbody);
  card.appendChild(tbl);
  wrap.appendChild(card);

  wrap.appendChild(e("div", { class:"card", style:"text-align:center;color:#64748B;font-size:13px" },
    "שיבוץ אוטומטי ותכונות מתקדמות יתווספו בגרסה הבאה"
  ));

  return wrap;
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render() {
  const app = $("app");
  app.innerHTML = "";

  if (state.view === "loading") app.appendChild(viewLoading());
  else if (state.view === "login") app.appendChild(viewLogin());
  else app.appendChild(viewApp());

  if (state.toast) {
    app.appendChild(e("div", { class:"toast" + (state.toast.type === "err" ? " err" : "") }, state.toast.msg));
  }
}

// INIT
checkAuth();
</script>
