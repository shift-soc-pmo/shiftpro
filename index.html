<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shift SOC PMO</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Heebo,sans-serif}
body{background:#0F172A;color:#E2E8F0;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
.hidden{display:none !important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1E293B}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#060B14}
.login-card{width:100%;max-width:460px;background:rgba(15,23,42,0.85);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:40px}
.logo-box{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;font-size:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#64748B;margin-bottom:7px}
.field input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 16px;color:#F1F5F9}
.btn-primary{width:100%;padding:14px 0;background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;border-radius:14px;color:white;font-weight:800}
.header{background:#1E293B;border-bottom:1px solid #334155;padding:0 20px;height:60px;position:sticky;top:0;z-index:40}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:100%}
.nav{display:flex;gap:4px}
.nav-btn{padding:7px 11px;border-radius:8px;border:none;background:transparent;color:#94A3B8;font-weight:600;font-size:12px}
.nav-btn.active{background:#3B82F6;color:white}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:14px}
.page-title{font-weight:900;font-size:22px;margin-bottom:16px}
.sched-table{width:100%;border-collapse:collapse}
.sched-table th{padding:10px;font-size:11px;color:#64748B;border-bottom:1px solid #334155}
.sched-table td{padding:8px;text-align:center;border:1px solid #0F172A}
.emp-chip{display:inline-flex;align-items:center;gap:4px;border-radius:7px;padding:3px 8px;margin:2px;font-size:11px;font-weight:600}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10B981;color:white;padding:12px 24px;border-radius:12px;z-index:9999}
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1E293B;border-top:1px solid #334155;height:60px}
@media(max-width:768px){.mobile-bottom-nav{display:flex}.header .nav{display:none}}
</style>
</head>
<body>
<div id="app"></div>

<script>
const SUPABASE_URL = "https://zszlqoisokjgvplrcbic.supabase.co";
const SUPABASE_KEY = "sb_publishable_b6ZEtYrgGIQT8WxkahGzZg_iHTYMasi";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const SHIFTS = [
  { id:"morning",   label:"בוקר",   start:"07:00", end:"15:00", color:"#F59E0B" },
  { id:"afternoon", label:"צהריים", start:"15:00", end:"23:00", color:"#10B981" },
  { id:"night",     label:"לילה",   start:"23:00", end:"07:00", color:"#6366F1" },
];
const SHIFT_BY_ID = Object.fromEntries(SHIFTS.map(s=>[s.id,s]));

let S = {
  view: "loading", user: null, profile: null, business: null,
  employees: [], vacations: [], swapRequests: [], assignments: [],
  schedule: {}, publishedWeeks: new Set(), weekOffset: 0,
  customHours: {}, selectedCell: null, toast: null
};

const $ = id => document.getElementById(id);
function e(tag, props={}, children=[]) {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(props)){
    if(k==="class") el.className=v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  if(!Array.isArray(children)) children = [children];
  children.forEach(c => {
    if(c) el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}
function div(cls,children=[],extra={}) { return e("div",{class:cls,...extra},children); }
function btn(cls,txt,onclick,extra={}) { return e("button",{class:cls,...extra,onclick},txt); }

function toast(msg) { S.toast={msg}; render(); setTimeout(()=>{S.toast=null;render();},3000); }
function today() { return new Date().toISOString().split("T")[0]; }
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("he-IL"); }
function getEmp(id) { return S.employees.find(e=>e.id===id); }
function empIdx(id) { return S.employees.findIndex(e=>e.id===id); }
const ec = (idx) => ["#3B82F6","#EC4899","#14B8A6","#F97316","#8B5CF6"][idx % 5];

function getWeekDates(offset=0) {
  const d=new Date();
  const dow=d.getDay();
  d.setDate(d.getDate()-dow+offset*7);
  return Array.from({length:7},(_,i)=>{
    const x=new Date(d); x.setDate(d.getDate()+i);
    return x.toISOString().split("T")[0];
  });
}

async function loadAll(user) {
  S.user = user;
  const { data: profile } = await sb.from("profiles").select("*, business:businesses(*)").eq("id", user.id).maybeSingle();
  if (!profile) { S.view="login"; render(); return; }
  S.profile = profile;
  S.business = profile.business;
  await Promise.all([loadEmployees(), loadVacations(), loadSwapRequests(), loadSchedule()]);
  S.view = S.profile.role === "employee" ? "empview" : "home";
  render();
}

async function loadEmployees() {
  const { data } = await sb.from("profiles").select("*").eq("business_id", S.profile.business_id).eq("is_deleted", false);
  S.employees = data || [];
}

async function loadVacations() {
  const { data } = await sb.from("vacations").select("*").in("employee_id", S.employees.map(e=>e.id));
  S.vacations = data || [];
}

async function loadSwapRequests() {
  const { data } = await sb.from("swap_requests").select("*").eq("business_id", S.profile.business_id);
  S.swapRequests = data || [];
}

async function loadSchedule() {
  const weekStart = getWeekDates(S.weekOffset)[0];
  const { data: sched } = await sb.from("schedules").select("*").eq("business_id", S.profile.business_id).eq("week_start", weekStart).maybeSingle();
  if (sched) {
    S.schedule = sched;
    const { data: asgn } = await sb.from("assignments").select("*").eq("schedule_id", sched.id);
    S.assignments = asgn || [];
  } else { S.assignments = []; }
}

async function updateSwapStatus(id, status) {
  const { error } = await sb.from("swap_requests").update({ status }).eq("id", id);
  const sw = S.swapRequests.find(s => s.id === id);
  if (status === "approved" && sw) {
     await sb.from("assignments").update({ employee_id: sw.requester_id }).match({ date: sw.target_date, shift: sw.target_shift, schedule_id: sw.schedule_id });
  }
  await loadSchedule();
  await loadSwapRequests();
  toast("עודכן בהצלחה");
  render();
}

function viewSchedule() {
  const wd = getWeekDates(S.weekOffset);
  const wrap = div("");
  wrap.appendChild(div("page-title", ["סידור שבועי"]));
  const tbl = e("table", {class:"sched-table"});
  const tbody = e("tbody");
  SHIFTS.forEach(sh => {
    const tr = e("tr");
    tr.appendChild(e("td", {style:"color:"+sh.color}, sh.label));
    wd.forEach(date => {
      const emps = S.assignments.filter(a => a.date === date && a.shift === sh.id);
      const td = e("td");
      emps.forEach(as => {
        const emp = getEmp(as.employee_id);
        if(emp) td.appendChild(div("emp-chip", [emp.name], {style:"background:"+sh.color+"22;color:"+sh.color}));
      });
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(div("card", [tbl]));
  return wrap;
}

function viewHeader() {
  return e("header", {class:"header"}, [div("header-inner", [
    div("", ["📅 Shift SOC"]),
    btn("","יציאה", () => sb.auth.signOut().then(()=>location.reload()))
  ])]);
}

function render() {
  const app = $("app"); app.innerHTML = "";
  if (S.view === "loading") { app.appendChild(div("main", ["טוען..."])); return; }
  if (S.view === "login") { app.appendChild(div("login-wrap", [div("login-card", [btn("btn-primary", "התחבר עם גוגל", () => sb.auth.signInWithOAuth({provider:'google'}))])])); return; }
  
  app.appendChild(viewHeader());
  const main = div("main");
  if (S.view === "home" || S.view === "schedule") main.appendChild(viewSchedule());
  if (S.view === "swaps") {
     const card = div("card", [div("", "בקשות חילוף ממתינות")]);
     S.swapRequests.filter(r=>r.status==="pending_manager").forEach(r => {
        card.appendChild(div("", [getEmp(r.requester_id)?.name + " מבקש חילוף ב-" + r.target_date, btn("","אשר",()=>updateSwapStatus(r.id,"approved"))]));
     });
     main.appendChild(card);
  }
  app.appendChild(main);
  if(S.toast) app.appendChild(div("toast", [S.toast.msg]));
  
  const bnav = div("mobile-bottom-nav");
  [["home","🏠"],["swaps","🔄"]].forEach(([v,i]) => bnav.appendChild(btn("",i,()=>{S.view=v;render();})));
  app.appendChild(bnav);
}

async function startApp() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await loadAll(session.user);
  else { S.view = "login"; render(); }
}
startApp();
</script>
</body>
</html>
