<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shift SOC PMO</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* --- עיצוב מקורי מלא ומסונכרן --- */
*{box-sizing:border-box;margin:0;padding:0;font-family:Heebo,sans-serif}
body{background:#0F172A;color:#E2E8F0;min-height:100vh}
button{cursor:pointer;font-family:inherit}
.hidden{display:none !important}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#060B14}
.login-card{width:100%;max-width:460px;background:rgba(15,23,42,0.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:40px;box-shadow:0 32px 80px rgba(0,0,0,0.5)}
.logo-box{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-weight:900;font-size:18px;color:#F1F5F9}
.login-h1{font-weight:800;font-size:24px;margin-bottom:6px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#64748B;margin-bottom:7px;text-transform:uppercase}
.field input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 16px;color:#F1F5F9;outline:none}
.btn-primary{width:100%;padding:14px 0;background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;border-radius:14px;color:white;font-weight:800;font-size:15px}

/* HEADER & NAV */
.header{background:linear-gradient(135deg,#1E293B,#0F172A);border-bottom:1px solid #1E3A5F;padding:0 20px;position:sticky;top:0;z-index:40;height:60px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:100%}
.nav{display:flex;gap:4px;overflow-x:auto}
.nav-btn{padding:7px 11px;border-radius:8px;border:none;background:transparent;color:#94A3B8;font-weight:600;font-size:12px;white-space:nowrap}
.nav-btn.active{background:#3B82F6;color:white}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:14px}
.page-title{font-weight:900;font-size:22px;color:#E2E8F0;margin-bottom:16px}

/* SCHEDULE TABLE - FIX ALIGNMENT */
.sched-wrap{overflow-x:auto;margin:0 -10px;padding:0 10px}
.sched-table{width:100%;border-collapse:collapse;min-width:700px;table-layout: fixed}
.sched-table th{padding:12px 6px;font-size:11px;font-weight:700;color:#94A3B8;border-bottom:1px solid #334155;text-align:center}
.sched-table td{padding:10px 4px;vertical-align:top;border:1px solid #33415522;text-align:center}
/* First Column Width Fix */
.sched-table th:first-child, .sched-table td:first-child{width:100px;text-align:right;border-right:none;font-weight:800;color:#3B82F6}
.sched-table td.selected{background:rgba(59,130,246,0.08);border:1px solid #3B82F655}
.emp-chip{display:inline-flex;align-items:center;gap:4px;border-radius:7px;padding:3px 8px;margin:2px;font-size:11px;font-weight:600}

/* TOAST & UTILS */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10B981;color:white;padding:12px 24px;border-radius:12px;font-weight:600;z-index:9999}
.toast.err{background:#EF4444}
.badge{background:#EF4444;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;margin-right:4px}
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1E293B;border-top:1px solid #334155;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
@media(max-width:768px){.mobile-bottom-nav{display:flex;height:60px;justify-content:space-around;align-items:center}}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════════════════
const SUPABASE_URL = "https://zszlqoisokjgvplrcbic.supabase.co";
const SUPABASE_KEY = "sb_publishable_b6ZEtYrgGIQT8WxkahGzZg_iHTYMasi";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const SHIFTS = [
  { id:"morning",   label:"בוקר",   start:"07:00", end:"15:00", color:"#F59E0B" },
  { id:"afternoon", label:"צהריים", start:"15:00", end:"23:00", color:"#10B981" },
  { id:"night",     label:"לילה",   start:"23:00", end:"07:00", color:"#6366F1" },
];

let S = {
  view: "loading", user: null, profile: null, business: null,
  employees: [], vacations: [], swapRequests: [], assignments: [],
  schedule: {}, weekOffset: 0, toast: null
};

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function e(tag, props={}, children=[]) {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(props)){
    if(k==="class") el.className=v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  const childrenArr = Array.isArray(children) ? children : [children];
  childrenArr.forEach(c => { if(c) el.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
  return el;
}
function div(cls,children=[],extra={}) { return e("div",{class:cls,...extra},children); }
function btn(cls,txt,onclick,extra={}) { return e("button",{class:cls,...extra,onclick},txt); }
function toast(msg,type="ok") { S.toast={msg,type}; render(); setTimeout(()=>{S.toast=null;render();},3000); }
function today() { return new Date().toISOString().split("T")[0]; }
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("he-IL"); }
function getEmp(id) { return S.employees.find(e=>e.id===id); }
function getWeekDates(offset=0) {
  const d=new Date(); d.setDate(d.getDate()-d.getDay()+(offset*7));
  return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x.toISOString().split("T")[0];});
}

// ══════════════════════════════════════════════════════
// DATA LOGIC
// ══════════════════════════════════════════════════════
async function loadAll(user) {
  S.user = user;
  const { data: profile } = await sb.from("profiles").select("*, business:businesses(*)").eq("id", user.id).maybeSingle();
  if (!profile) { S.view="login"; render(); return; }
  S.profile = profile; S.business = profile.business;
  await Promise.all([loadEmployees(), loadVacations(), loadSwapRequests(), loadSchedule()]);
  S.view = S.profile.role === "employee" ? "empview" : "home";
  render();
}

async function loadEmployees() {
  const { data } = await sb.from("profiles").select("*").eq("business_id", S.profile.business_id).eq("is_deleted", false).order("name");
  S.employees = data || [];
}

async function loadVacations() {
  const { data } = await sb.from("vacations").select("*").in("employee_id", S.employees.map(e=>e.id));
  S.vacations = data || [];
}

async function loadSwapRequests() {
  const { data } = await sb.from("swap_requests").select("*").eq("business_id", S.profile.business_id).order("created_at", {ascending:false});
  S.swapRequests = data || [];
}

async function loadSchedule() {
  const weekStart = getWeekDates(S.weekOffset)[0];
  const { data: sched } = await sb.from("schedules").select("*").eq("business_id", S.profile.business_id).eq("week_start", weekStart).maybeSingle();
  if (sched) {
    S.schedule = sched;
    const { data: asgn } = await sb.from("assignments").select("*").eq("schedule_id", sched.id);
    S.assignments = asgn || [];
  } else { S.assignments = []; S.schedule = {}; }
}

async function updateSwapStatus(id, status) {
  try {
    const { error: swapErr } = await sb.from("swap_requests").update({ status }).eq("id", id);
    if (swapErr) throw swapErr;
    const sw = S.swapRequests.find(s => s.id === id);
    if (status === "approved" && sw) {
      if (sw.type === 'swap') {
        await sb.from("assignments").update({ employee_id: sw.target_id }).match({ date: sw.target_date, shift: sw.target_shift, schedule_id: sw.schedule_id });
        await sb.from("assignments").update({ employee_id: sw.requester_id }).match({ date: sw.requester_date, shift: sw.requester_shift, schedule_id: sw.schedule_id });
      } else {
        await sb.from("assignments").update({ employee_id: sw.requester_id }).match({ date: sw.target_date, shift: sw.target_shift, schedule_id: sw.schedule_id });
      }
    }
    await loadSchedule();
    await loadSwapRequests();
    toast("הנתונים עודכנו בהצלחה ✓");
    render();
  } catch (err) { toast("שגיאה בעדכון", "err"); }
}

// ══════════════════════════════════════════════════════
// VIEWS
// ══════════════════════════════════════════════════════
function viewSchedule() {
  const wd = getWeekDates(S.weekOffset);
  const wrap = div("");
  wrap.appendChild(div("section-header", [
    e("h2", {class:"page-title"}, "📅 סידור עבודה שבועי"),
    div("", [
      btn("nav-btn", "←", () => { S.weekOffset--; loadSchedule().then(render); }),
      btn("nav-btn", "היום", () => { S.weekOffset=0; loadSchedule().then(render); }),
      btn("nav-btn", "→", () => { S.weekOffset++; loadSchedule().then(render); })
    ], {style:"display:flex;gap:10px"})
  ], {style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"}));

  const tbl = e("table", {class:"sched-table"});
  const thead = e("thead", [e("tr", [
    e("th", {}, "משמרת"),
    ...wd.map(d => {
        const dt = new Date(d + "T00:00:00");
        return e("th", {}, [div("", DAYS[dt.getDay()]), div("", dt.getDate())]);
    })
  ])]);
  tbl.appendChild(thead);

  const tbody = e("tbody");
  SHIFTS.forEach(sh => {
    const tr = e("tr");
    tr.appendChild(e("td", {style:`color:${sh.color}`}, sh.label));
    wd.forEach(date => {
      const emps = S.assignments.filter(a => a.date === date && a.shift === sh.id);
      const td = e("td", {class: date===today()?"selected":""});
      emps.forEach(asgn => {
        const emp = getEmp(asgn.employee_id);
        if(emp) td.appendChild(div("emp-chip", [emp.name], {style:`background:${sh.color}18; color:${sh.color}; border:1px solid ${sh.color}44`}));
      });
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(div("sched-wrap", [tbl]));
  return div("card", [wrap]);
}

function viewSwaps() {
  const wrap = div("");
  wrap.appendChild(e("h2", {class:"page-title"}, "🔄 בקשות חילוף"));
  const pending = S.swapRequests.filter(r => r.status === "pending_manager");
  if(pending.length === 0) wrap.appendChild(div("card", [div("", "אין בקשות ממתינות", {style:"text-align:center;color:#64748B"})]));
  pending.forEach(r => {
    const emp = getEmp(r.requester_id);
    wrap.appendChild(div("card", [
      div("", `${emp?.name} מבקש ${r.type==='swap'?'חילוף':'הצטרפות'} ב-${r.target_date} משמרת ${r.target_shift}`),
      div("form-actions", [
        btn("btn-primary", "אשר", () => updateSwapStatus(r.id, "approved"), {style:"background:#10B981;margin-left:8px"}),
        btn("btn-primary", "דחה", () => updateSwapStatus(r.id, "rejected"), {style:"background:#EF4444"})
      ], {style:"margin-top:12px"})
    ]));
  });
  return wrap;
}

function render() {
  const app = $("app"); app.innerHTML = "";
  if(S.view === "loading") { app.appendChild(div("login-wrap", [div("logo-name", "טוען מערכת...")])); return; }
  if(S.view === "login") { 
      app.appendChild(div("login-wrap", [div("login-card", [
          div("logo-box", [div("logo-icon", ["📅"]), div("logo-name", "Shift SOC")]),
          btn("btn-primary", "התחבר עם גוגל", () => sb.auth.signInWithOAuth({provider:'google'}))
      ])])); 
      return; 
  }

  // Header
  app.appendChild(e("header", {class:"header"}, [div("header-inner", [
    div("logo-box", [div("logo-icon", ["📅"]), div("logo-name", "Shift SOC")]),
    div("nav", [
        btn("nav-btn"+(S.view==='home'?' active':''), "בית", () => {S.view='home';render();}),
        btn("nav-btn"+(S.view==='schedule'?' active':''), "סידור", () => {S.view='schedule';render();}),
        btn("nav-btn"+(S.view==='swaps'?' active':''), "חילופים", () => {S.view='swaps';render();})
    ])
  ])]));

  const main = div("main");
  if(S.view === "home" || S.view === "schedule") main.appendChild(viewSchedule());
  else if(S.view === "swaps") main.appendChild(viewSwaps());
  app.appendChild(main);

  if(S.toast) app.appendChild(div("toast", [S.toast.msg], {class:"toast "+S.toast.type}));
  
  const bnav = div("mobile-bottom-nav");
  [["home","🏠"],["swaps","🔄"]].forEach(([v,i]) => bnav.appendChild(btn("",i,()=>{S.view=v;render();},{style:"font-size:24px;background:none;border:none"})));
  app.appendChild(bnav);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
async function startApp() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await loadAll(session.user);
  else { S.view = "login"; render(); }
}
startApp();
</script>
</body>
</html>
