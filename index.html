function viewEmpSettings() {
  const wrap = e("div");
  wrap.appendChild(div("page-title",["⚙️ הגדרות"],{style:"margin-bottom:16px"}));

  // Change password
  const passCard = div("card",[e("div",{class:"card-title"},"🔐 שינוי סיסמה")]);
  const newPass = e("input",{class:"fi",type:"password",placeholder:"סיסמה חדשה (לפחות 6 תווים)",style:"margin-bottom:10px"});
  const confPass = e("input",{class:"fi",type:"password",placeholder:"אישור סיסמה חדשה",style:"margin-bottom:12px"});
  passCard.appendChild(div("form-col",[e("label",{class:"form-label"},"סיסמה חדשה"),newPass],{style:"margin-bottom:10px"}));
  passCard.appendChild(div("form-col",[e("label",{class:"form-label"},"אישור סיסמה"),confPass],{style:"margin-bottom:12px"}));
  passCard.appendChild(btn("btn-add","🔐 שמור סיסמה חדשה",async()=>{
    if (!newPass.value || newPass.value.length < 6) { toast("סיסמה חייבת להיות לפחות 6 תווים","err"); return; }
    if (newPass.value !== confPass.value) { toast("הסיסמאות לא תואמות","err"); return; }
    const {error} = await sb.auth.updateUser({password: newPass.value});
    if (error) { toast("שגיאה: "+error.message,"err"); return; }
    newPass.value=""; confPass.value="";
    toast("סיסמה עודכנה בהצלחה ✓");
  },{style:"width:100%"}));
  wrap.appendChild(passCard);

  // Install PWA
  const pwaCard = div("card",[e("div",{class:"card-title"},"📱 התקנה על הטלפון")]);
  pwaCard.appendChild(e("div",{style:"font-size:13px;color:#94A3B8;margin-bottom:12px"},"התקן את Shift SOC PMO כאפליקציה על מסך הבית"));
  if (S.pwaPrompt) {
    pwaCard.appendChild(btn("btn-purple","📱 התקן אפליקציה",async()=>{
      S.pwaPrompt.prompt();
      const {outcome}=await S.pwaPrompt.userChoice;
      if(outcome==="accepted"){S.pwaPrompt=null;toast("אפליקציה הותקנה ✓");}
      render();
    },{style:"width:100%"}));
  } else {
    pwaCard.appendChild(e("div",{style:"background:#1E3A5F;border-radius:10px;padding:14px"},[
      e("div",{style:"font-weight:700;font-size:13px;color:#60A5FA;margin-bottom:8px"},"כיצד להתקין:"),
      e("div",{style:"font-size:12px;color:#94A3B8;line-height:1.8"},[
        e("div",{},"📱 iPhone: לחץ על שתף ← הוסף למסך הבית"),
        e("div",{},"🤖 Android: לחץ על תפריט ← הוסף למסך הבית"),
        e("div",{},"💻 Chrome: לחץ על + בשורת הכתובת")
      ])
    ]));
  }
  wrap.appendChild(pwaCard);

  // Logout
  wrap.appendChild(btn("btn-sm btn-sm-red","יציאה מהמערכת",handleLogout,{style:"width:100%;margin-top:16px;padding:12px"}));

  return wrap;
}
  // ── MANAGER BLOCKS VIEW ──
function viewManagerBlocks() {
  const wrap = e("div");
  wrap.appendChild(div("page-title", ["🚫 ניהול חסימות עובדים"], {style:"margin-bottom:16px"}));

  // Week navigation
  if (!S.blocksWeekOffset) S.blocksWeekOffset = 0;
  const viewWeekDates = getWeekDates(S.blocksWeekOffset);
  const viewWeekStart = viewWeekDates[0];

  wrap.appendChild(e("div",{style:"display:flex;gap:6px;margin-bottom:14px;align-items:center;justify-content:center"},[
    btn("btn-sm btn-sm-gray","←",()=>{S.blocksWeekOffset--;render();}),
    btn("btn-sm btn-sm-blue","השבוע",()=>{S.blocksWeekOffset=0;render();}),
    btn("btn-sm btn-sm-gray","→",()=>{S.blocksWeekOffset++;render();}),
  ]));
  wrap.appendChild(e("div",{style:"text-align:center;font-size:13px;color:#64748B;margin-bottom:16px"},
    fmtDate(viewWeekDates[0]) + " — " + fmtDate(viewWeekDates[6])));

  const allSubs = S.availSubmissions || [];

  // Filter by selected week
  const weekSubs = allSubs.filter(sub => sub.week_start === viewWeekStart);

  if (weekSubs.length === 0) {
    wrap.appendChild(div("card", [
      e("div",{style:"text-align:center;padding:30px;color:#64748B"},"אין חסימות לשבוע זה")
    ]));
    return wrap;
  }

  // Flatten slots into individual blocks, grouped by employee
  const byEmp = {};
  weekSubs.forEach(sub => {
    if (!byEmp[sub.employee_id]) byEmp[sub.employee_id] = [];
    (sub.slots || []).forEach(sl => {
      byEmp[sub.employee_id].push({
        date: sl.date || null,
        day: sl.day,
        shift: sl.shift,
        reason: sl.reason || sub.note || ""
      });
    });
  });

  const todayStr = today();

  Object.entries(byEmp).forEach(([empId, blocks]) => {
    const emp = getEmp(empId);
    const col = ec(empIdx(empId));

    const empBox = e("div",{style:"background:#0F172A;border:1px solid "+col+"44;border-radius:14px;padding:14px;margin-bottom:12px"});

    empBox.appendChild(e("div",{style:"display:flex;align-items:center;gap:10px;margin-bottom:12px"},[
      e("div",{style:"width:36px;height:36px;border-radius:10px;background:"+col+"22;border:1px solid "+col+"44;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:"+col+";flex-shrink:0"},
        (emp?.name||"?").split(" ").map(n=>n[0]).join("").slice(0,2)),
      e("div",{style:"flex:1"},[
        e("div",{style:"font-weight:800;font-size:15px;color:#E2E8F0"},emp?.name || "עובד לא ידוע"),
        e("div",{style:"font-size:11px;color:#64748B"},blocks.length + " חסימות")
      ])
    ]));

    const grid = e("div",{style:"display:flex;flex-wrap:wrap;gap:6px"});
    blocks.sort((a,b) => (a.date||"").localeCompare(b.date||"")).forEach(b => {
      const sh = SHIFT_BY_ID[b.shift];
      const dt = b.date ? new Date(b.date+"T00:00:00") : null;
      const isPast = b.date && b.date < todayStr;
      const dayLabel = dt ? (DAYS[dt.getDay()] + " " + dt.getDate() + "/" + (dt.getMonth()+1)) : ("יום " + (DAYS[b.day] || b.day));

      grid.appendChild(e("div",{style:"background:#1E293B;border:1px solid "+(sh?.color||"#64748B")+"44;border-radius:10px;padding:8px 12px;opacity:"+(isPast?"0.5":"1")},[
        e("div",{style:"font-weight:700;font-size:12px;color:"+(sh?.color||"#94A3B8")},dayLabel),
        e("div",{style:"font-size:11px;color:"+(sh?.color||"#64748B")},sh?.label || b.shift),
        b.reason ? e("div",{style:"font-size:10px;color:#FCA5A5;margin-top:4px;font-style:italic"},"💬 "+b.reason) : null
      ]));
    });
    empBox.appendChild(grid);
    wrap.appendChild(empBox);
  });

  return wrap;
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render() {
  const app = $("app");
  app.innerHTML = "";

  if (S.view==="loading") { app.appendChild(viewLoading()); return; }
  if (S.view==="login")   { app.appendChild(viewLogin()); }
  else {
    const appWrap = div("app");
    appWrap.appendChild(viewHeader());
    const main = div("main");

    if (S.view==="home")       main.appendChild(viewHome());
    else if(S.view==="schedule")  main.appendChild(viewSchedule()); // employees see read-only (buttons hidden)
    else if(S.view==="calendar")  main.appendChild(viewCalendar());
  else if(S.view==="employees" && isManager()) main.appendChild(viewEmployees());
    else if(S.view==="employees" && !isManager()) { S.view="empview"; main.appendChild(viewEmpView()); }
    else if(S.view==="manager_blocks" && isManager()) main.appendChild(viewManagerBlocks()); // <--- הוסף את השורה הזו כאן!
    else if(S.view==="vacations" && !isManager()) { S.empViewTab="vacation"; main.appendChild(viewEmpView()); }
    else if(S.view==="vacations") main.appendChild(viewVacations());
    else if(S.view==="swaps" && !isManager()) { S.empViewTab="swaps_emp"; main.appendChild(viewEmpView()); }
    else if(S.view==="swaps")     main.appendChild(viewSwaps());
    else if(S.view==="stats")     main.appendChild(viewStats());
    else if(S.view==="blocks")    { S.empViewTab="avail"; main.appendChild(viewEmpView()); }
    else if(S.view==="emp_settings") main.appendChild(viewEmpSettings());
    else if(S.view==="empview")   main.appendChild(viewEmpView());
    else if(S.view==="settings")  main.appendChild(viewSettings());

    appWrap.appendChild(main);
    app.appendChild(appWrap);

    // Modals
    if(S.constraintsEmp) app.appendChild(viewConstraintsModal());
    if(S.showPublishModal) app.appendChild(viewPublishModal());
  }

  // Mobile bottom nav
  if (S.view !== "login" && S.view !== "loading") {
    const pendingVacs2 = S.vacations.filter(v=>v.status==="pending").length;
    const bottomNav = e("div",{class:"mobile-bottom-nav",style:"overflow-x:auto;-webkit-overflow-scrolling:touch"});
    const isEmpOnly = S.profile?.role === "employee";
    const bottomTabs = isEmpOnly ? [
      {id:"empview",icon:"📋",label:"שלי"},
      {id:"schedule",icon:"📅",label:"סידור"},
      {id:"blocks",icon:"🚫",label:"חסימות"},
      {id:"vacations",icon:"🌴",label:"העדרויות"},
      {id:"swaps_nav",icon:"🔄",label:"חילופים"},
      {id:"emp_settings",icon:"⚙️",label:"הגדרות"},
    ] : [
      {id:"home",icon:"🏠",label:"בית"},
      {id:"schedule",icon:"📅",label:"סידור"},
      {id:"employees",icon:"👥",label:"עובדים"},
      {id:"manager_blocks",icon:"🚫",label:"חסימות"},
      {id:"vacations",icon:"🌴",label:"העדרויות",badge:pendingVacs2},
      {id:"swaps",icon:"🔄",label:"חילופים"},
      {id:"settings",icon:"⚙️",label:"הגדרות"},
    ];
    bottomTabs.forEach(t => {
      const isActive = S.view===t.id;
      const btn2 = e("button",{
        style:`flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 8px;border:none;border-top:2px solid ${isActive?"#3B82F6":"transparent"};background:transparent;color:${isActive?"#3B82F6":"#64748B"};font-family:inherit;cursor:pointer;position:relative;min-height:56px;transition:color 0.15s`,
        onclick:()=>{
          if(t.id==="swaps_nav"){S.view="empview";S.empViewTab="swaps_emp";S.selectedCell=null;render();}
          else if(t.id==="empview"){S.view="empview";S.empViewTab="shifts";S.selectedCell=null;render();}
          else{S.view=t.id;S.selectedCell=null;render();}
        }
      },[
        t.badge>0?e("span",{style:"position:absolute;top:6px;right:calc(50% - 16px);background:#EF4444;color:white;border-radius:50%;width:14px;height:14px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center"},String(t.badge)):null,
        e("span",{style:"font-size:22px;line-height:1"},t.icon),
        e("span",{style:`font-size:10px;font-weight:${isActive?"700":"500"};margin-top:1px`},t.label)
      ]);
      bottomNav.appendChild(btn2);
    });
    app.appendChild(bottomNav);
  }

  // Toast
  if(S.toast) {
    app.appendChild(e("div",{class:"toast"+(S.toast.type==="err"?" err":"")},S.toast.msg));
  }
}

// PWA install prompt
window.addEventListener("beforeinstallprompt", (e) => {
  // Don't prevent default — just save the event for later
  S.pwaPrompt = e;
});

// Service worker registration
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

// INIT
checkAuth();
</script>

  <div id="mob-console-log"></div>
</div>

<button id="mob-console-btn" onclick="document.getElementById('mob-console').style.display='block'" style="display:none;position:fixed;bottom:70px;left:10px;background:#000;color:#0f0;border:1px solid #0f0;border-radius:6px;padding:4px 8px;font-size:11px;font-family:monospace;z-index:99998;cursor:pointer">🐛</button>

<script>
// Show debug button only on mobile
if (/iPhone|iPad|Android/i.test(navigator.userAgent)) {
  document.getElementById('mob-console-btn').style.display = 'block';
}

// Override console methods (safe)
try {
  const logEl = document.getElementById('mob-console-log');
  if (logEl && console && typeof console.log === 'function' && console.log.bind) {
    function addLog(type, args) {
      const colors = { log:'#ccc', warn:'#fa0', error:'#f44', info:'#4af' };
      const line = document.createElement('div');
      line.style.color = colors[type] || '#ccc';
      line.style.borderBottom = '1px solid #111';
      line.style.padding = '2px 0';
      line.textContent = '[' + type.toUpperCase() + '] ' + Array.from(args).map(a => {
        try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e) { return String(a); }
      }).join(' ');
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }
    const _log = console.log.bind(console);
    const _warn = console.warn.bind(console);
    const _error = console.error.bind(console);
    const _info = console.info ? console.info.bind(console) : _log;

    console.log = function() { _log.apply(console, arguments); addLog('log', arguments); };
    console.warn = function() { _warn.apply(console, arguments); addLog('warn', arguments); };
    console.error = function() { _error.apply(console, arguments); addLog('error', arguments); };
    console.info = function() { _info.apply(console, arguments); addLog('info', arguments); };
  }
} catch(e) {}

window.onerror = function(msg, src, line) {
  addLog('error', [msg + ' (line ' + line + ')']);
};
</script>
</body>
</html>
