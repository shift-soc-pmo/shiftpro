<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ניהול משמרות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F172A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ניהול משמרות">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Heebo,sans-serif}
html,body{height:100%;overflow-x:hidden}
body{background:#0F172A;color:#E2E8F0;min-height:100vh;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
.hidden{display:none !important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1E293B}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
input:focus,select:focus,textarea:focus{outline:2px solid #3B82F6;outline-offset:1px}

/* ═══ LOGIN ═══ */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;background:#060B14}
.login-wrap::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:48px 48px;z-index:0}
.login-wrap::after{content:"";position:absolute;top:-20%;right:-10%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.login-card{width:100%;max-width:460px;background:rgba(15,23,42,0.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:40px;box-shadow:0 32px 80px rgba(0,0,0,0.5);position:relative;z-index:1}
.logo-box{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 8px 24px rgba(59,130,246,0.3);flex-shrink:0}
.logo-name{font-weight:900;font-size:18px;color:#F1F5F9}
.logo-sub{font-size:11px;color:#475569;margin-top:2px}
.login-h1{font-weight:800;font-size:24px;color:#F1F5F9;letter-spacing:-0.5px;margin-bottom:6px}
.subtitle{font-size:13px;color:#475569;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#64748B;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
.field input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 16px;color:#F1F5F9;font-size:14px;transition:all 0.2s}
.field input:focus{background:rgba(59,130,246,0.06);border-color:rgba(59,130,246,0.5)}
.btn-primary{width:100%;padding:14px 0;background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;border-radius:14px;color:white;font-weight:800;font-size:15px;box-shadow:0 8px 24px rgba(59,130,246,0.3);margin-top:8px;transition:transform 0.1s}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.switch-link{text-align:center;margin-top:20px;font-size:13px;color:#475569}
.switch-link a{color:#60A5FA;font-weight:700;text-decoration:none;cursor:pointer}
.err-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:12px;padding:12px 16px;color:#FCA5A5;font-size:13px;margin-bottom:12px}

/* ═══ APP LAYOUT ═══ */
.app{min-height:100vh;background:#0F172A;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1E293B,#0F172A);border-bottom:1px solid #1E3A5F;padding:0 20px;position:sticky;top:0;z-index:40}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:10px}
.nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:7px 12px;border-radius:10px;border:none;background:transparent;color:#94A3B8;font-weight:600;font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:5px;position:relative;flex-shrink:0;transition:all 0.15s}
.nav-btn:hover{background:#1E293B;color:#E2E8F0}
.nav-btn.active{background:#3B82F6;color:white;box-shadow:0 4px 12px rgba(59,130,246,0.3)}
.badge{background:#EF4444;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;margin-right:2px}
.badge-purple{background:#A855F7}
.user-area{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-name{font-size:13px;font-weight:700;color:#E2E8F0}
.user-role-label{font-size:11px;color:#64748B}
.btn-logout{background:#1E293B;border:1px solid #334155;color:#64748B;border-radius:10px;padding:6px 14px;font-weight:600;font-size:12px;transition:all 0.15s}
.btn-logout:hover{border-color:#64748B;color:#E2E8F0}
.main{max-width:1200px;margin:0 auto;padding:24px 20px;width:100%}

/* ═══ CARDS ═══ */
.card{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:14px;transition:border-color 0.2s}
.card-title{font-weight:700;font-size:14px;color:#E2E8F0;margin-bottom:14px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.page-title{font-weight:900;font-size:22px;color:#E2E8F0}

/* ═══ KPI ═══ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:#1E293B;border-radius:16px;padding:16px;border:1px solid #334155;transition:transform 0.15s}
.kpi:hover{transform:translateY(-2px)}
.kpi-icon{font-size:20px;margin-bottom:5px}
.kpi-val{font-size:24px;font-weight:900;line-height:1}
.kpi-lbl{font-size:11px;font-weight:700;color:#94A3B8;margin-top:3px}

/* ═══ QUICK ACTIONS ═══ */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.quick-btn{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:18px 16px;text-align:right;transition:all 0.2s}
.quick-btn:hover{border-color:#3B82F6;transform:translateY(-2px)}
.q-icon{font-size:26px;margin-bottom:8px}
.q-label{font-weight:700;font-size:14px;color:#E2E8F0}
.q-sub{font-size:11px;color:#64748B;margin-top:3px}

/* ═══ TABLE ═══ */
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:10px;font-size:12px;color:#64748B;font-weight:600;border-bottom:1px solid #334155}
td{padding:9px 10px;border-bottom:1px solid #0F172A;font-size:13px;vertical-align:middle}

/* ═══ BUTTONS ═══ */
.btn-add{background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;color:white;border-radius:12px;padding:10px 18px;font-weight:700;font-size:13px;transition:transform 0.1s;box-shadow:0 4px 12px rgba(59,130,246,0.2)}
.btn-add:active{transform:scale(0.97)}
.btn-green{background:linear-gradient(135deg,#10B981,#059669);border:none;color:white;border-radius:12px;padding:10px 18px;font-weight:700;font-size:13px;box-shadow:0 4px 12px rgba(16,185,129,0.2)}
.btn-purple{background:linear-gradient(135deg,#A855F7,#7C3AED);border:none;color:white;border-radius:12px;padding:10px 18px;font-weight:700;font-size:13px;box-shadow:0 4px 12px rgba(168,85,247,0.2)}
.btn-sm{padding:5px 12px;border-radius:8px;border:none;font-weight:700;font-size:12px;font-family:inherit;transition:all 0.15s}
.btn-sm:active{transform:scale(0.95)}
.btn-sm-green{background:#10B98122;border:1px solid #10B98144;color:#10B981}
.btn-sm-red{background:#EF444422;border:1px solid #EF444444;color:#EF4444}
.btn-sm-blue{background:#3B82F622;border:1px solid #3B82F644;color:#3B82F6}
.btn-sm-gray{background:#334155;border:1px solid #475569;color:#94A3B8}
.btn-icon{background:none;border:none;font-size:16px;padding:4px;line-height:1}

/* ═══ FORMS ═══ */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-col{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:#94A3B8;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.fi{width:100%;background:#0F172A;border:1px solid #334155;border-radius:10px;padding:10px 12px;color:#E2E8F0;font-size:13px;transition:border-color 0.2s}
.fi:focus{border-color:#3B82F6}
.form-actions{display:flex;gap:8px;margin-top:12px}

/* ═══ SCHEDULE GRID ═══ */
.sched-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;max-width:100%}
.sched-table{width:100%;border-collapse:collapse;min-width:650px;table-layout:fixed}
.sched-table th,.sched-table td{text-align:center;padding:8px 4px;vertical-align:top;border:1px solid #33415522}
.sched-table th{background:rgba(30,41,59,0.5);font-size:12px;height:60px}
.sched-table td{height:80px}
.sched-table th:first-child,.sched-table td:first-child{width:100px;text-align:right;padding:10px 16px;font-weight:800;border:none;cursor:default;border-left:2px solid #334155}
.sched-table td.selected{border:2px solid var(--shift-color,#3B82F6);background:rgba(59,130,246,0.08)}
.sched-table td:not(:first-child):hover{background:#0F172A}
.emp-chip{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:4px 8px;margin:2px;font-size:11px;font-weight:600;transition:all 0.15s}
.cell-empty{font-size:10px;color:#334155;padding:8px 0}
.scroll-hint{display:none;font-size:10px;color:#475569;text-align:center;margin-bottom:4px}

/* ═══ WORKLOAD ═══ */
.workload-row{margin-bottom:10px}
.workload-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.workload-bar-bg{height:7px;background:#0F172A;border-radius:4px;overflow:hidden}
.workload-bar-fill{height:100%;border-radius:4px;transition:width 0.5s}

/* ═══ CONSTRAINTS ═══ */
.constraint-table{width:100%;border-collapse:collapse}
.constraint-table th{padding:5px 8px;font-size:11px;color:#94A3B8;font-weight:600;text-align:center}
.constraint-table td{padding:4px 6px;text-align:center}
.constraint-table td:first-child{text-align:right;font-size:12px;color:#94A3B8;font-weight:600;padding:4px 8px}
.constraint-cell{width:38px;height:30px;border-radius:8px;border:1px solid #334155;background:#0F172A;cursor:pointer;font-size:13px;font-weight:700;transition:all 0.15s}
.constraint-cell.allowed{background:var(--sc)33;border-color:var(--sc)88;color:var(--sc)}
.constraint-cell.blocked{background:#EF444418;border-color:#EF444433;color:#EF4444}

/* ═══ MODAL ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1E293B;border:1px solid #334155;border-radius:20px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-weight:800;font-size:17px;color:#E2E8F0}
.modal-close{background:none;border:none;color:#64748B;font-size:22px;line-height:1;padding:0;transition:color 0.15s}
.modal-close:hover{color:#E2E8F0}

/* ═══ CELL EDITOR ═══ */
.cell-editor{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:18px;margin-bottom:14px}
.cell-editor-title{font-size:13px;font-weight:700;color:#94A3B8;margin-bottom:12px}
.cell-emp-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;margin:3px;font-family:inherit;font-size:13px;transition:all 0.15s}
.cell-emp-btn.assigned{font-weight:700}
.cell-emp-btn:active{transform:scale(0.95)}

/* ═══ ALERTS ═══ */
.alert{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;margin-bottom:8px;font-size:13px;font-weight:600;transition:all 0.15s}
.alert:hover{transform:translateX(-4px)}
.alert-warn{background:#F59E0B18;border:1px solid #F59E0B33;color:#FCD34D}
.alert-info{background:#3B82F618;border:1px solid #3B82F633;color:#60A5FA}

/* ═══ STATUS ═══ */
.status-badge{display:inline-block;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700}
.status-pending{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.status-approved{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.status-rejected{background:#EF444418;color:#EF4444;border:1px solid #EF444433}

/* ═══ TOAST ═══ */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10B981;color:white;padding:14px 28px;border-radius:14px;font-weight:600;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999;white-space:nowrap;animation:slideDown 0.3s ease}
.toast.err{background:#EF4444}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ═══ EMPLOYEE VIEW TABS ═══ */
.emp-view-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.ev-tab{padding:8px 14px;border-radius:10px;border:1px solid #334155;background:#1E293B;color:#64748B;font-family:inherit;font-weight:700;font-size:12px;white-space:nowrap;transition:all 0.15s}
.ev-tab:hover{border-color:#475569;color:#94A3B8}
.ev-tab.active{background:#3B82F622;border-color:#3B82F6;color:#60A5FA}

/* ═══ MOBILE BOTTOM NAV ═══ */
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(30,41,59,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid #334155;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -4px 20px rgba(0,0,0,0.3)}

/* ═══════════════════════════════════ */
/* ═══ MOBILE RESPONSIVE ═══ */
/* ═══════════════════════════════════ */
@media(max-width:768px){
  /* Header — hide desktop nav */
  .header .nav{display:none !important}
  .user-name,.user-role-label{display:none}
  .btn-logout{padding:6px 10px;font-size:11px;border-radius:8px}
  .header-inner{height:52px}

  /* Show mobile bottom nav */
  .mobile-bottom-nav{display:flex !important}

  /* Main — bottom padding for nav */
  .main{padding:14px 12px 85px 12px !important}

  /* Cards */
  .card{padding:16px;border-radius:14px}

  /* Forms stack vertically */
  .form-row{grid-template-columns:1fr !important}
  .fi{font-size:16px !important;padding:12px !important}
  .form-label{font-size:12px;margin-bottom:4px}

  /* Section header stacks */
  .section-header{flex-direction:column;align-items:flex-start;gap:10px}
  .section-header > div:last-child{width:100%;display:flex;flex-wrap:wrap;gap:6px}
  .section-header > div:last-child > button{flex:1;min-width:60px;font-size:12px;padding:8px 6px}

  /* KPI + Quick grids: 2 columns */
  .kpi-grid{grid-template-columns:1fr 1fr}
  .quick-grid{grid-template-columns:1fr 1fr}
  .kpi{padding:12px}
  .kpi-val{font-size:20px}

  /* Schedule — horizontal scroll inside card */
  .scroll-hint{display:block !important}
  .sched-wrap{margin:0 -16px;padding:0 16px;width:calc(100% + 32px)}
  .sched-table{min-width:600px}
  .sched-table th.day-header{min-width:55px;padding:6px 3px}
  .sched-table td{padding:4px 2px;height:auto;min-height:50px}
  .sched-table td:first-child{padding:8px 6px;width:70px;font-size:12px}
  .emp-chip{padding:3px 6px;font-size:10px;margin:1px;border-radius:6px}

  /* Modals — bottom sheet style */
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-height:88vh;width:100%;max-width:100%;padding:24px 16px 32px;animation:slideUp 0.3s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

  /* Hide internal emp-view tabs on mobile — bottom nav handles it */
  .emp-view-tabs{display:none !important}

  /* Buttons */
  .btn-add,.btn-green,.btn-purple{padding:12px 16px;font-size:14px;border-radius:12px;width:100%}
  .btn-sm{padding:6px 10px;font-size:12px}
  .page-title{font-size:20px}

  /* Constraints */
  .constraint-cell{width:40px;height:34px;font-size:14px}
}

@media(max-width:380px){
  .main{padding:10px 8px 85px 8px !important}
  .card{padding:12px}
  .page-title{font-size:18px}
  .kpi-val{font-size:18px}
  .sched-table{min-width:500px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const SUPABASE_URL = "https://zszlqoisokjgvplrcbic.supabase.co";
const SUPABASE_KEY = "sb_publishable_b6ZEtYrgGIQT8WxkahGzZg_iHTYMasi";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════
const DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const SHIFTS = [
  { id:"morning",   label:"בוקר",   start:"07:00", end:"15:00", color:"#F59E0B" },
  { id:"afternoon", label:"צהריים", start:"15:00", end:"23:00", color:"#10B981" },
  { id:"night",     label:"לילה",   start:"23:00", end:"07:00", color:"#6366F1" },
];
const SHIFT_BY_ID = Object.fromEntries(SHIFTS.map(s=>[s.id,s]));
const SHIFT_LABELS = Object.fromEntries(SHIFTS.map(s=>[s.id,s.label]));
const EMP_COLORS = ["#3B82F6","#EC4899","#14B8A6","#F97316","#8B5CF6","#EF4444","#06B6D4","#84CC16","#F59E0B","#6366F1"];
const ec = (idx) => EMP_COLORS[idx % EMP_COLORS.length];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let S = {
  view: "loading",
  user: null, profile: null, business: null,
  employees: [], vacations: [], swapRequests: [], availSubmissions: [],
  schedule: {},         // { [dateStr]: { [shiftId]: [empId,...] } }
  publishedWeeks: new Set(),
  lockedSlots: {},      // { "date|shift": Set<empId> }
  customHours: {},      // { "date|shift|empId": {start,end} }
  assignmentNotes: {},  // { "date|shift|empId": "note text" }
  weekOffset: 0,
  selectedCell: null,   // { date, shift }
  constraintsEmp: null,
  empViewId: null, empViewTab: "shifts",
  showAddEmp: false, showAddVac: false, showSwapModal: false,
  showPublishModal: false, swapMyShift: null, swapTargetShift: null, empSwapTab: "swap", handoverShift: null, handoverTarget: null, showShiftEditor: false, publishType: 'final',
  newEmp: {name:"",email:"",idNumber:"",phone:"",role:"employee"},
  newVac: {employeeId:"",startDate:"",endDate:"",reason:""},
  availDraft: {}, availTargetOffset: 1,
  testAsEmployee: false, blockReasons: {}, schedPublishType: {}, publishedInitial: null, monthOffset: 0, blocksWeekOffset: 0,
  currentPublishType: null, showBlocksModal: false,
  toast: null, modal: null,
  loginMode: "login",
};

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function e(tag, props={}, children=[]) {
  const el = document.createElement(tag);
  // If props is an array, it's actually children
  if (Array.isArray(props)) { children = props; props = {}; }
  if (typeof props === "string") { children = [props]; props = {}; }
  for(const [k,v] of Object.entries(props)){
    if(v===null||v===undefined||v===false) continue;
    if(k==="class") el.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k==="html") el.innerHTML=v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of (Array.isArray(children)?children:[children])){
    if(c==null||c===false||c===undefined) continue;
    if(typeof c==="string"||typeof c==="number") el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}
function div(cls,children=[],extra={}) { return e("div",{class:cls,...extra},children); }
function btn(cls,txt,onclick,extra={}) { return e("button",{class:cls,...extra,onclick},txt); }

function toast(msg,type="ok") {

function today() { return new Date().toISOString().split("T")[0]; }
function getWeekDates(offset=0) {
  const d=new Date();
  const dow=d.getDay(); // 0=Sun
  d.setDate(d.getDate()-dow+offset*7);
  return Array.from({length:7},(_,i)=>{
    const x=new Date(d);
    x.setDate(d.getDate()+i);
    const y=x.getFullYear();
    const m=String(x.getMonth()+1).padStart(2,"0");
    const dd=String(x.getDate()).padStart(2,"0");
    return y+"-"+m+"-"+dd;
  });
}
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("he-IL"); }

function empIdx(id) { return S.employees.findIndex(e=>e.id===id); }

// ══════════════════════════════════════════════════════
// SMART SCHEDULE ALGORITHM
// ══════════════════════════════════════════════════════
function runSmartSchedule() {
  const weekDates = getWeekDates(S.weekOffset).map(d=>new Date(d+"T00:00:00"));
  const shiftIds = SHIFTS.map(s=>s.id);
  const newSched = {};
  const totalCount = {};
  const shiftTypeCount = {};

  S.employees.forEach(emp => {
    totalCount[emp.id] = 0;
    shiftTypeCount[emp.id] = {};
  });

  weekDates.forEach((dateObj, dayIdx) => {
    const dateStr = dateObj.toISOString().split("T")[0];
    const dayName = DAYS[dateObj.getDay()];
    newSched[dateStr] = {};

    shiftIds.forEach((shiftId, shIdx) => {
      const lockedKey = dateStr+"|"+shiftId;
      const lockedEmpIds = S.lockedSlots[lockedKey] ? [...S.lockedSlots[lockedKey]] : [];
      newSched[dateStr][shiftId] = [...lockedEmpIds];
      lockedEmpIds.forEach(id => {
        totalCount[id] = (totalCount[id]||0)+1;
        shiftTypeCount[id][shiftId] = (shiftTypeCount[id][shiftId]||0)+1;
      });

      // כמה עובדים דרושים לכל משמרת (ניתן להגדיר בהגדרות)
      const shiftTargets = S.business?.shift_targets || { morning: 2, afternoon: 1, night: 1 };
      const target = shiftTargets[shiftId] || 2;
      if (lockedEmpIds.length >= target) return;
      const need = target - lockedEmpIds.length;

      // Score available employees
      const scored = S.employees
        .filter(emp => !lockedEmpIds.includes(emp.id))
        .map(emp => {
          let score = 100;
          const avail = emp.availability || DAYS;
          const preferred = emp.preferred_shifts || [];
          const maxShifts = emp.max_shifts_per_week || 5;
          const dayConstraints = emp.day_constraints || {};

          // Active days check (0=Sun..6=Sat)
          const activeDays = emp.active_days || [0,1,2,3,4,5,6];
          if (!activeDays.includes(dateObj.getDay())) return null;

          // Allowed shifts check
          const empAllowedShifts = emp.allowed_shifts || SHIFTS.map(s=>s.id);
          if (!empAllowedShifts.includes(shiftId)) return null;

          // Temporary exclusion check
          if (emp.exclude_from && emp.exclude_to && dateStr >= emp.exclude_from && dateStr <= emp.exclude_to) return null;

          // Hard blocks
          const onVac = S.vacations.some(v =>
            v.employee_id === emp.id && v.status === "approved" &&
            dateStr >= v.start_date && dateStr <= v.end_date
          );
          if (onVac) return null;
          if (!avail.includes(dayName)) return null;
          // Excluded days (permanent)
          if ((emp.excluded_days||[]).includes(dateObj.getDay())) return null;
          // Allowed shifts
          if (emp.allowed_shifts && !emp.allowed_shifts.includes(shiftId)) return null;
          if (dayConstraints[dayName]?.[shiftId] === 0) return null;
          if (totalCount[emp.id] >= maxShifts) return null;
          const perLimit = emp.max_per_shift?.[shiftId];
          if (perLimit != null && (shiftTypeCount[emp.id][shiftId]||0) >= perLimit) return null;

          // Check if employee is allowed on this shift type
          const allowedShifts = emp.preferred_shifts;
          if (allowedShifts && allowedShifts.length > 0 && !allowedShifts.includes(shiftId)) return null;

          // Scoring
          score -= totalCount[emp.id] * 12;
          if (preferred.includes(shiftId)) score += 30;
          if (dayConstraints[dayName]?.[shiftId] === 1) score += 20;

          // Block submissions — if employee blocked this shift, skip them
          const isBlocked = S.availSubmissions.some(s =>
            s.employee_id === emp.id &&
            (s.slots||[]).some(sl => sl.shift === shiftId && sl.day === dateObj.getDay())
          );
          if (isBlocked) return null; // don't assign blocked shifts

          // Avoid back-to-back: night → morning
          if (dayIdx > 0 && shIdx === 0) {
            const prevDate = weekDates[dayIdx-1].toISOString().split("T")[0];
            if ((newSched[prevDate]?.["night"]||[]).includes(emp.id)) score -= 80;
          }

          // Avoid double shift same day
          const alreadyToday = shiftIds.slice(0,shIdx).some(s => (newSched[dateStr][s]||[]).includes(emp.id));
          if (alreadyToday) return null;

          return { emp, score };
        })
        .filter(Boolean)
        .sort((a,b) => b.score - a.score);

      const toAdd = scored.slice(0, need).map(s => s.emp.id);
      newSched[dateStr][shiftId].push(...toAdd);
      toAdd.forEach(id => {
        totalCount[id] = (totalCount[id]||0)+1;
        shiftTypeCount[id][shiftId] = (shiftTypeCount[id][shiftId]||0)+1;
      });
    });
  });

  S.schedule = newSched;
  // Save immediately (no debounce)
  clearTimeout(_saveTimer);
  (async()=>{
    if (!S.profile?.business_id) return;
    const weekStart = getWeekDates(S.weekOffset)[0];
    let { data: sched } = await sb.from("schedules")
      .select("id").eq("business_id", S.profile.business_id).eq("week_start", weekStart).single();
    if (!sched) {
      const { data: ns } = await sb.from("schedules")
        .insert({business_id:S.profile.business_id, week_start:weekStart, created_by:S.user.id}).select().single();
      sched = ns;
    }
    if (!sched) return;
    S.schedule.id = sched.id;
    await sb.from("assignments").delete().eq("schedule_id", sched.id);
    const rows = [];
    Object.entries(S.schedule).forEach(([date, shifts]) => {
      if (date === "id" || !shifts || typeof shifts !== "object") return;
      Object.entries(shifts).forEach(([shift, empIds]) => {
        if (!Array.isArray(empIds)) return;
        empIds.forEach(empId => {
          rows.push({ schedule_id:sched.id, employee_id:empId, date, shift });
        });
      });
    });
    if (rows.length) await sb.from("assignments").insert(rows);
    toast("שיבוץ אוטומטי נשמר ✓");
  })();
  render();
}

function generateInviteCode(businessId) {
  // Deterministic code from business ID (8 chars for more security)
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code = "";
  let hash = 0;
  for (let i = 0; i < businessId.length; i++) {
    hash = ((hash << 5) - hash) + businessId.charCodeAt(i);
    hash = hash & hash;
  }
  for (let i = 0; i < 8; i++) {
    const idx = Math.abs((hash * (i+1) * 31 + i * 17) % chars.length);
    code += chars[idx];
  }
  return code;
}

async function loadSchedule() {
  if (!S.profile?.business_id) return;
  const weekDates = getWeekDates(S.weekOffset);
  const weekStart = weekDates[0];
  const { data: sched } = await sb.from("schedules")
    .select("*").eq("business_id", S.profile.business_id)
    .eq("week_start", weekStart).single();

  if (!sched) { S.schedule={}; S.currentPublishType=null; return; }
  // Employee can only see published schedules
  if (!isManager() && !sched.published) { S.schedule={}; S.currentPublishType=null; return; }
  if (sched.published) {
    if (sched.publish_type === "final") {
      S.publishedWeeks.add(weekStart);
    }
    S.publishedInitial = S.publishedInitial || new Set();
    if (sched.publish_type === "initial" || sched.published) S.publishedInitial.add(weekStart);
    S.schedPublishType = S.schedPublishType || {};
    S.schedPublishType[weekStart] = sched.publish_type || (sched.published ? "final" : null);
  }

  const { data: assignments } = await sb.from("assignments")
    .select("*").eq("schedule_id", sched.id);

  const sched_obj = {};
  weekDates.forEach(d => {
    sched_obj[d] = {};
    SHIFTS.forEach(sh => { sched_obj[d][sh.id] = []; });
  });
  (assignments||[]).forEach(a => {
    if (!sched_obj[a.date]) sched_obj[a.date] = {};
    if (!sched_obj[a.date][a.shift]) sched_obj[a.date][a.shift] = [];
    sched_obj[a.date][a.shift].push(a.employee_id);
    if (a.custom_start && a.custom_end) {
      S.customHours[a.date+"|"+a.shift+"|"+a.employee_id] = {start:a.custom_start,end:a.custom_end};
    }
    if (a.note) {
      S.assignmentNotes[a.date+"|"+a.shift+"|"+a.employee_id] = a.note;
    }
  });
  S.schedule = sched_obj;
}

let _saveTimer = null;
function saveScheduleToDB() {
  clearTimeout(_saveTimer);
  
  _saveTimer = setTimeout(async () => {
    if (!S.profile?.business_id) return;
    const weekDates = getWeekDates(S.weekOffset);
    const weekStart = weekDates[0];

    try {
      // משיכת או יצירת רשומת סידור לשבוע הנוכחי
      let { data: sched, error: schedError } = await sb.from("schedules")
        .select("id").eq("business_id", S.profile.business_id).eq("week_start", weekStart).single();
        
      if (schedError && schedError.code !== "PGRST116") throw schedError; // מתעלם משגיאת "לא נמצא" רגילה

      if (!sched) {
        const { data: ns, error: insertError } = await sb.from("schedules")
          .insert({business_id: S.profile.business_id, week_start: weekStart, created_by: S.user.id}).select().single();
        if (insertError) throw insertError;
        sched = ns;
      }
      
      if (!sched) return;

      // מחיקת כל השיבוצים הקודמים לאותו שבוע בשרת
      const { error: deleteError } = await sb.from("assignments").delete().eq("schedule_id", sched.id);
      if (deleteError) throw deleteError;

      // הרכבת מערך השיבוצים החדש
      const rows = [];
      Object.entries(S.schedule).forEach(([date, shifts]) => {
        // דילוג חכם: מתעלם ממאפיינים שאינם תאריכים (כמו id שנוסף בשיבוץ האוטומטי)
        if (date === "id" || typeof shifts !== "object") return;
        
        Object.entries(shifts).forEach(([shift, empIds]) => {
          if (!Array.isArray(empIds)) return;
          empIds.forEach(empId => {
            const ch = S.customHours[date+"|"+shift+"|"+empId];
            const noteVal = S.assignmentNotes[date+"|"+shift+"|"+empId];
            rows.push({ schedule_id: sched.id, employee_id: empId, date, shift,
              custom_start: ch?.start||null, custom_end: ch?.end||null,
              note: noteVal||null });
          });
        });
      });

      // שמירת השיבוצים במסד הנתונים
      if (rows.length > 0) {
        const { error: assignError } = await sb.from("assignments").insert(rows);
        if (assignError) throw assignError;
      }

    } catch (err) {
      console.error("🚨 שגיאת שמירה:", err);
      toast("שגיאה בשמירה למסד הנתונים: " + (err.message || err.details || ""), "err");
    }
  }, 800);
}

// ══════════════════════════════════════════════════════
// SCHEDULE ACTIONS
// ══════════════════════════════════════════════════════
function checkShiftConflict(date, shift, empId, ignoreDate = null, ignoreShift = null) {
  const emp = getEmp(empId);
  const name = emp?.name || "עובד";

  // פונקציית עזר שבודקת אם עובד משובץ, תוך התעלמות ממשמרת ספציפית (למקרה של חילוף)
  const isAssigned = (d, s) => {
    if (d === ignoreDate && s === ignoreShift) return false;
    return (S.schedule[d]?.[s]||[]).includes(empId);
  };

  // 1. האם כבר משובץ למשמרת אחרת באותו יום?
  const todayShifts = SHIFTS.filter(sh =>
    sh.id !== shift && isAssigned(date, sh.id)
  );
  if (todayShifts.length > 0) return `${name} כבר משובץ ל${todayShifts[0].label} ביום זה`;

  // 2. עבד לילה אתמול - לא יכול בוקר
  if (shift === "morning") {
    const yesterday = new Date(new Date(date+"T12:00:00").getTime() - 86400000);
    const yStr = yesterday.getFullYear()+"-"+String(yesterday.getMonth()+1).padStart(2,"0")+"-"+String(yesterday.getDate()).padStart(2,"0");
    if (isAssigned(yStr, "night")) return `${name} עבד לילה אתמול — לא ניתן לשבץ לבוקר`;
  }

  // 3. משמרת לילה - בדיקה שלא עובד בוקר מחר
  if (shift === "night") {
    const tomorrow = new Date(new Date(date+"T12:00:00").getTime() + 86400000);
    const tStr = tomorrow.getFullYear()+"-"+String(tomorrow.getMonth()+1).padStart(2,"0")+"-"+String(tomorrow.getDate()).padStart(2,"0");
    if (isAssigned(tStr, "morning")) return `${name} משובץ לבוקר מחר — לא ניתן לשבץ ללילה`;
  }

  return null; // הכל תקין, אין התנגשות
}

function toggleCellEmp(date, shift, empId) {
  const weekStart = getWeekDates(S.weekOffset)[0];
  if (S.publishedWeeks.has(weekStart) && !confirm("השבוע פורסם. לשנות בכל זאת?")) return;
  if (!S.schedule[date]) S.schedule[date] = {};
  if (!S.schedule[date][shift]) S.schedule[date][shift] = [];
  const arr = S.schedule[date][shift];
  const idx = arr.indexOf(empId);

  if (idx >= 0) {
    // Removing — always allowed
    arr.splice(idx,1);
  } else {
    // Adding — check constraints
    const conflict = checkShiftConflict(date, shift, empId);
    if (conflict) { toast(conflict,"err"); return; }

    arr.push(empId);
  }
  saveScheduleToDB();
  render();
}

function toggleLock(date, shift, empId) {
  const key = date+"|"+shift;
  if (!S.lockedSlots[key]) S.lockedSlots[key] = new Set();
  if (S.lockedSlots[key].has(empId)) S.lockedSlots[key].delete(empId);
  else S.lockedSlots[key].add(empId);
  render();
}

async function publishWeek(type) {
  const wd = getWeekDates(S.weekOffset);
  const weekStart = wd[0];
  const weekLabel = fmtDate(wd[0]) + " — " + fmtDate(wd[6]);
  const isFinal = type === "final";

  const {data:sched} = await sb.from("schedules")
    .select("id").eq("business_id", S.profile.business_id).eq("week_start", weekStart).single();
  if (sched) {
    await sb.from("schedules").update({
      published: true,
      publish_type: type  // "initial" or "final"
    }).eq("id", sched.id);
  }

  if (isFinal) {
    S.publishedWeeks.add(weekStart);
  }
  S.publishedInitial = S.publishedInitial || new Set();
  if (!isFinal) S.publishedInitial.add(weekStart);

  S.showPublishModal = false;
  toast(isFinal ? "סידור סופי פורסם 📢" : "סידור ראשוני פורסם 📋");
  render();

  // Send email to each employee
  for (const emp of S.employees) {
    if (!emp.email || emp.id === S.user.id) continue;
    const myShifts = [];
    wd.forEach(date => {
      SHIFTS.forEach(sh => {
        if ((S.schedule[date]?.[sh.id]||[]).includes(emp.id)) {
          const dt = new Date(date+"T00:00:00");
          myShifts.push({ day: DAYS[dt.getDay()]+" "+dt.getDate(), label: sh.label, hours: sh.start+"–"+sh.end, color: sh.color });
        }
      });
    });
    sendEmail(
      isFinal ? "schedule_published" : "schedule_initial",
      emp.email,
      { empName: emp.name, weekLabel, shifts: myShifts, isFinal }
    );
  }
}

// ══════════════════════════════════════════════════════
// VACATION ACTIONS
// ══════════════════════════════════════════════════════
async function addVacation() {
  if (!S.newVac.startDate || !S.newVac.endDate) {
    toast("נא למלא תאריכים", "err");
    return;
  }
  if (S.newVac.endDate < S.newVac.startDate) {
    toast("תאריך סיום לפני התחלה", "err");
    return;
  }

  const type = S.newVac.type || "vacation";
  // Manager can pick employee, employee defaults to self
  // In test mode, use the viewed employee's ID
  const empId = S.newVac.employeeId || (S.testAsEmployee ? S.empViewId : S.user.id);

  const payload = {
    employee_id: empId,
    business_id: S.profile.business_id,
    start_date: S.newVac.startDate,
    end_date: S.newVac.endDate,
    type,
    status: "pending",
    reason: S.newVac.reason || null
  };

  const { error } = await sb.from("vacations").insert([payload]);
  if (error) { toast("שגיאה: " + error.message, "err"); return; }

  // שלח מייל למנהל
  const adminEmp = S.employees.find(e => e.role === "admin" || e.role === "manager");
  if (adminEmp?.email) {
    const reqEmp = getEmp(empId) || S.profile;
    const typeLabel = type === "reserve" ? "מילואים 🎖️" : type === "exam" ? "מבחן 📝" : "חופשה 🌴";
    sendEmail("absence_request", adminEmp.email, {
      requesterName: reqEmp.name,
      typeLabel,
      type,
      startDate: S.newVac.startDate,
      endDate: S.newVac.endDate,
      reason: S.newVac.reason || ""
    });
  }

  const labels = { vacation: "חופשה 🌴", reserve: "מילואים 🎖️", exam: "מבחן 📝" };
  toast(`בקשת ${labels[type] || "היעדרות"} נשלחה לאישור מנהל ✓`);

  S.showAddVac = false;
  S.newVac = { type: "vacation", startDate: "", endDate: "", reason: "" };
  await loadVacations();
  render();
}

async function deleteVacRequest(id) {
  if (!confirm("למחוק את הבקשה?")) return;
  const { error } = await sb.from("vacations").delete().eq("id", id);
  if (error) { toast("שגיאה במחיקה: " + error.message, "err"); return; }
  S.vacations = S.vacations.filter(v => v.id !== id);
  toast("הבקשה נמחקה ✓");
  render();
}

async function updateVacStatus(id, status) {
  await sb.from("vacations").update({status, approved_by: S.user.id}).eq("id",id);
  await loadVacations();
  toast(status==="approved"?"חופשה אושרה ✓":"חופשה נדחתה"); render();

  // Send email to employee
  const vac = S.vacations.find(v=>v.id===id);
  if (vac) {
    const emp = getEmp(vac.employee_id);
    if (emp?.email) {
      sendEmail(
        status==="approved" ? "vacation_approved" : "vacation_rejected",
        emp.email,
        { empName: emp.name, startDate: vac.start_date, endDate: vac.end_date, reason: vac.reason||"" }
      );
    }
  }
}

// ══════════════════════════════════════════════════════
// SWAP ACTIONS
// ══════════════════════════════════════════════════════
async function updateSwapStatus(id, status) {
  await sb.from("swap_requests").update({status}).eq("id",id);
  await loadSwapRequests();
  toast(status==="approved"?"חילוף אושר ✓":"חילוף נדחה"); render();

  // Send email to requester
  const swap = S.swapRequests.find(s=>s.id===id);
  if (swap) {
    const requester = getEmp(swap.requester_id);
    if (requester?.email) {
      const sh = SHIFT_BY_ID[swap.target_shift];
      sendEmail(
        status==="approved" ? "vacation_approved" : "vacation_rejected",
        requester.email,
        {
          empName: requester.name,
          startDate: swap.target_date + " — " + (sh?.label||swap.target_shift),
          endDate: swap.target_date,
          reason: "בקשת חילוף " + (status==="approved"?"אושרה":"נדחתה")
        }
      );
    }
  }
}

  const wrap = e("div",{class:"login-wrap"});
  const card = e("div",{class:"login-card"});

  card.appendChild(div("logo-box",[

    e("div",{},[

  card.appendChild(e("p",{class:"subtitle"},isReg?"צור חשבון מנהל":"הכנס פרטים להמשך"));

  const form = e("form",{onsubmit: async ev => {
    ev.preventDefault();

        "",
        form.querySelector("[name=email]").value,
        form.querySelector("[name=pass]").value,
        form.querySelector("[name=invite]").value
      );
      else await handleLogin(
        form.querySelector("[name=email]").value,
        form.querySelector("[name=pass]").value
      );
    } catch(err) {
      errBox.textContent = "⚠️ "+(err.message||"שגיאה");
      errBox.classList.remove("hidden"); btn.disabled=false;
    }
  }});

  if (isReg) {
    form.appendChild(loginField("שם מלא","name","text","ישראל ישראלי",true));
    form.appendChild(loginField("שם העסק","biz","text","החברה שלי",true));

    form.appendChild(loginField("קוד הזמנה","invite","text","XXXXXX",true));

  form.appendChild(loginField("סיסמה","pass","password","••••••••",true));
  form.appendChild(e("button",{type:"submit",class:"btn-primary"},
    isReg?"צור חשבון מנהל →":isEmpReg?"הצטרף כעובד →":"כניסה →"));
  card.appendChild(form);

  // Switch links
  if (!isReg && !isEmpReg) {
    card.appendChild(div("switch-link",[
      "עובד חדש? ",
      e("a",{onclick:()=>{S.loginMode="emp_register";render();}},"הצטרף עם קוד הזמנה →")
    ]));
  } else {
    card.appendChild(div("switch-link",[
      "יש לך חשבון? ",
      e("a",{onclick:()=>{S.loginMode="login";render();}},"כניסה →")

  }
  wrap.appendChild(card);
  return wrap;
}

    row.appendChild(e("td",{style:"border-right:2px solid "+shift.color+"44;padding-right:12px"},[
      e("div",{style:"font-weight:700;font-size:13px;color:"+shift.color},shift.label),
      e("div",{style:"font-size:10px;color:#475569"},shift.start+"–"+shift.end)
    ]));
    wdDisplay.forEach(date => {
      const empIds = S.schedule[date]?.[shift.id] || [];
      const isSel = S.selectedCell?.date===date && S.selectedCell?.shift===shift.id;
      const canEdit = isManager();
      const td = e("td",{
        class: isSel ? "selected" : "",
        style: "--shift-color:"+shift.color+(canEdit?";cursor:pointer":";cursor:default"),
        onclick: () => {
          if (!canEdit) return;
          S.selectedCell = isSel ? null : {date, shift:shift.id};
          render();
        }
      });
      if (empIds.length === 0) {
        td.appendChild(div("cell-empty",["ריק"]));
      } else {
        empIds.forEach(empId => {
          const emp = getEmp(empId);
          if (!emp) return;
          const i = empIdx(empId);
          const col = ec(i);
          const ch = S.customHours[date+"|"+shift.id+"|"+empId];
          const chip = e("div",{class:"emp-chip",style:`background:${col}22;border:1px solid ${col}44;color:${col}`},[
            e("span",{style:`width:6px;height:6px;border-radius:50%;background:${col};flex-shrink:0`},""),
            e("span",{},emp.name.split(" ")[0]),
            ch ? e("span",{style:"font-size:9px;opacity:0.7"},` ${ch.start}-${ch.end}`) : null,
            S.assignmentNotes[date+"|"+shift.id+"|"+empId] ? e("div",{style:"font-size:8px;color:#F59E0B;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px"},"📝 "+S.assignmentNotes[date+"|"+shift.id+"|"+empId]) : null
          ]);
          td.appendChild(chip);
        });
      }
      row.appendChild(td);
    });
    tbody.appendChild(row);
  });
  tbl.appendChild(tbody);
  gridWrap.appendChild(tbl);
  gridCard.appendChild(gridWrap);
  wrap.appendChild(gridCard);

  // Cell editor
  if (S.selectedCell) {
    wrap.appendChild(viewCellEditor(S.selectedCell.date, S.selectedCell.shift));
  }

  // Workload
  wrap.appendChild(viewWorkload(wd));
  return wrap;
}

function viewCellEditor(date, shiftId) {
  const shift = SHIFT_BY_ID[shiftId];
  const assignedIds = S.schedule[date]?.[shiftId] || [];
  const editor = div("cell-editor");
  editor.appendChild(e("div",{class:"cell-editor-title"},`✏️ ${shift.label} — ${fmtDate(date)}`));

  const btnWrap = e("div");
  S.employees.forEach((emp, idx) => {
    const col = ec(idx);
    const onVac = S.vacations.some(v=>v.employee_id===emp.id&&v.status==="approved"&&date>=v.start_date&&date<=v.end_date);
    const isAssigned = assignedIds.includes(emp.id);
    const locked = S.lockedSlots[date+"|"+shiftId]?.has(emp.id);

    const chip = e("button",{
      class:"cell-emp-btn"+(isAssigned?" assigned":""),
      style:`background:${isAssigned?col+"33":"#0F172A"};border:1px solid ${isAssigned?col:col+"44"};color:${col};opacity:${onVac?0.4:1}`,
      disabled: onVac,
      onclick: () => toggleCellEmp(date, shiftId, emp.id)
    },[
      e("span",{style:`width:7px;height:7px;border-radius:50%;background:${col}`},""),
      e("span",{},emp.name),
      onVac ? e("span",{},"🌴") : null,
      locked ? e("span",{},"🔒") : null
    ]);
    btnWrap.appendChild(chip);

    if (isAssigned) {
      // Lock button

        class:"btn-icon",
        title: locked?"שחרר נעילה":"נעל שיבוץ",

      }, locked?"🔒":"🔓");
      btnWrap.appendChild(lockBtn);

      // Custom hours button
      const chKey = date+"|"+shiftId+"|"+emp.id;

      const noteBtn = e("button",{

        title:"הערה",
        style:"margin-right:-8px;margin-left:4px;font-size:12px;color:"+(existingNote?"#F59E0B":"#475569"),

          if (existingEditor) { existingEditor.remove(); return; }
          const editorDiv = e("div",{
            id:"note-editor-"+noteKey.replace(/[|]/g,"_"),
            style:"display:flex;align-items:center;gap:6px;background:#0F172A;border:1px solid #334155;border-radius:8px;padding:6px 10px;margin:4px;width:100%"
          },[
            e("input",{type:"text",value:existingNote||"",placeholder:"הערה (מהבית, מערכת XY...)",
              style:"flex:1;background:#1E293B;border:1px solid #334155;border-radius:6px;color:#E2E8F0;font-size:12px;padding:5px 8px;font-family:inherit",
              id:"note-inp-"+noteKey.replace(/[|]/g,"_")}),
            e("button",{
              style:"background:#10B98122;border:1px solid #10B98144;color:#10B981;border-radius:6px;padding:3px 8px;font-size:11px;font-family:inherit;font-weight:700",
              onclick:(ev2)=>{
                ev2.stopPropagation();
                const val=document.getElementById("note-inp-"+noteKey.replace(/[|]/g,"_")).value;
                if(val) S.assignmentNotes[noteKey]=val;
                else delete S.assignmentNotes[noteKey];
                saveScheduleToDB();
                toast("הערה נשמרה ✓");render();
              }
            },"שמור"),
            e("button",{
              style:"background:#EF444422;border:1px solid #EF444444;color:#EF4444;border-radius:6px;padding:3px 8px;font-size:11px;font-family:inherit;font-weight:700",
              onclick:(ev2)=>{

                delete S.assignmentNotes[noteKey];
                saveScheduleToDB();
                toast("הערה הוסרה");render();
              }
            },"מחק")
          ]);
          btnWrap.appendChild(editorDiv);
        }
      }, existingNote?"📝":"💬");
      btnWrap.appendChild(noteBtn);

      const hoursBtn = e("button",{
        class:"btn-icon",
        title:"ערוך שעות",
        style:"margin-right:-8px;margin-left:4px;font-size:12px;color:#94A3B8",
        onclick: (ev) => {
          ev.stopPropagation();
          const sh = SHIFT_BY_ID[shiftId];
          const curStart = existingCh?.start || sh.start;
          const curEnd = existingCh?.end || sh.end;

          const existingEditor = document.getElementById("hours-editor-"+chKey.replace(/[|]/g,"_"));

            id:"hours-editor-"+chKey.replace(/[|]/g,"_"),

            e("span",{style:"color:#475569;font-size:11px"},"—"),
            e("input",{type:"time",value:curEnd,style:"background:#1E293B;border:1px solid #334155;border-radius:6px;color:#E2E8F0;font-size:12px;padding:3px 6px;font-family:inherit",
              id:"ch-end-"+chKey.replace(/[|]/g,"_")}),
            e("button",{
              style:"background:#10B98122;border:1px solid #10B98144;color:#10B981;border-radius:6px;padding:3px 8px;font-size:11px;font-family:inherit;font-weight:700",
              onclick:(ev2)=>{
                ev2.stopPropagation();
                const s=document.getElementById("ch-start-"+chKey.replace(/[|]/g,"_")).value;
                const en=document.getElementById("ch-end-"+chKey.replace(/[|]/g,"_")).value;
                if(s&&en){S.customHours[chKey]={start:s,end:en};saveScheduleToDB();toast("שעות עודכנו ✓");render();}
              }
            },"שמור"),
            e("button",{
              style:"background:#EF444422;border:1px solid #EF444444;color:#EF4444;border-radius:6px;padding:3px 8px;font-size:11px;font-family:inherit;font-weight:700",
              onclick:(ev2)=>{
                ev2.stopPropagation();
                delete S.customHours[chKey];saveScheduleToDB();toast("שעות אופסו");render();
              }
            },"אפס")
          ]);
          btnWrap.appendChild(editorDiv);
        }
      }, "⏰");
      btnWrap.appendChild(hoursBtn);
    }
  });
  editor.appendChild(btnWrap);
  return editor;
}

function viewWorkload(wd) {
  const counts = {};
  S.employees.forEach(emp => { counts[emp.id] = 0; });
  wd.forEach(d => SHIFTS.forEach(sh => {
    (S.schedule[d]?.[sh.id]||[]).forEach(id => { counts[id] = (counts[id]||0)+1; });
  }));

  const card = div("card",[e("div",{class:"card-title"},"עומס עובדים — השבוע")]);
  S.employees.forEach((emp, idx) => {
    const count = counts[emp.id]||0;
    const max = emp.max_shifts_per_week||5;
    const pct = Math.min(Math.round((count/max)*100),100);
    const over = count > max;
    const col = ec(idx);
    const barColor = over?"#EF4444":pct>80?"#F59E0B":"#10B981";
    card.appendChild(div("workload-row",[
      div("workload-info",[
        e("div",{style:"display:flex;align-items:center;gap:7px"},[
          e("span",{style:`width:8px;height:8px;border-radius:50%;background:${col}`},""),
          e("span",{style:"font-size:13px;font-weight:600"},emp.name),
          over ? e("span",{style:"font-size:10px;background:#EF444422;color:#EF4444;border:1px solid #EF444444;border-radius:4px;padding:1px 5px"},"חריגה!") : null
        ]),
        e("span",{style:"font-size:12px;color:"+(over?"#EF4444":"#94A3B8")},`${count}/${max}`)
      ]),
      div("workload-bar-bg",[
        e("div",{class:"workload-bar-fill",style:`width:${pct}%;background:${barColor}`})
      ])
    ]));
  });
  return card;
}

}

// ── SWAPS ──
async function processManagerDecision(swap, isApproved) {
  if (isApproved) {
    // אימות אחרון לפני אישור בסידור
    if (swap.target_date && swap.giver_id) { // חילוף הדדי
      // מקבל המשמרת (העובד השני) מקבל את המשמרת שלך, ומתעלמים מהמשמרת שהוא מוסר
      const c1 = checkShiftConflict(swap.date, swap.shift, swap.taker_id, swap.target_date, swap.target_shift);
      // אתה (מוסר המשמרת) מקבל את המשמרת שלו, ומתעלמים מהמשמרת שאתה מוסר
      const c2 = checkShiftConflict(swap.target_date, swap.target_shift, swap.giver_id, swap.date, swap.shift);
      
      if (c1) { toast("לא ניתן לאשר: "+c1,"err"); return; }
      if (c2) { toast("לא ניתן לאשר: "+c2,"err"); return; }
      
      const empsA = S.schedule[swap.date]?.[swap.shift];
      if (empsA) { const i = empsA.indexOf(swap.giver_id); if (i > -1) empsA[i] = swap.taker_id; }
      const empsB = S.schedule[swap.target_date]?.[swap.target_shift];
      if (empsB) { const i = empsB.indexOf(swap.taker_id); if (i > -1) empsB[i] = swap.giver_id; }
    } else if (swap.giver_id) { // מסירת משמרת
      const c = checkShiftConflict(swap.date, swap.shift, swap.taker_id);
      if (c) { toast("לא ניתן לאשר: "+c,"err"); return; }
      const emps = S.schedule[swap.date]?.[swap.shift];
      if (emps) { const i = emps.indexOf(swap.giver_id); if (i > -1) emps[i] = swap.taker_id; }
    } else { // הצטרפות למשמרת
      const c = checkShiftConflict(swap.date, swap.shift, swap.taker_id);
      if (c) { toast("לא ניתן לאשר: "+c,"err"); return; }
      const emps = S.schedule[swap.date]?.[swap.shift];
      if (emps && !emps.includes(swap.taker_id)) emps.push(swap.taker_id);
    }
    saveScheduleToDB();
  }

  await sb.from("swaps").update({status: isApproved?"approved":"rejected"}).eq("id", swap.id);

  const taker = getEmp(swap.taker_id);
  if (taker?.email) {
    const sh = SHIFT_BY_ID[swap.shift];
    sendEmail(
      "swap_decision", 
      taker.email,
      {
        empName: taker.name,
        targetDate: swap.target_date ? fmtDate(swap.date) + " ⇆ " + fmtDate(swap.target_date) : fmtDate(swap.date),
        shiftLabel: sh?.label || swap.shift,
        statusText: isApproved ? "אושרה" : "נדחתה",
        isApproved: isApproved
      }
    );
  }

  toast(isApproved ? "✓ אושר ועודכן בסידור" : "נדחה");
  await loadSwapRequests();
  render();
}

// ── אישור/דחייה של העובד השני (Peer) ──
async function processPeerDecision(swap, isApproved) {
  const newStatus = isApproved ? "pending_manager" : "rejected";
  const { error } = await sb.from("swaps").update({status: newStatus}).eq("id", swap.id);
  if (error) { toast("שגיאה: " + error.message, "err"); return; }

  // אם העובד אישר, עכשיו שולחים את המייל למנהל!
  if (isApproved) {
    const adminEmp = S.employees.find(e => e.role === "admin" || e.role === "manager");
    const giverEmp = getEmp(swap.giver_id);
    const takerEmp = getEmp(swap.taker_id);
    const sh = SHIFT_BY_ID[swap.shift];
    const tSh = SHIFT_BY_ID[swap.target_shift];
    
    if (adminEmp?.email) {
      let shiftLabel = "";
      let tDateStr = fmtDate(swap.date);
      
      if (swap.target_date) {
        shiftLabel = "החלפה הדדית בין " + giverEmp?.name + " ל-" + takerEmp?.name;
        tDateStr = fmtDate(swap.date) + " (" + sh?.label + ") ⇆ " + fmtDate(swap.target_date) + " (" + tSh?.label + ")";
      } else {
        shiftLabel = sh?.label + " — מסירה מ-" + giverEmp?.name + " ל-" + takerEmp?.name;
      }

     let emailTitle = swap.target_date ? "🔄 בקשת החלפה הדדית" : "📤 בקשת מסירת משמרת";
      sendEmail("swap_request", adminEmp.email, {
        title: emailTitle, // <--- הוספנו כותרת
        requesterName: "הודעת מערכת",
        targetDate: tDateStr,
        shiftLabel: shiftLabel,
        note: swap.note || ""
      });
    }
    toast("אישרת את הבקשה! הועבר לאישור מנהל ✓");
  } else {
    toast("דחית את הבקשה");
  }
  
  await loadSwapRequests();
  render();
}

    const availableShifts = [];
    Object.keys(S.schedule).filter(d=>d>=todayStr).sort().forEach(date=>{
      SHIFTS.forEach(sh=>{
        const empIds = S.schedule[date]?.[sh.id]||[];

            if (checkShiftConflict(date, sh.id, myEmpId)) return;
          availableShifts.push({date,shift:sh,empIds});

    });

    if(availableShifts.length===0){

    } else {
      availableShifts.forEach(({date,shift,empIds})=>{
        const dt = new Date(date+"T00:00:00");
        card.appendChild(e("div",{style:"background:#0F172A;border:1px solid " + shift.color + "33;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center"},[
          e("div",{},[
            e("div",{style:"font-weight:800;font-size:14px;color:" + shift.color},DAYS[dt.getDay()] + " " + dt.getDate() + " — " + shift.label),
            e("div",{style:"font-size:11px;color:#64748B;margin-top:3px"},
              empIds.length > 0 ? "משובצים: " + empIds.map(id=>getEmp(id)?.name.split(" ")[0]||"?").join(", ") : "אין משובצים")
          ]),
          btn("btn-sm btn-sm-blue","+ הצטרף",async()=>{
            const conflict = checkShiftConflict(date, shift.id, myEmpId);
            if (conflict) { toast(conflict,"err"); return; }

            const {error}=await sb.from("swaps").insert([{
              business_id:S.profile.business_id,
              taker_id:myEmpId,
              giver_id:null,
              date,shift:shift.id,
              status:"pending_manager"
            }]);
            if(error){toast("שגיאה: " + error.message,"err");return;}
            await loadSwapRequests();
            const adminEmp2 = S.employees.find(e=>e.role==="admin"||e.role==="manager");
            if(adminEmp2?.email){
              const viewingEmp = S.testAsEmployee ? getEmp(S.empViewId) : S.profile;
              sendEmail("swap_request",adminEmp2.email,{
                title: "➕ בקשת הצטרפות למשמרת", 
                requesterName: viewingEmp?.name || "עובד",
                targetDate: fmtDate(date),
                shiftLabel: (shift.label + " (" + shift.start + "–" + shift.end + ")"),
                note: ""
              });
            }

          })
        ]));
      });
    }
    wrap.appendChild(card);
  }

  // ── סטטוס הבקשות שהגשתי ──
  const myReqs = S.swaps.filter(s=>s.giver_id===myEmpId||s.taker_id===myEmpId);
  if(myReqs.length>0){
    const sCard = div("card",[e("div",{style:"font-weight:700;font-size:13px;color:#64748B;margin-bottom:10px"},"⏳ הבקשות שלי")]);

      let badgeText = "ממתין";
      if (s.status === "approved") { badgeClass = "approved"; badgeText = "אושר"; }
      else if (s.status === "rejected") { badgeClass = "rejected"; badgeText = "נדחה"; }
      else if (s.status === "pending_peer") { badgeClass = "pending"; badgeText = "ממתין לעובד"; }
      else if (s.status === "pending_manager") { badgeClass = "pending"; badgeText = "ממתין למנהל"; }

        e("span",{class:"status-badge status-"+badgeClass}, badgeText)
      ]));
    });
    wrap.appendChild(sCard);
  }

  return wrap;
}

// ── STATS ──
function viewStats() {
  const wd = getWeekDates(S.weekOffset);
  const totalAssigned = wd.reduce((t,d)=>t+SHIFTS.reduce((s,sh)=>s+(S.schedule[d]?.[sh.id]?.length||0),0),0);
  const maxPossible = wd.length * SHIFTS.length * 2;
  const fillRate = maxPossible > 0 ? Math.round((totalAssigned/maxPossible)*100) : 0;

  const wrap = e("div");
  wrap.appendChild(div("page-title",["📊 דשבורד נתונים"],{style:"margin-bottom:16px"}));

  // KPIs
  const kpis = [
    {icon:"📅",lbl:"שיבוצים",val:totalAssigned,sub:"השבוע",color:"#3B82F6"},
    {icon:"📈",lbl:"אחוז מילוי",val:fillRate+"%",sub:fillRate>70?"מצוין":"דורש שיפור",color:fillRate>70?"#10B981":"#F59E0B"},
    {icon:"🌴",lbl:"חופשות ממתינות",val:S.vacations.filter(v=>v.status==="pending").length,sub:"לאישור",color:"#6366F1"},
    {icon:"👥",lbl:"עובדים פעילים",val:S.employees.length,sub:"במערכת",color:"#10B981"},
  ];
  const kpiGrid = div("kpi-grid");
  kpis.forEach(k => kpiGrid.appendChild(div("kpi",[
    div("kpi-icon",[k.icon]),
    e("div",{class:"kpi-val",style:"color:"+k.color},String(k.val)),
    div("kpi-lbl",[k.lbl]),
    k.sub?e("div",{class:"kpi-sub"},[k.sub]):null
  ],{style:"border-color:"+k.color+"33"})));
  wrap.appendChild(kpiGrid);

  // Per shift
  const shiftCard = div("card",[e("div",{class:"card-title"},"מילוי לפי משמרת")]);
  SHIFTS.forEach(sh => {
    const total = wd.reduce((s,d)=>s+(S.schedule[d]?.[sh.id]?.length||0),0);
    const max = wd.length*2;
    const pct = Math.round((total/max)*100);
    shiftCard.appendChild(div("workload-row",[
      div("workload-info",[
        e("span",{style:"font-weight:700;color:"+sh.color},sh.label+" ("+sh.start+"–"+sh.end+")"),
        e("span",{style:"font-size:12px;color:#94A3B8"},`${total}/${max} · ${pct}%`)
      ]),
      div("workload-bar-bg",[e("div",{class:"workload-bar-fill",style:`width:${pct}%;background:${sh.color}`})])
    ]));
  });
  wrap.appendChild(shiftCard);

  // Per employee
  const empCard = div("card",[e("div",{class:"card-title"},"פירוט לפי עובד")]);
  S.employees.forEach((emp,idx) => {
    const col = ec(idx);
    const count = wd.reduce((t,d)=>t+SHIFTS.reduce((s,sh)=>s+((S.schedule[d]?.[sh.id]||[]).includes(emp.id)?1:0),0),0);
    const max = emp.max_shifts_per_week||5;
    const pct = Math.min(Math.round((count/max)*100),100);
    const over = count>max;
    empCard.appendChild(div("workload-row",[
      div("workload-info",[
        e("div",{style:"display:flex;align-items:center;gap:7px"},[
          e("span",{style:`width:8px;height:8px;border-radius:50%;background:${col}`},""),
          e("span",{style:"font-weight:600;font-size:13px"},emp.name),
          over?e("span",{style:"font-size:10px;color:#EF4444"},"⚠️"):null
        ]),
        e("span",{style:"font-size:12px;font-weight:700;color:"+(over?"#EF4444":"#94A3B8")},`${count}/${max}`)
      ]),
      div("workload-bar-bg",[e("div",{class:"workload-bar-fill",style:`width:${pct}%;background:${over?"#EF4444":pct>80?"#F59E0B":"#10B981"}`})])
    ]));
  });
  wrap.appendChild(empCard);
  return wrap;
}

// EXPORT
// ══════════════════════════════════════════════════════
function exportSchedulePDF() {
  const wd = getWeekDates(S.weekOffset);
  const weekLabel = fmtDate(wd[0]) + " — " + fmtDate(wd[6]);

  let html = `<!DOCTYPE html><html dir="rtl" lang="he">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body{font-family:Heebo,sans-serif;direction:rtl;padding:20px;color:#1a1a2e;background:white}
  h1{font-weight:900;font-size:22px;margin-bottom:4px}
  .sub{color:#666;font-size:13px;margin-bottom:20px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#1E293B;color:white;padding:8px 6px;text-align:center;font-weight:700}
  th:first-child{text-align:right}
  td{padding:7px 5px;border:1px solid #ddd;text-align:center;vertical-align:top}
  td:first-child{text-align:right;font-weight:700;white-space:nowrap}
  .chip{display:inline-block;border-radius:4px;padding:2px 6px;margin:1px;font-size:10px;font-weight:700}
  .morning{background:#FEF3C7;color:#92400E}
  .afternoon{background:#D1FAE5;color:#065F46}
  .night{background:#EDE9FE;color:#4C1D95}
  .empty{color:#ccc;font-size:11px}
  @media print{body{padding:0}}
</style></head><body>
<h1>סידור עבודה — ${S.business?.name||"ניהול משמרות"}</h1>
<div class="sub">${weekLabel}</div>
<table>
<tr><th>משמרת</th>`;

  wd.forEach(date => {
    const dt = new Date(date+"T00:00:00");
    html += `<th>${DAYS[dt.getDay()]}<br><strong>${dt.getDate()}</strong></th>`;
  });
  html += "</tr>";

  SHIFTS.forEach(sh => {
    html += `<tr><td class="${sh.id}">${sh.label}<br><small>${sh.start}–${sh.end}</small></td>`;
    wd.forEach(date => {
      const empIds = S.schedule[date]?.[sh.id]||[];
      html += "<td>";
      if (empIds.length === 0) {
        html += '<span class="empty">—</span>';
      } else {
        empIds.forEach(id => {
          const emp = getEmp(id);
          const ch = S.customHours[date+"|"+sh.id+"|"+id];
          html += `<span class="chip ${sh.id}">${emp?.name||"?"}</span>`;
          if (ch) html += `<br><small style="font-size:9px;color:#666">${ch.start}–${ch.end}</small>`;
        });
      }
      html += "</td>";
    });
    html += "</tr>";
  });
  html += `</table>
<div style="margin-top:16px;font-size:11px;color:#999">הופק מ-Shift SOC PMO · ${new Date().toLocaleDateString("he-IL")}</div>
</body></html>`;

  const win = window.open("","_blank");
  if (!win) { toast("אפשר חלונות קופצים בדפדפן","err"); return; }
  win.document.write(html);
  win.document.close();
  setTimeout(()=>win.print(), 500);
  toast("פותח לייצוא PDF ✓");
}

function exportScheduleCSV() {
  const wd = getWeekDates(S.weekOffset);
  let csv = "\u05de\u05e9\u05de\u05e8\u05ea,\u05e9\u05e2\u05d5\u05ea,"+wd.map(d=>{const dt=new Date(d+"T00:00:00");return DAYS[dt.getDay()]+" "+dt.getDate();}).join(",")+String.fromCharCode(10);
  SHIFTS.forEach(sh => {
    const row = [sh.label, sh.start+"–"+sh.end];
    wd.forEach(date => {
      const empIds = S.schedule[date]?.[sh.id]||[];
      row.push(empIds.map(id=>getEmp(id)?.name||"?").join(" + ")||"—");
    });
    csv += row.map(v=>"\""+v+"\"").join(",") + String.fromCharCode(10);
  });
  const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`seder_avoda_${getWeekDates(S.weekOffset)[0]}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast("קובץ CSV הורד ✓");
}

      await sb.from("profiles").update({role: "admin"}).eq("id", targetId);

  const my = S.vacations.filter(x => x.employee_id === S.user.id);
  const wrap = div("");

  wrap.appendChild(div("page-title", ["🌴 היעדרויות"]));

  wrap.appendChild(btn("btn-add", "+ הגשת בקשה חדשה", () => {
    S.showAddVac = !S.showAddVac;
    if (S.showAddVac) S.newVac = { type: "vacation", startDate: "", endDate: "", reason: "" };
    render();
  }, { style: "width:100%; margin-bottom:15px; padding:15px; font-weight:800;" }));

  // Submission form
  if (S.showAddVac) {
    const typeIcons = { vacation: "🌴", reserve: "🎖️", exam: "📝" };
    const typeNames = { vacation: "חופשה", reserve: "מילואים", exam: "מבחן" };

    const f = div("card", [div("card-title", ["📝 הגשת בקשה חדשה"])]);

    // Type selector - big buttons
    const typeSel = e("div", { style: "display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px" });
    ["vacation", "reserve", "exam"].forEach(type => {
      const sel = (S.newVac.type || "vacation") === type;
      const colors = { vacation: "#10B981", reserve: "#6366F1", exam: "#F59E0B" };
      typeSel.appendChild(e("button", {
        style: `padding:12px 8px;border-radius:12px;border:2px solid ${sel ? colors[type] : colors[type]+"44"};background:${sel ? colors[type]+"22" : "#0F172A"};color:${sel ? colors[type] : "#64748B"};font-family:inherit;font-weight:800;font-size:13px;cursor:pointer`,
        onclick: () => { S.newVac.type = type; render(); }
      }, [
        e("div", { style: "font-size:20px;margin-bottom:4px" }, typeIcons[type]),
        e("div", {}, typeNames[type])
      ]));
    });
    f.appendChild(typeSel);

    // Info banner based on type
    const infos = {
      vacation: { color: "#10B981", text: "📤 בקשת חופשה תישלח לאישור מנהל — לאחר אישור תחסום את המשמרות" },
      reserve:  { color: "#6366F1", text: "📤 בקשת מילואים תישלח לאישור מנהל — לאחר אישור תחסום את המשמרות" },
      exam:     { color: "#F59E0B", text: "📤 בקשת מבחן תישלח לאישור מנהל — לאחר אישור לא תחסום משמרות, רק תתריע" },
    };
    const info = infos[S.newVac.type || "vacation"];
    f.appendChild(e("div", {
      style: `background:${info.color}11;border:1px solid ${info.color}33;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:${info.color};margin-bottom:14px`
    }, info.text));

    f.appendChild(div("form-row", [
      div("form-col", [
        e("label", { class: "form-label" }, "מתאריך *"),
        e("input", { type: "date", class: "fi", oninput: x => S.newVac.startDate = x.target.value })
      ]),
      div("form-col", [
        e("label", { class: "form-label" }, "עד תאריך *"),
        e("input", { type: "date", class: "fi", oninput: x => S.newVac.endDate = x.target.value })
      ])
    ]));

    f.appendChild(e("label", { class: "form-label", style: "margin-top:8px;display:block" }, "הערה (אופציונלי)"));
    f.appendChild(e("input", {
      class: "fi", placeholder: "למשל: מבחן בליניארית, מילואים בנגב...",
      style: "margin-bottom:14px",
      oninput: x => S.newVac.reason = x.target.value
    }));

    f.appendChild(btn("btn-primary", "שלח בקשה", async () => {
      if (!S.newVac.startDate || !S.newVac.endDate) return toast("נא למלא תאריכים", "err");
      await addVacation();
      S.showAddVac = false;
      render();
    }, { style: "width:100%; padding:12px;" }));
    wrap.appendChild(f);
  }

  // List of requests
  if (my.length === 0) {
    wrap.appendChild(div("card", [e("div", { style: "text-align:center;padding:24px;color:#64748B" }, "אין בקשות קודמות")]));
  } else {
    const card = div("card");
    const typeIcons2 = { vacation: "🌴", reserve: "🎖️", exam: "📝" };
    const typeNames2 = { vacation: "חופשה", reserve: "מילואים", exam: "מבחן" };
    const typeColors = { vacation: "#10B981", reserve: "#6366F1", exam: "#F59E0B" };

    my.sort((a, b) => String(b.start_date).localeCompare(String(a.start_date))).forEach(v => {
      const st = v.status === "approved" ? "approved" : v.status === "rejected" ? "rejected" : "pending";
      const label = v.status === "approved" ? "אושרה ✓" : v.status === "rejected" ? "נדחתה ✗" : "ממתין לאישור";
      const col = typeColors[v.type] || "#10B981";

      card.appendChild(e("div", { style: "display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #0F172A" }, [
        e("div", {}, [
          e("div", { style: `font-weight:800;font-size:14px;color:#F1F5F9` }, [
            e("span", { style: `color:${col};margin-left:6px` }, typeIcons2[v.type] || "🌴"),
            `${typeNames2[v.type] || "חופשה"}: ${fmtDate(v.start_date)}${v.start_date !== v.end_date ? " — " + fmtDate(v.end_date) : ""}`
          ]),
          v.reason ? e("div", { style: "font-size:11px;color:#64748B;margin-top:3px" }, v.reason) : null,
          e("div", { style: "margin-top:5px" }, [e("span", { class: "status-badge status-" + st }, label)])
        ]),
        btn("btn-sm btn-sm-red", "🗑️", () => deleteVacRequest(v.id))
      ]));
    });
    wrap.appendChild(card);
  }
  return wrap;
}

// ══════════════════════════════════════════════════════
// CALENDAR VIEW
// ══════════════════════════════════════════════════════
function viewCalendar() {
  const wrap = e("div");
  if (!S.monthOffset) S.monthOffset = 0;
  
  const now = new Date();
  const viewMonth = now.getMonth() + S.monthOffset;
  const viewYear = now.getFullYear() + Math.floor(viewMonth / 12);
  const actualMonth = ((viewMonth % 12) + 12) % 12;
  
  const monthName = new Date(viewYear, actualMonth, 1).toLocaleDateString("he-IL", {month:"long", year:"numeric"});

  wrap.appendChild(div("section-header",[
    div("page-title",["🗓️ "+monthName]),
    e("div",{style:"display:flex;gap:8px"},[
      btn("btn-sm btn-sm-gray","→",()=>{S.monthOffset++;render();}),
      btn("btn-sm btn-sm-blue","החודש",()=>{S.monthOffset=0;render();}),
      btn("btn-sm btn-sm-gray","←",()=>{S.monthOffset--;render();})
    ])
  ]));

  const firstDay = new Date(viewYear, actualMonth, 1);
  const lastDay = new Date(viewYear, actualMonth + 1, 0);
  const startDow = firstDay.getDay();
  const totalDays = lastDay.getDate();

  const calCard = div("card");
  calCard.style.padding = "12px";

  // Day headers
  const hdrRow = e("div",{style:"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px"});
  DAYS.forEach(d=>hdrRow.appendChild(e("div",{style:"text-align:center;font-size:11px;font-weight:700;color:#64748B;padding:4px 0"},d)));
  calCard.appendChild(hdrRow);

  const grid = e("div",{style:"display:grid;grid-template-columns:repeat(7,1fr);gap:2px"});

  for (let i=0; i<startDow; i++) {
    grid.appendChild(e("div",{style:"min-height:70px"}));
  }

  for (let d=1; d<=totalDays; d++) {
    const dateStr = viewYear+"-"+String(actualMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const dt = new Date(dateStr+"T00:00:00");
    const isToday = dateStr === today();

    const cell = e("div",{
      style:"min-height:70px;background:"+(isToday?"#1E3A5F":"#1E293B")+";border-radius:8px;padding:4px;border:1px solid "+(isToday?"#3B82F6":"#334155")+";cursor:pointer;overflow:hidden",
      onclick:()=>{
        const diffDays = Math.round((dt - new Date(today()+"T00:00:00"))/(1000*60*60*24));
        S.weekOffset = Math.floor(diffDays/7);
        S.view="schedule";
        loadSchedule().then(()=>render());
      }
    });

    cell.appendChild(e("div",{style:"font-size:12px;font-weight:"+(isToday?"900":"600")+";color:"+(isToday?"#60A5FA":"#E2E8F0")+";margin-bottom:2px"},String(d)));

    // Show schedule data if available
    const daySched = S.schedule[dateStr];
    if (daySched) {
      SHIFTS.forEach(sh => {
        const empIds = daySched[sh.id];
        if (Array.isArray(empIds) && empIds.length > 0) {
          cell.appendChild(e("div",{style:"font-size:8px;background:"+sh.color+"22;color:"+sh.color+";border-radius:3px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"},sh.label+": "+empIds.length));
        }
      });
    }

    // Vacations
    const dayVacs = S.vacations.filter(v=>v.status==="approved"&&v.type!=="exam"&&dateStr>=v.start_date&&dateStr<=v.end_date);
    dayVacs.slice(0,2).forEach(v=>{
      const emp=getEmp(v.employee_id);
      if(emp) cell.appendChild(e("div",{style:"font-size:8px;color:#F59E0B;white-space:nowrap;overflow:hidden"},"🌴 "+emp.name.split(" ")[0]));
    });

    grid.appendChild(cell);
  }

  calCard.appendChild(grid);
  wrap.appendChild(calCard);
  return wrap;
}
