                      📋 הגש זמינות לשבוע הבא
                    </button>
                    <div style={{ display:"flex", gap:8 }}>
                      <button onClick={()=>{ setEmpViewVacForm(v=>!v); setEmpViewAvailForm(false); }}
                        style={{ flex:1, background:"linear-gradient(135deg,#10B981,#059669)", border:"none", color:"white", borderRadius:12, padding:"11px 0", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:13, boxShadow:"0 4px 14px #10B98133" }}>
                        🌴 בקש חופשה
                      </button>
                      <button onClick={()=>{ setShowSwapModal(true); }}
                        style={{ flex:1, background:"linear-gradient(135deg,#A855F7,#7C3AED)", border:"none", color:"white", borderRadius:12, padding:"11px 0", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:13, boxShadow:"0 4px 14px #A855F733" }}>
                        🔄 בקש שינוי משמרת
                      </button>
                    </div>
                  </div>

                  {/* ── Availability submission form ── */}
                  {empViewAvailForm && (() => {
                    const targetDates = getWeekDates(weekOffset + availTargetOffset);
                    const targetStart = dateToStr(targetDates[0]);
                    const alreadySubmitted = availSubmissions.find(s=>s.empId===emp.id&&s.weekStart===targetStart);

                    return (
                      <div style={{ background:"#1E293B", border:"1px solid #F59E0B44", borderRadius:14, padding:18, marginBottom:14 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                          <div style={{ fontWeight:700, fontSize:14, color:"#F59E0B" }}>📋 הגשת זמינות</div>
                          <button onClick={()=>setEmpViewAvailForm(false)} style={{ background:"none",border:"none",color:"#64748B",fontSize:18,cursor:"pointer" }}>✕</button>
                        </div>
                        {/* Week selector */}
                        <div style={{ display:"flex", gap:6, marginBottom:14 }}>
                          {[1,2].map(offset => {
                            const wd = getWeekDates(weekOffset + offset);
                            const label = offset===1 ? "שבוע הבא" : "עוד שבועיים";
                            const sel = availTargetOffset === offset;
                            const hasSubmit = availSubmissions.some(s=>s.empId===emp.id&&s.weekStart===dateToStr(wd[0]));
                            return (
                              <button key={offset} onClick={()=>{ setAvailTargetOffset(offset); setAvailDraft({}); }}
                                style={{ flex:1, padding:"8px 6px", borderRadius:10,
                                  border:`1px solid ${sel?"#F59E0Baa":"#334155"}`,
                                  background: sel?"#F59E0B22":"#0F172A",
                                  cursor:"pointer", fontFamily:"Heebo", textAlign:"center" }}>
                                <div style={{ fontSize:12, fontWeight:700, color:sel?"#F59E0B":"#94A3B8" }}>{label}</div>
                                <div style={{ fontSize:10, color:sel?"#F59E0B88":"#475569", marginTop:2 }}>
                                  {wd[0].toLocaleDateString("he-IL",{day:"numeric",month:"short"})} – {wd[6].toLocaleDateString("he-IL",{day:"numeric",month:"short"})}
                                </div>
                                {hasSubmit && <div style={{ fontSize:9, color:"#10B981", marginTop:2 }}>✓ הוגש</div>}
                              </button>
                            );
                          })}
                        </div>

                        {alreadySubmitted ? (
                          <div>
                            <div style={{ background:"#10B98115", border:"1px solid #10B98133", borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:13, color:"#10B981" }}>
                              ✓ הגשת זמינות לשבוע זה
                            </div>
                            <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:12 }}>
                              {alreadySubmitted.slots.map((sl,i)=>{
                                const col=SHIFT_COLORS[sl.shift]||"#94A3B8";
                                return <span key={i} style={{ fontSize:11, color:col, background:col+"18", borderRadius:5, padding:"2px 8px", border:`1px solid ${col}33` }}>{DAYS[sl.day]} {sl.shift}</span>
                              })}
                            </div>
                            {alreadySubmitted.note && <div style={{ fontSize:12, color:"#64748B", marginBottom:12 }}>💬 {alreadySubmitted.note}</div>}
                            <button onClick={()=>setAvailSubmissions(p=>p.filter(s=>!(s.empId===emp.id&&s.weekStart===targetStart)))}
                              style={{ width:"100%", background:"#EF444422", border:"1px solid #EF444444", color:"#EF4444", borderRadius:10, padding:"9px 0", cursor:"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:13 }}>
                              בטל הגשה
                            </button>
                          </div>
                        ) : (
                          <div>
                            <div style={{ fontSize:12, color:"#94A3B8", marginBottom:10 }}>סמן את הימים והמשמרות שאתה פנוי:</div>
                            {/* Grid: rows=days, cols=shifts */}
                            <div style={{ overflowX:"auto", marginBottom:12 }}>
                              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                                <thead>
                                  <tr>
                                    <th style={{ width:52 }}/>
                                    {shiftNames.map(sh=>(
                                      <th key={sh} style={{ textAlign:"center", fontSize:11, fontWeight:700, color:SHIFT_COLORS[sh]||"#94A3B8", padding:"4px 6px" }}>{sh}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {targetDates.map((date,di)=>(
                                    <tr key={di}>
                                      <td style={{ fontSize:12, color:"#94A3B8", padding:"4px 6px", fontWeight:600, whiteSpace:"nowrap" }}>
                                        {DAYS[date.getDay()]} {date.getDate()}
                                      </td>
                                      {shiftNames.map(sh=>{
                                        const key=`${di}|${sh}`;
                                        const checked=!!availDraft[key];
                                        const col=SHIFT_COLORS[sh]||"#94A3B8";
                                        return (
                                          <td key={sh} style={{ textAlign:"center", padding:"4px 6px" }}>
                                            {(() => {
                                          const dayNm = DAYS[date.getDay()];
                                          const empForAvail = employees.find(e=>e.id===emp.id);
                                          const con = empForAvail?.dayConstraints?.[dayNm]?.[sh];
                                          const blocked = con === 0;
                                          return blocked ? (
                                            <button disabled title="חסום על ידי המנהל"
                                              style={{ width:36, height:32, borderRadius:8, border:"1px solid #334155", background:"#0F172A", cursor:"not-allowed", fontSize:12, color:"#334155" }}>
                                              ✗
                                            </button>
                                          ) : (
                                            <button onClick={()=>setAvailDraft(p=>({...p,[key]:!p[key]}))}
                                              style={{ width:36, height:32, borderRadius:8, border:`1px solid ${checked?col:col+"33"}`,
                                                background:checked?col+"33":"#0F172A", cursor:"pointer",
                                                fontSize:14, color:checked?col:"#334155", fontWeight:700, transition:"all 0.15s" }}>
                                              {checked?"✓":"·"}
                                            </button>
                                          );
                                        })()}
                                          </td>
                                        );
                                      })}
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>

                            <div style={{ fontSize:11, color:"#475569", marginBottom:8 }}>
                              {Object.values(availDraft).filter(Boolean).length} משבצות נבחרו
                            </div>

                            <input id="avail_note" placeholder="הערה למנהל (אופציונלי)"
                              style={{ width:"100%", background:"#0F172A", border:"1px solid #334155", borderRadius:8,
                                padding:"9px 12px", color:"#E2E8F0", fontSize:13, fontFamily:"Heebo",
                                boxSizing:"border-box", marginBottom:12 }} />

                            <div style={{ display:"flex", gap:8 }}>
                              <button onClick={()=>{
                                const slots = Object.entries(availDraft)
                                  .filter(([,v])=>v)
                                  .map(([k])=>{ const [di,sh]=k.split("|"); return {day:targetDates[parseInt(di)].getDay(), dayIdx:parseInt(di), shift:sh}; });
                                if(slots.length===0){showToast("סמן לפחות משמרת אחת","error");return;}
                                const note=document.getElementById("avail_note").value;
                                setAvailSubmissions(p=>[...p,{
                                  id:Date.now(), empId:emp.id, empName:emp.name,
                                  weekStart:targetStart, slots, note
                                }]);
                                setAvailDraft({});
                                setEmpViewAvailForm(false);
                                showToast("זמינות נשלחה למנהל ✓");
                              }} style={{ flex:1, background:"linear-gradient(135deg,#F59E0B,#D97706)", border:"none", color:"white", borderRadius:10, padding:"11px 0", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:14 }}>
                                שלח זמינות
                              </button>
                              <button onClick={()=>{setEmpViewAvailForm(false);setAvailDraft({});}}
                                style={{ background:"#334155",border:"none",color:"#94A3B8",borderRadius:10,padding:"11px 14px",cursor:"pointer",fontFamily:"Heebo",fontWeight:600 }}>ביטול</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  {/* ── Vacation request form ── */}
                  {empViewVacForm && (
                    <div style={{ background:"#1E293B", border:"1px solid #10B98144", borderRadius:14, padding:18, marginBottom:16 }}>
                      <div style={{ fontWeight:700, fontSize:14, color:"#10B981", marginBottom:14 }}>🌴 בקשת חופשה חדשה</div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
                        <div>
                          <label style={{ fontSize:11, color:"#94A3B8", display:"block", marginBottom:5 }}>מתאריך</label>
                          <input type="date" id="ev_start" min={dateToStr(new Date())}
                            style={{ width:"100%", background:"#0F172A", border:"1px solid #334155", borderRadius:8, padding:"9px 10px", color:"#E2E8F0", fontSize:13, fontFamily:"Heebo", boxSizing:"border-box" }} />
                        </div>
                        <div>
                          <label style={{ fontSize:11, color:"#94A3B8", display:"block", marginBottom:5 }}>עד תאריך</label>
                          <input type="date" id="ev_end" min={dateToStr(new Date())}
                            style={{ width:"100%", background:"#0F172A", border:"1px solid #334155", borderRadius:8, padding:"9px 10px", color:"#E2E8F0", fontSize:13, fontFamily:"Heebo", boxSizing:"border-box" }} />
                        </div>
                      </div>
                      <input id="ev_reason" placeholder="סיבה (אופציונלי)"
                        style={{ width:"100%", background:"#0F172A", border:"1px solid #334155", borderRadius:8, padding:"9px 12px", color:"#E2E8F0", fontSize:13, fontFamily:"Heebo", boxSizing:"border-box", marginBottom:12 }} />
                      <div style={{ display:"flex", gap:8 }}>
                        <button onClick={()=>{
                          const start  = document.getElementById("ev_start").value;
                          const end    = document.getElementById("ev_end").value;
                          const reason = document.getElementById("ev_reason").value;
                          if (!start || !end) { showToast("נא למלא תאריכים","error"); return; }
                          if (end < start)    { showToast("תאריך סיום לפני התחלה","error"); return; }
                          if (start < dateToStr(new Date())) { showToast("לא ניתן לבקש חופשה בתאריך שעבר","error"); return; }
                          if (start < dateToStr(new Date())) { showToast("לא ניתן לבקש חופשה בתאריך שעבר","error"); return; }
                          setVacations(p=>[...p,{
                            id: Date.now(), employeeId: emp.id,
                            startDate: start, endDate: end,
                            status: "pending", reason: reason||""
                          }]);
                          setEmpViewVacForm(false);
                          showToast("בקשת חופשה נשלחה למנהל ✓");
                        }} style={{ flex:1, background:"#10B981", border:"none", color:"white", borderRadius:10, padding:"10px 0", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:14 }}>
                          שלח בקשה
                        </button>
                        <button onClick={()=>setEmpViewVacForm(false)}
                          style={{ background:"#334155", border:"none", color:"#94A3B8", borderRadius:10, padding:"10px 14px", cursor:"pointer", fontFamily:"Heebo", fontWeight:600 }}>
                          ביטול
                        </button>
                      </div>
                    </div>
                  )}

                  {/* ── Vacation history ── */}
                  {empVacs.length > 0 && (
                    <div style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:14, padding:16 }}>
                      <div style={{ fontWeight:700, fontSize:13, color:"#94A3B8", marginBottom:10 }}>🌴 בקשות חופשה</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                        {empVacs.map((v,i) => {
                          const sc = {
                            approved: { color:"#10B981", bg:"#10B98115", label:"אושרה ✓" },
                            pending:  { color:"#F59E0B", bg:"#F59E0B15", label:"ממתין לאישור" },
                            rejected: { color:"#EF4444", bg:"#EF444415", label:"נדחתה ✗" },
                          }[v.status]||{color:"#94A3B8",bg:"#94A3B815",label:v.status};
                          return (
                            <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                              background:sc.bg, border:`1px solid ${sc.color}33`, borderRadius:10, padding:"8px 12px" }}>
                              <div>
                                <div style={{ fontSize:12, fontWeight:600, color:"#E2E8F0" }}>
                                  {v.startDate}{v.startDate!==v.endDate?` – ${v.endDate}`:""}
                                </div>
                                {v.reason && <div style={{ fontSize:11, color:"#64748B" }}>{v.reason}</div>}
                              </div>
                              <span style={{ fontSize:11, fontWeight:700, color:sc.color }}>{sc.label}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                </div>)}

                  {/* ─── Read-only schedule tab ─── */}
                  {empViewTab==="schedule" && (
                    <div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                        <div style={{ fontWeight:700, fontSize:14, color:"#94A3B8" }}>📅 {weekLabel}</div>
                        <div style={{ display:"flex", gap:6 }}>
                          <button onClick={()=>setWeekOffset(w=>w-1)} style={{ background:"#1E293B", border:"1px solid #334155", color:"#94A3B8", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontFamily:"Heebo", fontSize:13 }}>←</button>
                          <button onClick={()=>setWeekOffset(0)} style={{ background:"#3B82F6", border:"none", color:"white", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:12 }}>השבוע</button>
                          <button onClick={()=>setWeekOffset(w=>w+1)} style={{ background:"#1E293B", border:"1px solid #334155", color:"#94A3B8", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontFamily:"Heebo", fontSize:13 }}>→</button>
                        </div>
                      </div>
                      {/* Read-only grid */}
                      <div style={{ overflowX:"auto" }}>
                        <table style={{ borderCollapse:"collapse", width:"100%", minWidth:320 }}>
                          <thead>
                            <tr>
                              <th style={{ padding:"8px 6px", fontSize:12, fontWeight:700, color:"#64748B", textAlign:"right", width:70 }}>משמרת</th>
                              {weekDates.map((date,i)=>{
                                const ds=dateToStr(date);
                                const isToday=ds===dateToStr(new Date());
                                return (
                                  <th key={i} style={{ padding:"8px 4px", textAlign:"center", minWidth:44 }}>
                                    <div style={{ fontSize:10, color:isToday?"#60A5FA":"#64748B" }}>{DAYS[date.getDay()].slice(0,2)}</div>
                                    <div style={{ fontSize:14, fontWeight:800, color:isToday?"#60A5FA":"#E2E8F0" }}>{date.getDate()}</div>
                                  </th>
                                );
                              })}
                            </tr>
                          </thead>
                          <tbody>
                            {shiftNames.map(shift=>{
                              const color=SHIFT_COLORS[shift]||"#94A3B8";
                              return (
                                <tr key={shift}>
                                  <td style={{ padding:"6px", fontSize:11, fontWeight:700, color, borderTop:"1px solid #1E293B" }}>
                                    {shift}<div style={{ fontSize:9, color:"#475569", fontWeight:400 }}>{shiftHours[shift]?.start}–{shiftHours[shift]?.end}</div>
                                  </td>
                                  {weekDates.map((date,i)=>{
                                    const ds=dateToStr(date);
                                    const empIds=schedule[ds]?.[shift]||[];
                                    const mySlot=empIds.includes(emp.id);
                                    return (
                                      <td key={i} style={{ padding:"4px 3px", verticalAlign:"top", borderTop:"1px solid #1E293B",
                                        background:mySlot?color+"18":"transparent" }}>
                                        {empIds.map(id=>{
                                          const e=employees.find(x=>x.id===id);
                                          if(!e) return null;
                                          const ec=empColor(employees.findIndex(x=>x.id===id));
                                          const isMe=id===emp.id;
                                          return (
                                            <div key={id} style={{ fontSize:10, fontWeight:isMe?800:500,
                                              color:isMe?color:ec,
                                              background:isMe?color+"22":ec+"14",
                                              borderRadius:5, padding:"2px 4px", marginBottom:2,
                                              border:isMe?`1px solid ${color}66`:"none",
                                              whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:44 }}>
                                              {e.name.split(" ")[0]}
                                            </div>
                                          );
                                        })}
                                        {empIds.length===0 && <div style={{ fontSize:9, color:"#334155", textAlign:"center" }}>—</div>}
                                      </td>
                                    );
                                  })}
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                      <div style={{ marginTop:10, fontSize:11, color:"#475569", textAlign:"center" }}>
                        👁 תצוגה בלבד — לא ניתן לערוך
                      </div>
                    </div>
                  )}

                  {/* ─── Read-only calendar tab ─── */}
                  {empViewTab==="calendar" && (
                    <div>
                      <CalendarView
                        employees={employees}
                        schedule={schedule}
                        vacations={vacations}
                        shiftHours={shiftHours}
                        shiftNames={shiftNames}
                        monthOffset={monthOffset}
                        setMonthOffset={setMonthOffset}
                        calFilterEmp={emp.id}
                        setCalFilterEmp={()=>{}}
                        calDayDetail={calDayDetail}
                        setCalDayDetail={setCalDayDetail}
                        lockedSlots={lockedSlots}
                        publishedWeeks={publishedWeeks}
                        readOnly={true}
                      />
                    </div>
                  )}

              </div>
              )}
            </div>
          );
        })()}


      </div>

      <style>{`
        @keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
        *{box-sizing:border-box}
        input:focus,select:focus{outline:2px solid #3B82F6;outline-offset:2px}
        button:hover{opacity:0.88;transform:translateY(-1px)}
        input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer}
        input[type="number"]::-webkit-inner-spin-button{opacity:0.5}
      `}</style>
    </div>
  );
}

window.__App = App;

  </script>

  <script>
    var _t = setInterval(function() {
      if (window.__App && window.ReactDOM) {
        clearInterval(_t);
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(window.__App)
        );
      }
    }, 200);
  </script>
</body>
</html>
