<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shift SOC PMO</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F172A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shift SOC PMO">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Heebo,sans-serif}
body{background:#0F172A;color:#E2E8F0;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
.hidden{display:none !important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1E293B}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
input:focus,select:focus{outline:2px solid #3B82F6;outline-offset:1px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;background:#060B14}
.login-wrap::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:48px 48px;z-index:0}
.login-wrap::after{content:"";position:absolute;top:-20%;right:-10%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.login-card{width:100%;max-width:460px;background:rgba(15,23,42,0.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:40px;box-shadow:0 32px 80px rgba(0,0,0,0.5);position:relative;z-index:1}
.logo-box{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 8px 24px rgba(59,130,246,0.3);flex-shrink:0}
.logo-name{font-weight:900;font-size:18px;color:#F1F5F9}
.logo-sub{font-size:11px;color:#475569;margin-top:2px}
.login-h1{font-weight:800;font-size:24px;color:#F1F5F9;letter-spacing:-0.5px;margin-bottom:6px}
.subtitle{font-size:13px;color:#475569;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#64748B;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
.field input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 16px;color:#F1F5F9;font-size:14px;outline:none;transition:all 0.2s}
.field input:focus{background:rgba(59,130,246,0.06);border-color:rgba(59,130,246,0.5);outline:none}
.btn-primary{width:100%;padding:14px 0;background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;border-radius:14px;color:white;font-weight:800;font-size:15px;box-shadow:0 8px 24px rgba(59,130,246,0.3);margin-top:8px}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.switch-link{text-align:center;margin-top:20px;font-size:13px;color:#475569}
.switch-link a{color:#60A5FA;font-weight:700;text-decoration:none;cursor:pointer}
.err-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:12px;padding:12px 16px;color:#FCA5A5;font-size:13px;margin-bottom:12px}

/* APP */
.app{min-height:100vh;background:#0F172A}
.header{background:linear-gradient(135deg,#1E293B,#0F172A);border-bottom:1px solid #1E3A5F;padding:0 20px;position:sticky;top:0;z-index:40}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:10px}
.nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:7px 11px;border-radius:8px;border:none;background:transparent;color:#94A3B8;font-weight:600;font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:4px;position:relative;flex-shrink:0}
.nav-btn.active{background:#3B82F6;color:white}
.badge{background:#EF4444;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;margin-right:2px}
.badge-purple{background:#A855F7}
.user-area{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-name{font-size:13px;font-weight:700;color:#E2E8F0}
.user-role-label{font-size:11px;color:#64748B}
.btn-logout{background:#1E293B;border:1px solid #334155;color:#64748B;border-radius:8px;padding:6px 12px;font-weight:600;font-size:12px}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}

/* CARDS */
.card{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:14px}
.card-title{font-weight:700;font-size:14px;color:#E2E8F0;margin-bottom:14px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.page-title{font-weight:900;font-size:22px;color:#E2E8F0}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#1E293B;border-radius:14px;padding:14px;border:1px solid #334155}
.kpi-icon{font-size:20px;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:900;line-height:1}
.kpi-lbl{font-size:11px;font-weight:700;color:#94A3B8;margin-top:3px}

/* QUICK ACTIONS */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.quick-btn{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:18px 16px;text-align:right;transition:border-color 0.2s}
.quick-btn:hover{border-color:#334155}
.q-icon{font-size:26px;margin-bottom:8px}
.q-label{font-weight:700;font-size:14px;color:#E2E8F0}
.q-sub{font-size:11px;color:#64748B;margin-top:3px}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:10px;font-size:12px;color:#64748B;font-weight:600;border-bottom:1px solid #334155}
td{padding:9px 10px;border-bottom:1px solid #0F172A;font-size:13px;vertical-align:middle}

/* BUTTONS */
.btn-add{background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;color:white;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px}
.btn-green{background:linear-gradient(135deg,#10B981,#059669);border:none;color:white;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px}
.btn-purple{background:linear-gradient(135deg,#A855F7,#7C3AED);border:none;color:white;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px}
.btn-sm{padding:5px 12px;border-radius:7px;border:none;font-weight:700;font-size:12px;font-family:inherit}
.btn-sm-green{background:#10B98122;border:1px solid #10B98144;color:#10B981}
.btn-sm-red{background:#EF444422;border:1px solid #EF444444;color:#EF4444}
.btn-sm-blue{background:#3B82F622;border:1px solid #3B82F644;color:#3B82F6}
.btn-sm-gray{background:#334155;border:1px solid #475569;color:#94A3B8}
.btn-icon{background:none;border:none;font-size:16px;padding:4px;line-height:1}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-col{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:#94A3B8;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.fi{width:100%;background:#0F172A;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#E2E8F0;font-size:13px;outline:none}
.fi:focus{border-color:#3B82F6}
.form-actions{display:flex;gap:8px;margin-top:12px}

/* SCHEDULE GRID - FIX ALIGNMENT & ORDER */
.sched-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.sched-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
  table-layout: fixed; /* קריטי ליישור עמודות */
}

/* הגדרת רוחב עמודת הכותרות (בוקר/צהריים/לילה) */
.sched-table th:first-child, 
.sched-table td:first-child {
  width: 110px; 
  text-align: right;
  padding: 10px 15px;
  font-weight: 800;
  border-left: 2px solid #334155; /* קו מפריד בין הכותרת לימים */
}

/* כל עמודות הימים יתחלקו שווה בשווה */
.sched-table th, 
.sched-table td {
  text-align: center;
  padding: 8px 4px;
  vertical-align: top;
  border: 1px solid #33415522;
}

.sched-table th {
  background: rgba(30, 41, 59, 0.5);
  font-size: 12px;
  height: 60px;
}

.sched-table td {
  height: 80px;
}

.emp-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 7px;
  padding: 4px 8px;
  margin: 2px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}

.sched-table td.selected {
  background: rgba(59, 130, 246, 0.1);
  border: 2px solid #3B82F6;
}

/* התיקון לעמודה הראשונה והיישור */
.sched-table th:first-child,
.sched-table td:first-child{padding:10px 16px;text-align:right;cursor:default;border:none;width:100px;font-weight:800}

.sched-table td.selected{border-color:var(--shift-color,#3B82F6);background:rgba(59,130,246,0.08)}
.sched-table td:not(:first-child):hover{background:#0F172A}
.emp-chip{display:inline-flex;align-items:center;gap:4px;border-radius:7px;padding:3px 8px;margin:2px;font-size:11px;font-weight:600}
.cell-empty{font-size:10px;color:#334155;padding:8px 0}
/* WORKLOAD BAR */
.workload-row{margin-bottom:10px}
.workload-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.workload-bar-bg{height:7px;background:#0F172A;border-radius:4px;overflow:hidden}
.workload-bar-fill{height:100%;border-radius:4px;transition:width 0.5s}

/* CONSTRAINTS */
.constraint-table{width:100%;border-collapse:collapse}
.constraint-table th{padding:5px 8px;font-size:11px;color:#94A3B8;font-weight:600;text-align:center}
.constraint-table td{padding:4px 6px;text-align:center}
.constraint-table td:first-child{text-align:right;font-size:12px;color:#94A3B8;font-weight:600;padding:4px 8px}
.constraint-cell{width:38px;height:30px;border-radius:7px;border:1px solid #334155;background:#0F172A;cursor:pointer;font-size:13px;font-weight:700;transition:all 0.15s}
.constraint-cell.allowed{background:var(--sc)33;border-color:var(--sc)88;color:var(--sc)}
.constraint-cell.blocked{background:#EF444418;border-color:#EF444433;color:#EF4444}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-weight:800;font-size:17px;color:#E2E8F0}
.modal-close{background:none;border:none;color:#64748B;font-size:22px;line-height:1;padding:0}

/* CELL EDITOR */
.cell-editor{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:18px;margin-bottom:14px}
.cell-editor-title{font-size:13px;font-weight:700;color:#94A3B8;margin-bottom:12px}
.cell-emp-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;margin:3px;font-family:inherit;font-size:13px;transition:all 0.15s}
.cell-emp-btn.assigned{font-weight:700}

/* STATUS BADGES */
.status-badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
.status-pending{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.status-approved{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.status-rejected{background:#EF444418;color:#EF4444;border:1px solid #EF444433}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10B981;color:white;padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999;white-space:nowrap}
.toast.err{background:#EF4444}
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1E293B;border-top:1px solid #334155;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -4px 20px rgba(0,0,0,0.3)}
@media(max-width:768px){
  /* Header */
  .header{padding:0 15px}
  .header-inner{height:60px}
  .header .nav{display:none}
  .user-name,.user-role-label{display:none}
  .btn-logout{padding:6px 12px;font-size:12px; border-radius: 10px;}

  /* Main Layout */
  .main{padding:15px 12px 100px 12px !important}
  .form-row{grid-template-columns:1fr !important}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .quick-grid{grid-template-columns:1fr 1fr}
  .card{padding:16px; border-radius: 16px;}
  .section-header{flex-direction:column;align-items:flex-start;gap:12px}
  .section-header > div:last-child{width:100%;display:flex;flex-wrap:wrap;gap:8px}
  .section-header > div:last-child > button{flex:1;min-width:80px;font-size:13px;padding:12px 10px; border-radius: 10px;}

  /* iOS Input Zoom Fix & Form sizing */
  input, select, textarea, .fi { font-size: 16px !important; padding: 12px !important; }
  .form-label { font-size: 12px; margin-bottom: 6px; }

  /* Schedule Table - Sticky Right Column (Game Changer!) */
  .sched-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    margin:0 -16px;
    padding:0 16px; 
    width: calc(100% + 32px);
  }
  .sched-table{min-width:650px}
  
  /* קיבוע העמודה הימנית בזמן גלילה */
  .sched-table th:first-child, 
  .sched-table td:first-child {
    position: sticky;
    right: 0;
    z-index: 10;
    background: #1E293B; /* צבע זהה לכרטיסייה שיסתיר את מה שנגלל תחתיו */
    box-shadow: -4px 0 12px rgba(0,0,0,0.3); /* צל שנותן תחושת עומק */
  }
  .sched-table th:first-child { z-index: 11; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(8px); }
  
  .sched-table th.day-header{min-width:65px;padding:10px 4px}
  .sched-table td{padding:6px 2px}
  .sched-table td:first-child{padding:12px 10px;width:90px}
  .emp-chip{padding:6px 8px;font-size:12px;margin:2px; border-radius: 8px;}

  /* Mobile Bottom Nav - Native App Feel */
  .mobile-bottom-nav{
    display:flex!important; 
    background: rgba(30, 41, 59, 0.85) !important;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding-bottom: env(safe-area-inset-bottom, 16px) !important;
  }
  .mobile-bottom-nav button { padding-top: 14px; }

  /* Modals (Bottom Sheet style) */
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:24px 24px 0 0;max-height:88vh;width:100%;max-width:100%; padding: 24px 20px 40px; border-bottom: none;}

  /* Buttons & General */
  .btn-add,.btn-green,.btn-purple{padding:12px 16px;font-size:14px; border-radius: 12px;}
  .btn-sm{padding:8px 12px;font-size:13px}
  .page-title{font-size:24px}
  
  /* Constraints grid */
  .avail-cell{width:40px;height:36px;font-size:14px}
  .constraint-cell{width:40px;height:36px}
}

@media(max-width:480px){
  .logo-icon{width:32px;height:32px;font-size:16px}
  .kpi{padding:14px}
  .kpi-val{font-size:22px}
  .quick-btn{padding:16px 12px}
  .q-icon{font-size:24px}
  .q-label{font-size:14px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const SUPABASE_URL = "https://zszlqoisokjgvplrcbic.supabase.co";
const SUPABASE_KEY = "sb_publishable_b6ZEtYrgGIQT8WxkahGzZg_iHTYMasi";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════
const DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const SHIFTS = [
  { id:"morning",   label:"בוקר",   start:"07:00", end:"15:00", color:"#F59E0B" },
  { id:"afternoon", label:"צהריים", start:"15:00", end:"23:00", color:"#10B981" },
  { id:"night",     label:"לילה",   start:"23:00", end:"07:00", color:"#6366F1" },
];
const SHIFT_BY_ID = Object.fromEntries(SHIFTS.map(s=>[s.id,s]));
const SHIFT_LABELS = Object.fromEntries(SHIFTS.map(s=>[s.id,s.label]));
const EMP_COLORS = ["#3B82F6","#EC4899","#14B8A6","#F97316","#8B5CF6","#EF4444","#06B6D4","#84CC16","#F59E0B","#6366F1"];
const ec = (idx) => EMP_COLORS[idx % EMP_COLORS.length];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let S = {
  view: "loading",
  user: null, profile: null, business: null,
  employees: [], vacations: [], swapRequests: [], availSubmissions: [],
  schedule: {},         // { [dateStr]: { [shiftId]: [empId,...] } }
  publishedWeeks: new Set(),
  lockedSlots: {},      // { "date|shift": Set<empId> }
  customHours: {},      // { "date|shift|empId": {start,end} }
  weekOffset: 0,
  selectedCell: null,   // { date, shift }
  constraintsEmp: null,
  empViewId: null, empViewTab: "shifts",
  showAddEmp: false, showAddVac: false, showSwapModal: false,
  showPublishModal: false, showShiftEditor: false,
  newEmp: {name:"",email:"",idNumber:"",phone:"",role:"employee"},
  newVac: {employeeId:"",startDate:"",endDate:"",reason:""},
  availDraft: {}, availTargetOffset: 1,
  toast: null, modal: null,
  loginMode: "login",
};

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function e(tag, props={}, children=[]) {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(props)){
    if(v===null||v===undefined||v===false) continue;
    if(k==="class") el.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k==="html") el.innerHTML=v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of (Array.isArray(children)?children:[children])){
    if(c==null||c===false||c===undefined) continue;
    if(typeof c==="string"||typeof c==="number") el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}
function div(cls,children=[],extra={}) { return e("div",{class:cls,...extra},children); }
function btn(cls,txt,onclick,extra={}) { return e("button",{class:cls,...extra,onclick},txt); }

function toast(msg,type="ok") {
  S.toast={msg,type}; render();
  setTimeout(()=>{S.toast=null;render();},3000);
}
function today() { return new Date().toISOString().split("T")[0]; }
function getWeekDates(offset=0) {
  const d = new Date();
  // מאפסים את השעה לאמצע היום כדי לבטל לחלוטין קפיצות של אזורי זמן
  d.setHours(12, 0, 0, 0); 
  const dow = d.getDay(); // 0 זה יום ראשון
  
  // מחשבים את תחילת השבוע (ראשון)
  d.setDate(d.getDate() - dow + (offset * 7));
  
  // בונים מערך של 7 ימים מראשון עד שבת
  return Array.from({length:7}, (_, i) => {
    const x = new Date(d);
    x.setDate(d.getDate() + i);
    
    // בונים את התאריך (YYYY-MM-DD) ידנית לפי השעון המקומי
    const year = x.getFullYear();
    const month = String(x.getMonth() + 1).padStart(2, '0');
    const day = String(x.getDate()).padStart(2, '0');
    
    return `${year}-${month}-${day}`;
  });
}

// ══════════════════════════════════════════════════════
// SMART SCHEDULE ALGORITHM
// ══════════════════════════════════════════════════════
function runSmartSchedule() {
  const weekDates = getWeekDates(S.weekOffset).map(d=>new Date(d+"T00:00:00"));
  const shiftIds = SHIFTS.map(s=>s.id);
  const newSched = {};
  const totalCount = {};
  const shiftTypeCount = {};

  S.employees.forEach(emp => {
    totalCount[emp.id] = 0;
    shiftTypeCount[emp.id] = {};
  });

  weekDates.forEach((dateObj, dayIdx) => {
    const dateStr = dateObj.toISOString().split("T")[0];
    const dayName = DAYS[dateObj.getDay()];
    newSched[dateStr] = {};

    shiftIds.forEach((shiftId, shIdx) => {
      const lockedKey = dateStr+"|"+shiftId;
      const lockedEmpIds = S.lockedSlots[lockedKey] ? [...S.lockedSlots[lockedKey]] : [];
      newSched[dateStr][shiftId] = [...lockedEmpIds];
      lockedEmpIds.forEach(id => {
        totalCount[id] = (totalCount[id]||0)+1;
        shiftTypeCount[id][shiftId] = (shiftTypeCount[id][shiftId]||0)+1;
      });

      if (lockedEmpIds.length >= 2) return;
      const need = 2 - lockedEmpIds.length;

      // Score available employees
      const scored = S.employees
        .filter(emp => !lockedEmpIds.includes(emp.id))
        .map(emp => {
          let score = 100;
          const avail = emp.availability || DAYS;
          const preferred = emp.preferred_shifts || [];
          const maxShifts = emp.max_shifts_per_week || 5;
          const dayConstraints = emp.day_constraints || {};

          // Hard blocks
          const onVac = S.vacations.some(v =>
            v.employee_id === emp.id && v.status === "approved" &&
            dateStr >= v.start_date && dateStr <= v.end_date
          );
          if (onVac) return null;
          if (!avail.includes(dayName)) return null;
          if (dayConstraints[dayName]?.[shiftId] === 0) return null;
          if (totalCount[emp.id] >= maxShifts) return null;
          const perLimit = emp.max_per_shift?.[shiftId];
          if (perLimit != null && (shiftTypeCount[emp.id][shiftId]||0) >= perLimit) return null;

          // Scoring
          score -= totalCount[emp.id] * 12;
          if (preferred.includes(shiftId)) score += 30;
          if (dayConstraints[dayName]?.[shiftId] === 1) score += 20;

          // Availability submissions
          const sub = S.availSubmissions.find(s =>
            s.employee_id === emp.id &&
            (s.slots||[]).some(sl => sl.shift === shiftId && sl.day === dateObj.getDay())
          );
          if (sub) score += 50;

          // Avoid back-to-back: night → morning
          if (dayIdx > 0 && shIdx === 0) {
            const prevDate = weekDates[dayIdx-1].toISOString().split("T")[0];
            if ((newSched[prevDate]?.["night"]||[]).includes(emp.id)) score -= 80;
          }

          // Avoid double shift same day
          const alreadyToday = shiftIds.slice(0,shIdx).some(s => (newSched[dateStr][s]||[]).includes(emp.id));
          if (alreadyToday) return null;

          return { emp, score };
        })
        .filter(Boolean)
        .sort((a,b) => b.score - a.score);

      const toAdd = scored.slice(0, need).map(s => s.emp.id);
      newSched[dateStr][shiftId].push(...toAdd);
      toAdd.forEach(id => {
        totalCount[id] = (totalCount[id]||0)+1;
        shiftTypeCount[id][shiftId] = (shiftTypeCount[id][shiftId]||0)+1;
      });
    });
  });

  S.schedule = newSched;
  saveScheduleToDB();
  toast("שיבוץ אוטומטי הושלם ✓");
  render();
}

function generateInviteCode(businessId) {
  // Simple deterministic code from business ID
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code = "";
  for (let i = 0; i < 6; i++) {
    code += chars[(businessId.charCodeAt(i % businessId.length) + i * 7) % chars.length];
  }
  return code;
}

async function loadSchedule() {
  if (!S.profile?.business_id) return;
  const weekDates = getWeekDates(S.weekOffset);
  const weekStart = weekDates[0];

  const { data: sched } = await sb.from("schedules")
    .select("*").eq("business_id", S.profile.business_id)
    .eq("week_start", weekStart).maybeSingle();

  if (!sched) { 
    S.schedule = {}; 
    S.assignments = []; 
    return; 
  }

  if (sched.published) S.publishedWeeks.add(weekStart);

  const { data: assignments, error } = await sb.from("assignments")
    .select("*").eq("schedule_id", sched.id);

  if (error) {
    console.error("Error loading assignments:", error);
    return;
  }

  S.assignments = assignments || [];

  // בונה מחדש את מבנה הנתונים שהלוח המקורי שלך מכיר
  const sched_obj = {};
  weekDates.forEach(d => {
    sched_obj[d] = {};
    SHIFTS.forEach(sh => {
      sched_obj[d][sh.id] = [];
    });
  });

  S.assignments.forEach(a => {
    if (!sched_obj[a.date]) sched_obj[a.date] = {};
    if (!sched_obj[a.date][a.shift]) sched_obj[a.date][a.shift] = [];
    sched_obj[a.date][a.shift].push(a.employee_id);
    
    if (a.custom_start && a.custom_end) {
      S.customHours[`${a.date}|${a.shift}|${a.employee_id}`] = {
        start: a.custom_start,
        end: a.custom_end
      };
    }
  });

  S.schedule = sched_obj;
  S.schedule.id = sched.id;
}

let _saveTimer = null;
function saveScheduleToDB() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if (!S.profile?.business_id) return;
    const weekDates = getWeekDates(S.weekOffset);
    const weekStart = weekDates[0];

    let { data: sched } = await sb.from("schedules")
      .select("id").eq("business_id", S.profile.business_id).eq("week_start", weekStart).single();
    if (!sched) {
      const { data: ns } = await sb.from("schedules")
        .insert({business_id:S.profile.business_id, week_start:weekStart, created_by:S.user.id}).select().single();
      sched = ns;
    }
    if (!sched) return;

    await sb.from("assignments").delete().eq("schedule_id", sched.id);
    const rows = [];
    
    Object.entries(S.schedule).forEach(([date, shifts]) => {
      // התיקון: מדלגים על שדה ה-ID כי הוא לא תאריך עם משמרות
      if (date === "id") return; 

      Object.entries(shifts).forEach(([shift, empIds]) => {
        // מוודאים שזו באמת רשימת עובדים תקינה לפני שרצים עליה
        if (Array.isArray(empIds)) {
          empIds.forEach(empId => {
            const ch = S.customHours[date+"|"+shift+"|"+empId];
            rows.push({ schedule_id:sched.id, employee_id:empId, date, shift,
              custom_start: ch?.start||null, custom_end: ch?.end||null });
          });
        }
      });
    });
    
    if (rows.length) await sb.from("assignments").insert(rows);
  }, 800);
}

async function updateSwapStatus(id, status) {
  try {
    // 1. עדכון סטטוס הבקשה במסד הנתונים
    const { error: swapErr } = await sb.from("swap_requests").update({ status }).eq("id", id);
    if (swapErr) throw swapErr;

    const sw = S.swapRequests.find(s => s.id === id);
    if (!sw) return;
    
    // 2. עדכון בטבלת השיבוצים מול Supabase ישירות (מונע את שגיאת הקריסה)
    if (status === "approved") {
      if (sw.type === 'swap' && sw.target_employee_id) {
        // חילוף
        await sb.from("assignments").update({ employee_id: sw.requester_id })
          .match({ date: sw.target_date, shift: sw.target_shift, employee_id: sw.target_employee_id });
      } else if (sw.type === 'take') {
        // מחיקה (קחו משמרת)
        await sb.from("assignments").delete()
          .match({ date: sw.target_date, shift: sw.target_shift, employee_id: sw.requester_id });
      } else if (sw.type === 'join') {
        // הצטרפות
        if (S.schedule?.id) {
          await sb.from("assignments").insert({ 
            schedule_id: S.schedule.id, employee_id: sw.requester_id, 
            date: sw.target_date, shift: sw.target_shift 
          });
        }
      }
    }

    // 3. טעינת הלוח המעודכן מהשרת
    await loadSchedule();
    await loadSwapRequests();

    // 4. שליחת מייל אוטומטי - עם השמות המדויקים שהשרת שלך מחפש!
    if (sw) {
      const requester = getEmp(sw.requester_id);
      if (requester && requester.email) {
        const sh = SHIFT_BY_ID[sw.target_shift];
        const actionText = status === "approved" ? "אושרה" : "נדחתה";
        const shiftDetailsText = `${sw.target_date} — ${sh ? sh.label : sw.target_shift}`;
        
        sendEmail(
          "swap_status", 
          requester.email, 
          {
            empName: requester.name,
            status: actionText,       // זה יתחבר ל- ${data.status} ויעלים את ה-undefined
            details: shiftDetailsText // זה יתחבר ל- ${data.details} ויעלים את ה-undefined
          }
        );
      }
    }

    // 5. ריענון המסך
    toast(status === "approved" ? "הפעולה אושרה והלוח עודכן ✓" : "הבקשה נדחתה");
    render(); 

  } catch (err) {
    console.error("Swap Error:", err);
    toast("שגיאה בעדכון הנתונים", "err");
  }
}

    e("div",{style:"font-weight:800;font-size:20px"},"Shift SOC PMO"),
    e("div",{style:"color:#64748B;font-size:14px;margin-top:8px"},"טוען...")
  ]);
}

// ── LOGIN ──
function viewLogin() {
  const isReg = S.loginMode === "register";
  const isEmpReg = S.loginMode === "emp_register";
  const wrap = e("div",{class:"login-wrap"});
  const card = e("div",{class:"login-card"});

  card.appendChild(div("logo-box",[
    div("logo-icon",["📅"]),
    e("div",{},[
      e("div",{class:"logo-name"},"Shift SOC PMO"),
      e("div",{class:"logo-sub"},"מערכת ניהול משמרות")
    ])
  ]));
  card.appendChild(e("div",{class:"login-h1"},isReg?"הרשמה חינם":"ברוך הבא"));
  card.appendChild(e("p",{class:"subtitle"},isReg?"צור חשבון מנהל":"הכנס פרטים להמשך"));

  const errBox = e("div",{class:"err-box hidden",id:"lerr"});
  card.appendChild(errBox);

  const form = e("form",{onsubmit: async ev => {
    ev.preventDefault();
    const btn = form.querySelector("button[type=submit]");
    btn.disabled=true; errBox.classList.add("hidden");
    try {
      if (isReg) await handleRegister(
        form.querySelector("[name=name]").value,
        form.querySelector("[name=biz]")?.value||"",
        form.querySelector("[name=email]").value,
        form.querySelector("[name=pass]").value,
        null
      );
      else if (isEmpReg) await handleRegister(
        form.querySelector("[name=name]").value,
        "",
        form.querySelector("[name=email]").value,
        form.querySelector("[name=pass]").value,
        form.querySelector("[name=invite]").value
      );
      else await handleLogin(
        form.querySelector("[name=email]").value,
        form.querySelector("[name=pass]").value
      );
    } catch(err) {
      errBox.textContent = "⚠️ "+(err.message||"שגיאה");
      errBox.classList.remove("hidden"); btn.disabled=false;
    }
  }});

  if (isReg) {
    form.appendChild(loginField("שם מלא","name","text","ישראל ישראלי",true));
    form.appendChild(loginField("שם העסק","biz","text","החברה שלי",true));
  } else if (isEmpReg) {
    form.appendChild(loginField("שם מלא","name","text","ישראל ישראלי",true));
    form.appendChild(loginField("קוד הזמנה","invite","text","XXXXXX",true));
  }
  form.appendChild(loginField("אימייל","email","email","you@example.com",true));
  form.appendChild(loginField("סיסמה","pass","password","••••••••",true));
  form.appendChild(e("button",{type:"submit",class:"btn-primary"},
    isReg?"צור חשבון מנהל →":isEmpReg?"הצטרף כעובד →":"כניסה →"));
  card.appendChild(form);

  // Switch links
  if (!isReg && !isEmpReg) {
    card.appendChild(div("switch-link",[
      "עסק חדש? ",
      e("a",{onclick:()=>{S.loginMode="register";render();}},"הרשמת מנהל →")
    ]));
    card.appendChild(div("switch-link",[
      "עובד? ",
      e("a",{onclick:()=>{S.loginMode="emp_register";render();}},"הצטרף עם קוד →")
    ]));
  } else {
    card.appendChild(div("switch-link",[
      "יש לך חשבון? ",
      e("a",{onclick:()=>{S.loginMode="login";render();}},"כניסה →")
    ]));
  }
  wrap.appendChild(card);
  return wrap;
}

function loginField(lbl, name, type, ph, req=false) {
  return div("field",[
    e("label",{},lbl+(req?" *":"")),
    e("input",{name,type,placeholder:ph,required:req?"required":null})
  ]);
}

// ── HEADER ──
function viewHeader() {
  const pendingVacs = S.vacations.filter(v=>v.status==="pending").length;
  const pendingSwaps = S.swapRequests.filter(s=>s.status==="pending_manager").length;

  const empOnly = S.profile?.role === "employee";
  const tabs = empOnly ? [
    {id:"empview",  icon:"📋", label:"המשמרות שלי"},
    {id:"schedule", icon:"📅", label:"סידור"},
    {id:"calendar", icon:"🗓️", label:"חודש"},
    {id:"vacations",icon:"🌴", label:"חופשות ומילואים"},
    {id:"swaps",    icon:"🔄", label:"חילופים"},
  ] : [
    {id:"home",     icon:"🏠", label:"בית"},
    {id:"schedule", icon:"📅", label:"סידור"},
    {id:"calendar", icon:"🗓️", label:"חודש"},
    {id:"employees",icon:"👥", label:"עובדים"},
    {id:"vacations",icon:"🌴", label:"העדרויות", badge:pendingVacs},
    {id:"swaps",    icon:"🔄", label:"חילופים", badge:pendingSwaps, badgeClass:"badge-purple"},
    {id:"stats",    icon:"📊", label:"נתונים"},
    {id:"empview",  icon:"👤", label:"עובד"},
    {id:"settings", icon:"⚙️", label:"הגדרות"},
  ];

  return e("header",{class:"header"},[
    div("header-inner",[
      div("",[
        div("logo-icon",["📅"]),
        e("div",{style:"margin-right:10px"},[
          e("div",{style:"font-weight:900;font-size:15px;color:#E2E8F0"},"Shift SOC PMO"),
          e("div",{style:"font-size:11px;color:#64748B"},S.business?.name||"")
        ])
      ].map((x,i)=>i===0?x:x), {style:"display:flex;align-items:center;gap:10px"}),
      
      // תפריט ניווט לשולחן עבודה בלבד
      div("nav", tabs.map(t =>
        e("button",{
          class:"nav-btn"+(S.view===t.id?" active":""),
          onclick:()=>{S.view=t.id;S.selectedCell=null;render();}
        },[
          t.badge>0 ? e("span",{class:"badge "+(t.badgeClass||"")},String(t.badge)) : null,
          e("span",{style:"font-size:15px;line-height:1"},t.icon),
          e("span",{},t.label)
        ])
      )),
      
      div("user-area",[
        e("div",{},[
          e("div",{class:"user-name"},S.profile?.name||""),
          e("div",{class:"user-role-label"},S.profile?.role==="admin"?"מנהל ראשי":S.profile?.role==="manager"?"מנהל משמרת":"עובד")
        ]),
        btn("btn-logout","יציאה",handleLogout)
      ])
    ])
  ]);
}

function viewSchedule() {
  let wd = getWeekDates(S.weekOffset);
  // מוודאים שהימים תמיד מסודרים לפי התאריך (מראשון עד שבת)
  wd.sort((a, b) => new Date(a) - new Date(b));
  
  const weekStart = wd[0];
  const isPublished = S.publishedWeeks.has(weekStart);
  const wrap = e("div");

  // כותרת וכפתורי ניהול
  const hdr = div("section-header", [
    e("div", {}, [
      div("page-title", ["📅 סידור שבועי"]),
      e("div", { style: "font-size:13px;color:#64748B;margin-top:2px" }, fmtDate(wd[0]) + " — " + fmtDate(wd[6])),
      isPublished ? div("published-banner", ["📢 פורסם"]) : null
    ]),
    e("div", { style: "display:flex;gap:8px;flex-wrap:wrap" }, [
      btn("btn-sm btn-sm-gray", "→", () => { S.weekOffset++; S.selectedCell = null; loadSchedule().then(() => render()); }),
      btn("btn-sm btn-sm-blue", "השבוע", () => { S.weekOffset = 0; S.selectedCell = null; loadSchedule().then(() => render()); }),
      btn("btn-sm btn-sm-gray", "←", () => { S.weekOffset--; S.selectedCell = null; loadSchedule().then(() => render()); }),
      isManager() ? btn("btn-green", "⚡ שיבוץ אוטומטי", runSmartSchedule) : null,
      isManager() && !isPublished ? btn("btn-purple", "📢 פרסם", () => { S.showPublishModal = true; render(); }) : null
    ])
  ]);
  wrap.appendChild(hdr);

  const gridCard = div("card");
  const gridWrap = div("sched-wrap");
  const tbl = e("table", { class: "sched-table" });
  
  // בניית שורת כותרות הימים
  const thead = e("thead");
  const hrow = e("tr");
  hrow.appendChild(e("th", { style: "width: 110px;" }, "משמרת")); 
  
  wd.forEach(date => {
    const dt = new Date(date + "T00:00:00");
    const isToday = date === today();
    hrow.appendChild(e("th", { class: "day-header" }, [
      e("div", { style: isToday ? "color:#60A5FA;font-weight:900" : "color:#94A3B8" }, DAYS[dt.getDay()]),
      e("div", { style: "font-size:18px;margin-top:4px" }, String(dt.getDate()))
    ]));
  });
  thead.appendChild(hrow);
  tbl.appendChild(thead);

  const tbody = e("tbody");

  // --- שורת העדרויות (חופשות/מילואים) - למנהלים בלבד ---
  if (isManager()) {
    const absenceRow = e("tr");
    absenceRow.appendChild(e("td", { style: "color:#F59E0B; font-weight:800; font-size:12px; text-align:right; padding: 10px 15px; border-left: 2px solid #334155; background: rgba(245,158,11,0.05);" }, "🌴/🎖️ העדרויות"));
    wd.forEach(date => {
      const dayAbsences = S.vacations.filter(v => v.status === "approved" && date >= v.start_date && date <= v.end_date);
      const td = e("td", { style: "background: rgba(245, 158, 11, 0.05); border: 1px solid #33415522; padding: 4px; vertical-align: middle; text-align: center;" });
      
      dayAbsences.forEach(v => {
        const emp = getEmp(v.employee_id);
        if (emp) {
          const isReserve = v.type === 'reserve';
          const icon = isReserve ? '🎖️' : '🌴';
          const color = isReserve ? '#818CF8' : '#F59E0B';
          td.appendChild(e("div", { style: `font-size:10px; color:${color}; font-weight:700; margin-bottom:2px;` }, `${icon} ${emp.name.split(" ")[0]}`));
        }
      });
      if (dayAbsences.length === 0) td.appendChild(e("div", {style:"color:#334155; font-size:10px"}, "—"));
      absenceRow.appendChild(td);
    });
    tbody.appendChild(absenceRow);
  }

  // בניית שורות המשמרות (בוקר, צהריים, לילה)
  SHIFTS.forEach(shift => {
    const row = e("tr");
    row.appendChild(e("td", { style: "color:" + shift.color + "; text-align:right; padding: 10px 15px; font-weight: 800; border-left: 2px solid #334155;" }, [
      e("div", { style: "font-size:14px" }, shift.label),
      e("div", { style: "font-size:10px;opacity:0.6" }, shift.start + "–" + shift.end)
    ]));

    wd.forEach(date => {
      // עדכון בלייב: קוראים מתוך S.schedule ולא מ-S.assignments
      const empIds = S.schedule[date]?.[shift.id] || [];
      const isSel = S.selectedCell?.date === date && S.selectedCell?.shift === shift.id;
      const canEdit = isManager();

      const td = e("td", {
        class: isSel ? "selected" : "",
        style: canEdit ? "cursor:pointer" : "cursor:default",
        onclick: () => {
          if (!canEdit) return;
          S.selectedCell = isSel ? null : { date, shift: shift.id };
          render();
        }
      });

      if (empIds.length === 0) {
        td.appendChild(div("cell-empty", ["—"]));
      } else {
        empIds.forEach(empId => {
          const emp = getEmp(empId);
          if (emp) {
            const col = ec(empIdx(empId));
            const ch = S.customHours[`${date}|${shift.id}|${empId}`];
            
            // בדיקה אם העובד בסטטוס מיוחד באותו יום (להצגת אייקון קטן ליד השם בסידור)
            const specialStatus = S.vacations.find(v => v.employee_id === empId && v.status === "approved" && date >= v.start_date && date <= v.end_date);
            const statusIcon = specialStatus ? (specialStatus.type === 'reserve' ? '🎖️' : '🌴') : '';

            const chip = e("div", {
              class: "emp-chip",
              style: `background:${col}22; color:${col}; border:1px solid ${col}44`
            }, [
              e("span", {}, statusIcon + " " + emp.name.split(" ")[0]),
              ch ? e("span", { style: "font-size:10px; opacity:0.85; margin-right:4px; font-weight:600;" }, `(${ch.start}-${ch.end})`) : null
            ]);
            td.appendChild(chip);
          }
        });
      }
      row.appendChild(td);
    });
    tbody.appendChild(row);
  });
  
  tbl.appendChild(tbody);
  gridWrap.appendChild(tbl);
  gridCard.appendChild(gridWrap);
  wrap.appendChild(gridCard);

  if (S.selectedCell) {
    wrap.appendChild(viewCellEditor(S.selectedCell.date, S.selectedCell.shift));
  }

  // מחוון עומס עובדים בתחתית
  wrap.appendChild(viewWorkload(wd));

  return wrap;
}

  S.employees.forEach((emp, idx) => {

    const isAssigned = assignedIds.includes(emp.id);
    const locked = S.lockedSlots[date+"|"+shiftId]?.has(emp.id);

    const chip = e("button",{

function viewWorkload(wd) {
  const counts = {};
  S.employees.forEach(emp => { counts[emp.id] = 0; });
  wd.forEach(d => SHIFTS.forEach(sh => {
    (S.schedule[d]?.[sh.id]||[]).forEach(id => { counts[id] = (counts[id]||0)+1; });
  }));

  const card = div("card",[e("div",{class:"card-title"},"עומס עובדים — השבוע")]);
  S.employees.forEach((emp, idx) => {
    const count = counts[emp.id]||0;
    const max = emp.max_shifts_per_week||5;
    const pct = Math.min(Math.round((count/max)*100),100);
    const over = count > max;
    const col = ec(idx);
    const barColor = over?"#EF4444":pct>80?"#F59E0B":"#10B981";
    card.appendChild(div("workload-row",[
      div("workload-info",[
        e("div",{style:"display:flex;align-items:center;gap:7px"},[
          e("span",{style:`width:8px;height:8px;border-radius:50%;background:${col}`},""),
          e("span",{style:"font-size:13px;font-weight:600"},emp.name),
          over ? e("span",{style:"font-size:10px;background:#EF444422;color:#EF4444;border:1px solid #EF444444;border-radius:4px;padding:1px 5px"},"חריגה!") : null
        ]),
        e("span",{style:"font-size:12px;color:"+(over?"#EF4444":"#94A3B8")},`${count}/${max}`)
      ]),
      div("workload-bar-bg",[
        e("div",{class:"workload-bar-fill",style:`width:${pct}%;background:${barColor}`})
      ])
    ]));
  });
  return card;
}

// ── STATS ──
function viewStats() {
  const wd = getWeekDates(S.weekOffset);
  const totalAssigned = wd.reduce((t,d)=>t+SHIFTS.reduce((s,sh)=>s+(S.schedule[d]?.[sh.id]?.length||0),0),0);
  const maxPossible = wd.length * SHIFTS.length * 2;
  const fillRate = maxPossible > 0 ? Math.round((totalAssigned/maxPossible)*100) : 0;

  const wrap = e("div");
  wrap.appendChild(div("page-title",["📊 דשבורד נתונים"],{style:"margin-bottom:16px"}));

  // KPIs
  const kpis = [
    {icon:"📅",lbl:"שיבוצים",val:totalAssigned,sub:"השבוע",color:"#3B82F6"},
    {icon:"📈",lbl:"אחוז מילוי",val:fillRate+"%",sub:fillRate>70?"מצוין":"דורש שיפור",color:fillRate>70?"#10B981":"#F59E0B"},
    {icon:"🌴",lbl:"חופשות ממתינות",val:S.vacations.filter(v=>v.status==="pending").length,sub:"לאישור",color:"#6366F1"},
    {icon:"👥",lbl:"עובדים פעילים",val:S.employees.length,sub:"במערכת",color:"#10B981"},
  ];
  const kpiGrid = div("kpi-grid");
  kpis.forEach(k => kpiGrid.appendChild(div("kpi",[
    div("kpi-icon",[k.icon]),
    e("div",{class:"kpi-val",style:"color:"+k.color},String(k.val)),
    div("kpi-lbl",[k.lbl]),
    k.sub?e("div",{class:"kpi-sub"},[k.sub]):null
  ],{style:"border-color:"+k.color+"33"})));
  wrap.appendChild(kpiGrid);

  // Per shift
  const shiftCard = div("card",[e("div",{class:"card-title"},"מילוי לפי משמרת")]);
  SHIFTS.forEach(sh => {
    const total = wd.reduce((s,d)=>s+(S.schedule[d]?.[sh.id]?.length||0),0);
    const max = wd.length*2;
    const pct = Math.round((total/max)*100);
    shiftCard.appendChild(div("workload-row",[
      div("workload-info",[
        e("span",{style:"font-weight:700;color:"+sh.color},sh.label+" ("+sh.start+"–"+sh.end+")"),
        e("span",{style:"font-size:12px;color:#94A3B8"},`${total}/${max} · ${pct}%`)
      ]),
      div("workload-bar-bg",[e("div",{class:"workload-bar-fill",style:`width:${pct}%;background:${sh.color}`})])
    ]));
  });
  wrap.appendChild(shiftCard);

  // Per employee
  const empCard = div("card",[e("div",{class:"card-title"},"פירוט לפי עובד")]);
  S.employees.forEach((emp,idx) => {
    const col = ec(idx);
    const count = wd.reduce((t,d)=>t+SHIFTS.reduce((s,sh)=>s+((S.schedule[d]?.[sh.id]||[]).includes(emp.id)?1:0),0),0);
    const max = emp.max_shifts_per_week||5;
    const pct = Math.min(Math.round((count/max)*100),100);
    const over = count>max;
    empCard.appendChild(div("workload-row",[
      div("workload-info",[
        e("div",{style:"display:flex;align-items:center;gap:7px"},[
          e("span",{style:`width:8px;height:8px;border-radius:50%;background:${col}`},""),
          e("span",{style:"font-weight:600;font-size:13px"},emp.name),
          over?e("span",{style:"font-size:10px;color:#EF4444"},"⚠️"):null
        ]),
        e("span",{style:"font-size:12px;font-weight:700;color:"+(over?"#EF4444":"#94A3B8")},`${count}/${max}`)
      ]),
      div("workload-bar-bg",[e("div",{class:"workload-bar-fill",style:`width:${pct}%;background:${over?"#EF4444":pct>80?"#F59E0B":"#10B981"}`})])
    ]));
  });
  wrap.appendChild(empCard);
  return wrap;
}

// ── EMPLOYEE VIEW ──
function viewEmpView() {
  const wrap = e("div", {style: "position: relative; min-height: 80vh;"});
  const selfOnly = S.profile?.role === "employee" || S.testAsEmployee;
  if (selfOnly && !S.empViewId) S.empViewId = S.user.id;

  const emp = S.employees.find(e=>e.id===S.empViewId);
  if (!emp) return div("card",[e("div",{style:"text-align:center;padding:40px"},"טוען נתונים...")]);

  // 1. Header Area
  wrap.appendChild(e("div",{style:"margin-bottom:20px; padding: 10px 5px; display:flex; justify-content:space-between; align-items:center;"},[
    e("div", {}, [
      e("div",{style:"font-size:14px; color:#64748B;"}, "שלום,"),
      e("div",{style:"font-size:26px; font-weight:900; color:#F1F5F9;"}, emp.name.split(" ")[0] + " 👋")
    ]),
    !selfOnly ? btn("btn-sm btn-sm-gray", "החלף עובד", () => { S.empViewId = null; render(); }) : null
  ]));

  // 2. Next Shift Banner
  const myShifts = [];
  const wd = getWeekDates(S.weekOffset);
  wd.forEach(date => {
    SHIFTS.forEach(sh => {
      if ((S.schedule[date]?.[sh.id]||[]).includes(emp.id)) {
        myShifts.push({date, shift: sh, ch: S.customHours[date+"|"+sh.id+"|"+emp.id]});
      }
    });
  });

  const nextShift = myShifts.find(s => s.date >= today());
  if (nextShift) {
    const dt = new Date(nextShift.date + "T00:00:00");
    wrap.appendChild(e("div", {
      style: `background: linear-gradient(135deg, ${nextShift.shift.color}, #1e293b); border-radius: 24px; padding: 24px; margin-bottom: 24px; color: white; position: relative; overflow: hidden; box-shadow: 0 15px 30px -10px ${nextShift.shift.color}66;`
    }, [
      e("div", {style:"font-size:12px; font-weight:700; text-transform:uppercase; opacity:0.8; margin-bottom:15px;"}, "📌 המשמרת הקרובה שלך"),
      e("div", {style:"font-size:32px; font-weight:900; margin-bottom:5px;"}, nextShift.shift.label),
      e("div", {style:"font-size:18px; font-weight:600; opacity:0.9;"}, `${DAYS[dt.getDay()]} ${dt.getDate()}/${dt.getMonth()+1}`),
      e("div", {style:"font-size:16px; margin-top:10px; background:rgba(0,0,0,0.2); display:inline-block; padding:4px 12px; border-radius:20px;"}, 
        (nextShift.ch ? nextShift.ch.start : nextShift.shift.start) + " – " + (nextShift.ch ? nextShift.ch.end : nextShift.shift.end)
      )
    ]));
  }

  // 3. Tab Content Area
  const content = div("emp-active-tab-content", [], {style: "margin-top:10px; padding-bottom: 100px;"});
  
  if (S.empViewTab === "shifts") {
    const list = div("");
    if (myShifts.length === 0) {
      list.appendChild(e("div", {style:"text-align:center; padding:40px; color:#475569;"}, "אין משמרות משובצות"));
    } else {
      myShifts.forEach(s => {
        const dt = new Date(s.date + "T00:00:00");
        const isPast = s.date < today();
        list.appendChild(e("div", {
          style: `display:flex; align-items:center; background:#1E293B; margin-bottom:10px; padding:15px; border-radius:18px; border:1px solid #334155; opacity:${isPast?0.5:1}`
        }, [
          e("div", {style:`width:45px; height:45px; border-radius:12px; background:${s.shift.color}15; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-left:15px;`}, [
            e("div", {style:`font-size:18px; font-weight:900; color:${s.shift.color}`}, dt.getDate()),
            e("div", {style:`font-size:9px; color:${s.shift.color}; font-weight:700`}, DAYS[dt.getDay()].slice(0,2))
          ]),
          e("div", {style:"flex:1"}, [
            e("div", {style:"font-weight:800; font-size:15px; color:#F1F5F9;"}, s.shift.label),
            e("div", {style:"font-size:13px; color:#64748B;"}, (s.ch?s.ch.start:s.shift.start) + " – " + (s.ch?s.ch.end:s.shift.end))
          ])
        ]));
      });
    }
    content.appendChild(list);
  } 
  else if (S.empViewTab === "vacation") content.appendChild(viewEmpVacations());
  else if (S.empViewTab === "avail") content.appendChild(viewEmpAvailForm());
  else if (S.empViewTab === "schedule") content.appendChild(viewEmpFullSchedule(emp, wd));

  wrap.appendChild(content);

  // 4. Floating Nav Bar עם כפתור הבית (📅)
  const navBar = e("div", {
    style: "position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); padding: 6px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; width: 92%; max-width: 380px;"
  });

  const empTabs = [
    {id:"shifts", icon:"📋", label:"משמרות"},
    {id:"vacation", icon:"🌴", label:"העדרות"},
    {id:"home_btn", icon:"📅", label:"בית"},
    {id:"avail", icon:"🚫", label:"חסימה"},
    {id:"schedule", icon:"📅", label:"סידור"}
  ];

  empTabs.forEach(t => {
    const isHome = t.id === "home_btn";
    const active = S.empViewTab === t.id;
    const btnStyle = isHome 
      ? `width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #3B82F6, #6366F1); display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); margin: 0 5px; flex-shrink: 0;`
      : `flex:1; border:none; background:transparent; color:${active ? "#3B82F6" : "#94A3B8"}; padding:10px 2px; border-radius:15px; display:flex; flex-direction:column; align-items:center; gap:2px; transition:all 0.2s;`;

    navBar.appendChild(e("button", {
      style: btnStyle,
      onclick: () => { S.empViewTab = isHome ? "shifts" : t.id; render(); }
    }, [
      e("span", {style: isHome ? "font-size:22px" : "font-size:18px"}, isHome ? "📅" : t.icon),
      !isHome ? e("span", {style: `font-size: 9px; font-weight: 700;`}, t.label) : null
    ]));
  });
  
  wrap.appendChild(navBar);

function viewConstraintsModal() {
  const emp = S.constraintsEmp;
  if (!emp) return null;

  const WEEKDAYS = ["ראשון","שני","שלישי","רביעי","חמישי"];
  const WEEKEND = ["שישי","שבת"];

  let localDC = JSON.parse(JSON.stringify(emp.day_constraints||{}));
  let localMax = emp.max_shifts_per_week||5;
  let localPerShift = JSON.parse(JSON.stringify(emp.max_per_shift||{}));
  let localAvail = [...(emp.availability||DAYS)];
  let localPref = [...(emp.preferred_shifts||[])];
  let localMaxBlocks = emp.max_blocks_per_week ?? 2;
  let localAllowedBlocks = JSON.parse(JSON.stringify(emp.allowed_block_slots||{}));
  // allowed_block_slots: { "ראשון": ["morning","afternoon"], "שישי": ["morning"] }

  const modal = div("modal");
  const mh = div("modal-header",[
    div("modal-title",[`הגבלות — ${emp.name}`]),
    btn("modal-close","✕",()=>{S.constraintsEmp=null;render();})
  ]);
  modal.appendChild(mh);

  function rebuildModal() {
    // Clear and rebuild
    while(modal.childNodes.length>1) modal.removeChild(modal.lastChild);

    // Max shifts
    const r1 = div("card",[
      e("div",{class:"form-label",style:"margin-bottom:6px"},"מקסימום משמרות בשבוע"),
      e("div",{style:"display:flex;align-items:center;gap:10px"},[
        e("input",{class:"fi",type:"number",min:1,max:21,value:localMax,style:"width:80px;text-align:center",
          oninput:ev=>{localMax=parseInt(ev.target.value)||1;}}),
        e("span",{style:"font-size:13px;color:#64748B"},"משמרות")
      ])
    ],{style:"margin-bottom:12px"});
    modal.appendChild(r1);

    // Per shift
    const r2 = div("card",[e("div",{class:"form-label",style:"margin-bottom:8px"},"מקסימום לפי סוג משמרת (ריק=ללא)"),
      e("div",{style:"display:flex;gap:10px"},SHIFTS.map(sh => div("form-col",[
        e("label",{style:"font-size:11px;font-weight:700;color:"+sh.color},sh.label),
        e("input",{class:"fi",type:"number",min:0,max:7,placeholder:"∞",value:localPerShift[sh.id]!=null?localPerShift[sh.id]:"",
          style:"text-align:center",
          oninput:ev=>{const v=ev.target.value;if(v==="")delete localPerShift[sh.id];else localPerShift[sh.id]=parseInt(v)||0;}})
      ])))
    ],{style:"margin-bottom:12px"});
    modal.appendChild(r2);

    // Day constraints
    for(const [groupLabel, days] of [["ראשון–חמישי",WEEKDAYS],["שישי–שבת",WEEKEND]]) {
      const gc = div("card",[e("div",{class:"form-label",style:"margin-bottom:8px"},groupLabel)],{style:"margin-bottom:12px"});
      const tbl = e("table",{class:"constraint-table"});
      const thead = e("tr",[e("th",{style:"text-align:right"},"")]);
      SHIFTS.forEach(sh => thead.appendChild(e("th",{style:`color:${sh.color}`},sh.label)));
      tbl.appendChild(thead);
      days.forEach(day => {
        const row = e("tr",[e("td",{},day)]);
        SHIFTS.forEach(sh => {
          const val = localDC[day]?.[sh.id];
          const cell = e("button",{
            class:"constraint-cell"+(val===1?" allowed":val===0?" blocked":""),
            style:"--sc:"+sh.color,
            onclick:()=>{
              if(!localDC[day]) localDC[day]={};
              if(val===undefined) localDC[day][sh.id]=1;
              else if(val===1) localDC[day][sh.id]=0;
              else delete localDC[day][sh.id];
              rebuildModal();
            }
          }, val===1?"✓":val===0?"✗":"~");
          row.appendChild(e("td",{},[cell]));
        });
        tbl.appendChild(row);
      });
      gc.appendChild(tbl);
      gc.appendChild(e("div",{style:"font-size:11px;color:#475569;margin-top:6px"},"✓ מותר · ✗ אסור · ~ ללא הגבלה · לחץ לשנות"));
      modal.appendChild(gc);
    }

    // ── Allowed block slots ──
    const blockCard = div("card",[e("div",{class:"form-label",style:"margin-bottom:8px"},"אילו משמרות העובד מורשה לחסום")],{style:"margin-bottom:12px"});
    blockCard.appendChild(e("div",{style:"font-size:11px;color:#475569;margin-bottom:10px"},"בחר את המשמרות שהעובד יכול לחסום (רק אלה יוצגו לו)"));

    const blockTable = e("table",{class:"constraint-table"});
    const bhead = e("tr",[e("th",{style:"text-align:right"},"")]);
    SHIFTS.forEach(sh => bhead.appendChild(e("th",{style:`color:${sh.color}`},sh.label)));
    blockTable.appendChild(bhead);

    [...WEEKDAYS, ...WEEKEND].forEach(day => {
      const row = e("tr",[e("td",{},day)]);
      SHIFTS.forEach(sh => {
        const allowed = (localAllowedBlocks[day]||[]).includes(sh.id);
        const cell = e("button",{
          class:"constraint-cell"+(allowed?" allowed":""),
          style:"--sc:"+sh.color,
          onclick:()=>{
            if(!localAllowedBlocks[day]) localAllowedBlocks[day]=[];
            if(allowed) localAllowedBlocks[day]=localAllowedBlocks[day].filter(s=>s!==sh.id);
            else localAllowedBlocks[day].push(sh.id);
            rebuildModal();
          }
        }, allowed?"✓":"—");
        row.appendChild(e("td",{},[cell]));
      });
      blockTable.appendChild(row);
    });
    blockCard.appendChild(blockTable);
    blockCard.appendChild(e("div",{style:"font-size:11px;color:#475569;margin-top:6px"},"✓ = מותר לחסום · — = אסור לחסום"));
    modal.appendChild(blockCard);

    // Actions
    modal.appendChild(div("form-actions",[
      btn("btn-add","שמור הגבלות",async()=>{
        await saveConstraints(emp.id,{maxShifts:localMax,maxPerShift:localPerShift,dayConstraints:localDC,availability:localAvail,preferredShifts:localPref,maxBlocks:localMaxBlocks,allowedBlockSlots:localAllowedBlocks});
      },{style:"flex:1"}),
      btn("btn-sm btn-sm-gray","ביטול",()=>{S.constraintsEmp=null;render();})
    ]));
  }

  rebuildModal();
  return div("modal-bg",[modal],{onclick:ev=>{if(ev.target.classList.contains("modal-bg")){S.constraintsEmp=null;render();}}});
}

  let html = `<!DOCTYPE html><html dir="rtl" lang="he">

  .night{background:#EDE9FE;color:#4C1D95}
  .empty{color:#ccc;font-size:11px}

</style></head><body>
<h1>סידור עבודה — ${S.business?.name||"Shift SOC PMO"}</h1>
<div class="sub">${weekLabel}</div>
<table>
<tr><th>משמרת</th>`;

  wd.forEach(date => {
    const dt = new Date(date+"T00:00:00");
    html += `<th>${DAYS[dt.getDay()]}<br><strong>${dt.getDate()}</strong></th>`;
  });
  html += "</tr>";

  SHIFTS.forEach(sh => {
    html += `<tr><td class="${sh.id}">${sh.label}<br><small>${sh.start}–${sh.end}</small></td>`;
    wd.forEach(date => {
      const empIds = S.schedule[date]?.[sh.id]||[];
      html += "<td>";
      if (empIds.length === 0) {
        html += '<span class="empty">—</span>';
      } else {
        empIds.forEach(id => {
          const emp = getEmp(id);
          const ch = S.customHours[date+"|"+sh.id+"|"+id];
          html += `<span class="chip ${sh.id}">${emp?.name||"?"}</span>`;
          if (ch) html += `<br><small style="font-size:9px;color:#666">${ch.start}–${ch.end}</small>`;
        });
      }
      html += "</td>";
    });
    html += "</tr>";
  });
  html += `</table>
<div style="margin-top:16px;font-size:11px;color:#999">הופק מ-Shift SOC PMO · ${new Date().toLocaleDateString("he-IL")}</div>
</body></html>`;

  const win = window.open("","_blank");
  if (!win) { toast("אפשר חלונות קופצים בדפדפן","err"); return; }
  win.document.write(html);
  win.document.close();
  setTimeout(()=>win.print(), 500);
  toast("פותח לייצוא PDF ✓");
}

function exportScheduleCSV() {
  const wd = getWeekDates(S.weekOffset);
  let csv = "\u05de\u05e9\u05de\u05e8\u05ea,\u05e9\u05e2\u05d5\u05ea,"+wd.map(d=>{const dt=new Date(d+"T00:00:00");return DAYS[dt.getDay()]+" "+dt.getDate();}).join(",")+String.fromCharCode(10);
  SHIFTS.forEach(sh => {
    const row = [sh.label, sh.start+"–"+sh.end];
    wd.forEach(date => {
      const empIds = S.schedule[date]?.[sh.id]||[];
      row.push(empIds.map(id=>getEmp(id)?.name||"?").join(" + ")||"—");
    });
    csv += row.map(v=>"\""+v+"\"").join(",") + String.fromCharCode(10);
  });
  const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`seder_avoda_${getWeekDates(S.weekOffset)[0]}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast("קובץ CSV הורד ✓");
}

// EMPLOYEE VACATION VIEW (self-service)
// ══════════════════════════════════════════════════════
function viewEmpVacations() {
  const wrap = e("div");
  wrap.appendChild(div("section-header",[
    div("page-title",["🌴 חופשות ומילואים"]),
    btn("btn-add","+ בקשה חדשה",()=>{S.showAddVac=!S.showAddVac;render();})
  ]));

  if (S.showAddVac) {
    const form = div("card",[div("card-title",["בקשה חדשה"])]);
    if(!S.newVac.type) S.newVac.type = "vacation";
    const typeSel = e("select",{class:"fi",onchange:ev=>{S.newVac.type=ev.target.value}},[e("option",{value:"vacation"},"חופשה 🌴"),e("option",{value:"reserve"},"מילואים 🎖️")]);

    form.appendChild(div("form-col",[e("label",{class:"form-label"},"סוג בקשה"),typeSel],{style:"margin-bottom:12px"}));
    form.appendChild(div("form-row",[
      div("form-col",[e("label",{class:"form-label"},"מתאריך *"),e("input",{class:"fi",type:"date",min:today(),value:S.newVac.startDate,oninput:ev=>{S.newVac.startDate=ev.target.value}})]),
      div("form-col",[e("label",{class:"form-label"},"עד תאריך *"),e("input",{class:"fi",type:"date",min:today(),value:S.newVac.endDate,oninput:ev=>{S.newVac.endDate=ev.target.value}})])
    ]));
    form.appendChild(div("form-col",[e("label",{class:"form-label"},"סיבה"),e("input",{class:"fi",placeholder:"אופציונלי",value:S.newVac.reason,oninput:ev=>{S.newVac.reason=ev.target.value}})],{style:"margin-bottom:12px"}));
    form.appendChild(div("form-actions",[
      btn("btn-add","שלח בקשה",async(ev)=>{ 
        ev.target.disabled = true;
        S.newVac.employeeId = S.user.id; 
        await addVacation(); 
      },{style:"flex:1"}),
      btn("btn-sm btn-sm-gray","ביטול",()=>{S.showAddVac=false;render();})
    ]));
    wrap.appendChild(form);
  }

  const myVacs = S.vacations.filter(v=>v.employee_id===S.user.id);
  const myCard = div("card",[e("div",{style:"font-weight:700;font-size:14px;color:#E2E8F0;margin-bottom:12px"},"הבקשות שלי")]);
  
  if (myVacs.length === 0) {
    myCard.appendChild(e("div",{style:"text-align:center;padding:24px;color:#64748B;font-size:13px"},"אין בקשות חופשה עדיין"));
  } else {
    myVacs.sort((a,b)=>String(b.start_date||"").localeCompare(String(a.start_date||""))).forEach(vac=>{
      const icon = vac.type === 'reserve' ? '🎖️' : '🌴';
      const st = vac.status==="approved"?"approved":vac.status==="rejected"?"rejected":"pending";
      const label = vac.status==="approved"?"אושרה ✓":vac.status==="rejected"?"נדחתה ✗":"ממתין לאישור";
      
      if (S.editingVac === vac.id) {
         myCard.appendChild(e("div",{style:"display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:#0F172A;border-radius:10px;margin-bottom:8px;border:1px solid #334155"},[
           e("div",{style:"display:flex;gap:6px;align-items:center;width:100%"},[
             e("input", {type:"date", id:"mev_s_"+vac.id, value:vac.start_date, class:"fi", style:"padding:6px;font-size:12px;flex:1"}),
             e("span",{style:"color:#94A3B8"},"עד"),
             e("input", {type:"date", id:"mev_e_"+vac.id, value:vac.end_date, class:"fi", style:"padding:6px;font-size:12px;flex:1"})
           ]),
           e("div",{style:"display:flex;gap:4px;width:100%;margin-top:6px"},[
             btn("btn-sm btn-sm-green", "שמור ושלח מחדש", () => {
                const ns = $("mev_s_"+vac.id).value; const ne = $("mev_e_"+vac.id).value;
                if(ns&&ne&&ns<=ne) editVacation(vac.id, ns, ne, "pending"); else toast("תאריכים לא תקינים","err");
             },{style:"flex:1"}),
             btn("btn-sm btn-sm-gray", "ביטול", () => { S.editingVac = null; render(); })
           ])
         ]));
      } else {
         myCard.appendChild(e("div",{style:"display:flex;justify-content:space-between;align-items:center;background:#0F172A;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #1E293B"},[
           e("div",{style:"flex:1"},[
             e("div",{style:"font-weight:700;font-size:13px;color:#E2E8F0"},`${icon} ${(vac.start_date||"")} — ${(vac.end_date||"")}`),
             vac.reason?e("div",{style:"font-size:11px;color:#64748B;margin-top:2px"},vac.reason):null
           ]),
           e("div",{style:"display:flex;flex-direction:column;align-items:flex-end;gap:6px"},[
              e("span",{class:"status-badge status-"+st},label),
              e("div",{style:"display:flex;gap:4px"},[
                btn("btn-sm btn-sm-blue", "✏️", () => { S.editingVac = vac.id; render(); }, {style:"font-size:12px;padding:4px 6px"}),
                btn("btn-sm btn-sm-red", "🗑️", () => deleteVacRequest(vac.id), {style:"font-size:12px;padding:4px 6px"})
              ])
           ])
         ]));
      }
    });
  }
  wrap.appendChild(myCard);
  return wrap;
}

// CALENDAR VIEW
// ══════════════════════════════════════════════════════
// ── CALENDAR VIEW ──
function viewCalendar() {
  const wrap = e("div");
  
  // אתחול מונע שגיאת Invalid Date
  if (S.monthOffset === undefined) S.monthOffset = 0;
  
  const now = new Date();
  const year = now.getFullYear() + Math.floor((now.getMonth() + S.monthOffset) / 12);
  const month = ((now.getMonth() + S.monthOffset) % 12 + 12) % 12;
  const monthName = new Date(year, month, 1).toLocaleDateString("he-IL", {month:"long", year:"numeric"});

  // כותרת וניווט חודשים
  wrap.appendChild(div("section-header",[
    div("page-title", ["🗓️ " + monthName]),
    e("div",{style:"display:flex;gap:8px"},[
      e("button",{class:"btn-sm btn-sm-gray", onclick:()=>{S.monthOffset++; render();}}, "→"),
      e("button",{class:"btn-sm btn-sm-blue", onclick:()=>{S.monthOffset=0; render();}}, "החודש"),
      e("button",{class:"btn-sm btn-sm-gray", onclick:()=>{S.monthOffset--; render();}}, "←")
    ])
  ]));

  // פילטר עובדים
  const filterWrap = e("div",{style:"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px"});
  filterWrap.appendChild(e("button",{
    style:`padding:5px 12px;border-radius:8px;border:1px solid ${S.calFilterEmp===null?"#3B82F6":"#334155"};background:${S.calFilterEmp===null?"#3B82F622":"#1E293B"};color:${S.calFilterEmp===null?"#60A5FA":"#64748B"};font-family:inherit;font-size:12px;font-weight:600`,
    onclick:()=>{S.calFilterEmp=null; render();}
  },"כולם"));
  
  S.employees.forEach((emp,idx)=>{
    const col=ec(idx);
    const sel=S.calFilterEmp===emp.id;
    filterWrap.appendChild(e("button",{
      style:`padding:5px 12px;border-radius:8px;border:1px solid ${sel?col+"aa":col+"44"};background:${sel?col+"33":"#1E293B"};color:${sel?col:"#64748B"};font-family:inherit;font-size:12px;font-weight:600`,
      onclick:()=>{S.calFilterEmp=sel?null:emp.id; render();}
    }, emp.name.split(" ")[0]));
  });
  wrap.appendChild(filterWrap);

  // חישובי גריד
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  const startDow = firstDay.getDay(); // 0=ראשון
  const totalDays = lastDay.getDate();

  const calCard = div("card");
  calCard.style.padding = "12px";

  // שורת ימי השבוע
  const hdrRow = e("div",{style:"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px"});
  DAYS.forEach(d=>hdrRow.appendChild(e("div",{style:"text-align:center;font-size:11px;font-weight:700;color:#64748B;padding:4px 0"}, d)));
  calCard.appendChild(hdrRow);

  const grid = e("div",{style:"display:grid;grid-template-columns:repeat(7,1fr);gap:2px"});

  // תאים ריקים לתחילת חודש
  for (let i=0; i<startDow; i++) {
    grid.appendChild(e("div",{style:"min-height:80px"}));
  }

  // בניית התאים לכל יום
  for (let d=1; d<=totalDays; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dt = new Date(dateStr + "T00:00:00");
    const isToday = dateStr === today();
    const isWeekend = dt.getDay() === 5 || dt.getDay() === 6;

    // שליפת חופשות/מילואים לאותו יום
    const dayAbsences = S.vacations.filter(v => v.status === "approved" && dateStr >= v.start_date && dateStr <= v.end_date);

    const cell = e("div",{
      style:`min-height:80px;background:${isToday?"#1E3A5F":isWeekend?"#1A2234":"#1E293B"};border-radius:8px;padding:4px;border:1px solid ${isToday?"#3B82F6":"#334155"};cursor:pointer`,
      onclick:()=>{
        const today2 = new Date();
        today2.setHours(0,0,0,0);
        const diffDays = Math.round((dt - today2)/(1000*60*60*24));
        S.weekOffset = Math.floor(diffDays/7);
        S.view="schedule";
        loadSchedule().then(()=>render());
      }
    });

    cell.appendChild(e("div",{style:`font-size:13px;font-weight:${isToday?"900":"600"};color:${isToday?"#60A5FA":isWeekend?"#94A3B8":"#E2E8F0"};margin-bottom:3px`}, String(d)));

    // מחווני משמרות (נקודות/שמות קטנים)
    SHIFTS.forEach(sh => {
      const empIds = (S.schedule[dateStr]?.[sh.id] || []);
      const filtered = S.calFilterEmp ? empIds.filter(id=>id===S.calFilterEmp) : empIds;
      
      if (filtered.length > 0) {
        const row = e("div",{style:`display:flex;flex-wrap:wrap;gap:2px;margin-bottom:2px`});
        filtered.slice(0,2).forEach(empId => {
          const col = ec(empIdx(empId));
          row.appendChild(e("div",{style:`background:${col}22;border:1px solid ${col}44;border-radius:4px;padding:1px 3px;font-size:9px;font-weight:700;color:${col};white-space:nowrap`}, getEmp(empId)?.name.split(" ")[0]));
        });
        cell.appendChild(row);
      }
    });

    // העדרויות - למנהלים בלבד
    if (isManager()) {
      dayAbsences.forEach(v => {
        const emp = getEmp(v.employee_id);
        if (emp) {
          const isReserve = v.type === 'reserve';
          const icon = isReserve ? '🎖️' : '🌴';
          const color = isReserve ? '#818CF8' : '#F59E0B';
          cell.appendChild(e("div",{style:`font-size:9px;color:${color};background:${color}11;border-radius:4px;padding:1px 4px;margin-top:1px;white-space:nowrap;overflow:hidden`}, `${icon} ${emp.name.split(" ")[0]}`));
        }
      });
    }

    grid.appendChild(cell);
  }

  calCard.appendChild(grid);
  wrap.appendChild(calCard);

  // מקרא
  wrap.appendChild(div("",[ 
    e("div",{style:"display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11px;color:#64748B"},[
      e("span",{},"💡 לחץ על יום למעבר לסידור השבועי"),
      isManager() ? e("span",{style:"color:#F59E0B"},"🌴 חופשה") : null,
      isManager() ? e("span",{style:"color:#818CF8"},"🎖️ מילואים") : null
    ].filter(Boolean))
  ]));

  return wrap;
}
// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render() {
  const app = $("app");
  app.innerHTML = "";

  if (S.view==="loading") { app.appendChild(viewLoading()); return; }
  if (S.view==="login")   { app.appendChild(viewLogin()); }
  else {
    const appWrap = div("app");
    appWrap.appendChild(viewHeader());
    const main = div("main");

    if (S.view==="home")       main.appendChild(viewHome());
    else if(S.view==="schedule")  main.appendChild(viewSchedule());
    else if(S.view==="calendar")  main.appendChild(viewCalendar());
    else if(S.view==="employees" && isManager()) main.appendChild(viewEmployees());
    else if(S.view==="employees" && !isManager()) { S.view="empview"; main.appendChild(viewEmpView()); }
    else if(S.view==="vacations") main.appendChild(isManager() ? viewVacations() : viewEmpVacations());
    else if(S.view==="swaps")     main.appendChild(viewSwaps());
    else if(S.view==="stats")     main.appendChild(viewStats());
    else if(S.view==="empview")   main.appendChild(viewEmpView());
    else if(S.view==="settings")  main.appendChild(viewSettings());

    appWrap.appendChild(main);
    app.appendChild(appWrap);

    // Modals
    if(S.constraintsEmp) app.appendChild(viewConstraintsModal());
    if(S.showPublishModal) app.appendChild(viewPublishModal());
  }

  // Mobile bottom nav (Fix: 4-5 buttons max, better touch targets)
  if (S.view !== "login" && S.view !== "loading") {
    const pendingVacs2 = S.vacations.filter(v=>v.status==="pending").length;
    const pendingSwaps2 = S.swapRequests.filter(s=>s.status==="pending_manager").length;
    const bottomNav = e("div",{class:"mobile-bottom-nav"});
    
    const isEmpOnly = S.profile?.role === "employee";
    
    // סינון ל-4 כפתורים מרכזיים בלבד במובייל למניעת צפיפות
    const bottomTabs = isEmpOnly ? [
      {id:"empview",icon:"📋",label:"שלי"},
      {id:"schedule",icon:"📅",label:"סידור"},
      {id:"vacations",icon:"🌴",label:"העדרויות"},
      {id:"swaps",icon:"🔄",label:"חילופים"},
    ] : [
      {id:"home",icon:"🏠",label:"בית"},
      {id:"schedule",icon:"📅",label:"סידור"},
      {id:"vacations",icon:"🌴",label:"העדרויות",badge:pendingVacs2},
      {id:"swaps",icon:"🔄",label:"חילופים",badge:pendingSwaps2},
    ];

    bottomTabs.forEach(t => {
      const isActive = S.view===t.id;
      // כפתור מוגדל (רוחב 25%) כדי שהלחיצה תעבוד בצורה חלקה תמיד
      const btn2 = e("button",{
        style:`flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:12px 0 8px; border:none; border-top:2px solid ${isActive?"#3B82F6":"transparent"}; background:transparent; color:${isActive?"#3B82F6":"#94A3B8"}; font-family:inherit; cursor:pointer; position:relative; min-height:64px; transition:color 0.15s; width:25%;`,
        onclick:()=>{S.view=t.id; S.selectedCell=null; render();}
      },[
        t.badge>0?e("span",{style:"position:absolute;top:6px;right:calc(50% - 18px);background:#EF4444;color:white;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center"},String(t.badge)):null,
        e("span",{style:"font-size:24px;line-height:1;pointer-events:none;"},t.icon),
        e("span",{style:`font-size:11px;font-weight:${isActive?"800":"600"};margin-top:2px;pointer-events:none;`},t.label)
      ]);
      bottomNav.appendChild(btn2);
    });
    app.appendChild(bottomNav);
  }

  // Toast
  if(S.toast) {
    app.appendChild(e("div",{class:"toast"+(S.toast.type==="err"?" err":"")},S.toast.msg));
  }
}

// INIT
checkAuth();
</script>

<!-- Mobile Debug Console -->
<div id="mob-console" style="display:none;position:fixed;bottom:0;left:0;right:0;height:200px;background:#000;color:#0f0;font-family:monospace;font-size:11px;overflow-y:auto;z-index:99999;border-top:2px solid #0f0;padding:8px">
  <div style="display:flex;justify-content:space-between;margin-bottom:6px">
    <span style="color:#0f0;font-weight:700">🐛 Console</span>
    <button onclick="document.getElementById('mob-console').style.display='none'" style="background:none;border:1px solid #0f0;color:#0f0;padding:2px 8px;cursor:pointer;font-family:monospace">✕</button>
  </div>
  <div id="mob-console-log"></div>
</div>

<button id="mob-console-btn" onclick="document.getElementById('mob-console').style.display='block'" style="display:none;position:fixed;bottom:70px;left:10px;background:#000;color:#0f0;border:1px solid #0f0;border-radius:6px;padding:4px 8px;font-size:11px;font-family:monospace;z-index:99998;cursor:pointer">🐛</button>

<script>
// Show debug button only on mobile
if (/iPhone|iPad|Android/i.test(navigator.userAgent)) {
  document.getElementById('mob-console-btn').style.display = 'block';
}

// Override console methods
const logEl = document.getElementById('mob-console-log');
function addLog(type, args) {
  const colors = { log:'#ccc', warn:'#fa0', error:'#f44', info:'#4af' };
  const line = document.createElement('div');
  line.style.color = colors[type] || '#ccc';
  line.style.borderBottom = '1px solid #111';
  line.style.padding = '2px 0';
  line.textContent = '[' + type.toUpperCase() + '] ' + Array.from(args).map(a => {
    try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e) { return String(a); }
  }).join(' ');
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

const _log = console.log.bind(console);
const _warn = console.warn.bind(console);
const _error = console.error.bind(console);
const _info = console.info.bind(console);

console.log = function() { _log(...arguments); addLog('log', arguments); };
console.warn = function() { _warn(...arguments); addLog('warn', arguments); };
console.error = function() { _error(...arguments); addLog('error', arguments); };
console.info = function() { _info(...arguments); addLog('info', arguments); };

window.onerror = function(msg, src, line) {
  addLog('error', [msg + ' (line ' + line + ')']);
};
</script>
