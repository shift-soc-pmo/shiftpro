// ─── Helpers ─────────────────────────────────────────────────────────────────
function getWeekDates(offset=0) {
  const today = new Date(); // תמיד היום האמיתי
  today.setDate(today.getDate()+offset*7);
  const sunday = new Date(today);
  sunday.setDate(today.getDate()-today.getDay());
  return Array.from({length:7},(_,i)=>{ const d=new Date(sunday); d.setDate(sunday.getDate()+i); return d; });
}
function dateToStr(d){ return d.toISOString().split("T")[0]; }
function empColor(idx){ return EMPLOYEE_PALETTE[idx % EMPLOYEE_PALETTE.length]; }

// ─── Export: Excel (CSV with BOM for Hebrew) ─────────────────────────────────
function exportToExcel(employees, schedule, weekDates, shiftNames, shiftHours, weekLabel) {
  const getEmp = id => employees.find(e => e.id === id);
  const rows = [];

  // Header row
  rows.push(["סידור עבודה — " + weekLabel]);
  rows.push([]);

  // Grid header
  const header = ["משמרת / שעות", ...weekDates.map(d =>
    DAYS[d.getDay()] + " " + d.getDate() + "/" + (d.getMonth()+1)
  )];
  rows.push(header);

  // One row per shift
  shiftNames.forEach(shift => {
    const row = [`${shift}  (${shiftHours[shift].start}–${shiftHours[shift].end})`];
    weekDates.forEach(date => {
      const dateStr = dateToStr(date);
      const assigned = (schedule[dateStr]?.[shift] || [])
        .map(id => getEmp(id)?.name || "").filter(Boolean).join(" + ");
      row.push(assigned || "—");
    });
    rows.push(row);
  });

  rows.push([]);
  rows.push(["סיכום עובדים"]);
  rows.push(["שם", "תפקיד", ...shiftNames, "סה\"כ"]);

  employees.forEach(emp => {
    const perShift = {};
    shiftNames.forEach(s => { perShift[s] = 0; });
    Object.values(schedule).forEach(day =>
      Object.entries(day).forEach(([shift, ids]) => {
        if (ids.includes(emp.id) && perShift[shift] !== undefined) perShift[shift]++;
      })
    );
    const total = Object.values(perShift).reduce((a,b)=>a+b,0);
    rows.push([emp.name, emp.role, ...shiftNames.map(s=>perShift[s]||0), total]);
  });

  // Build CSV
  const csv = "\uFEFF" + rows.map(r =>
    r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")
  ).join("\r\n");

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `סידור_עבודה_${weekLabel.replace(/ /g,"_").replace(/\//g,"-")}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Smart Scheduler v2 ───────────────────────────────────────────────────────
// Returns { schedule, reasons, warnings }
// schedule:  { [dateStr]: { [shift]: empId[] } }
// reasons:   { [dateStr_shift_empId]: string[] }   — why this employee was picked
// warnings:  { [dateStr_shift]: string }            — why a slot couldn't be filled
// locked:    { [dateStr_shift]: Set<empId> }        — passed in, not overwritten

function smartSchedule(employees, vacations, weekDates, shiftNames, lockedSlots = {}, availSubmissions = []) {
  const schedule     = {};
  const reasons      = {};   // key: `${date}|${shift}|${empId}`
  const warnings     = {};   // key: `${date}|${shift}`
  const totalCount   = {};
  const shiftTypeCount = {};
  // track last-shift-of-prev-day per employee to detect back-to-back
  const lastShiftOfDay = {}; // empId -> { date, shift }

  employees.forEach(e => {
    totalCount[e.id] = 0;
    shiftTypeCount[e.id] = {};
    lastShiftOfDay[e.id] = null;
  });

  // Helper: index of shift in the day order (for back-to-back detection)
  const shiftOrder = (shift) => {
    const idx = shiftNames.indexOf(shift);
    return idx === -1 ? 99 : idx;
  };

  weekDates.forEach((date, dayIdx) => {
    const dateStr = dateToStr(date);
    const dayName = DAYS[date.getDay()];
    schedule[dateStr] = {};

    shiftNames.forEach((shift, shiftIdx) => {
      // Preserve locked assignments
      const lockedKey = `${dateStr}|${shift}`;
      const locked = lockedSlots[lockedKey] ? [...lockedSlots[lockedKey]] : [];

      // Score each employee — higher = better pick
      const scored = employees.map(emp => {
        const skipReasons = [];
        const pickReasons = [];

        // ── Hard disqualifiers ──
        if (locked.includes(emp.id)) {
          return { emp, score: null, skip: null, locked: true, pickReasons: ["🔒 שיבוץ נעול ידנית"] };
        }
        const onVacation = vacations.some(v =>
          v.employeeId === emp.id && v.status === "approved" &&
          dateStr >= v.startDate && dateStr <= v.endDate
        );
        if (onVacation) skipReasons.push("🌴 בחופשה");
        if (!emp.availability.includes(dayName)) skipReasons.push("📅 לא זמין ביום זה");
        // Check dayConstraints — explicit block
        const dayCon = emp.dayConstraints?.[dayName]?.[shift];
        if (dayCon === 0) skipReasons.push(`🚫 אסור: ${dayName} ${shift}`);
        if (totalCount[emp.id] >= emp.maxShifts) skipReasons.push(`📊 הגיע למקסימום (${emp.maxShifts} משמרות)`);
        const perShiftLimit = emp.maxPerShift?.[shift];
        if (perShiftLimit != null && (shiftTypeCount[emp.id][shift] || 0) >= perShiftLimit) {
          skipReasons.push(`🚫 הגיע למגבלת ${shift} (${perShiftLimit})`);
        }

        // Back-to-back: night → morning
        const prev = lastShiftOfDay[emp.id];
        const prevDateStr = dayIdx > 0 ? dateToStr(weekDates[dayIdx - 1]) : null;
        const isNightToMorning =
          prev && prevDateStr &&
          prev.date === prevDateStr &&
          shiftNames[shiftNames.length - 1] === prev.shift &&
          shiftIdx === 0;
        if (isNightToMorning) skipReasons.push("🌙 לילה → בוקר — מנוחה מינימלית");

        // Consecutive days in a row
        let consecutive = 0;
        for (let i = 1; i <= dayIdx; i++) {
          const ds = dateToStr(weekDates[dayIdx - i]);
          if (Object.values(schedule[ds] || {}).flat().includes(emp.id)) consecutive++;
          else break;
        }
        if (consecutive >= 5) skipReasons.push(`📆 ${consecutive} ימים ברצף — מנוחה מומלצת`);

        if (skipReasons.length > 0) return { emp, score: -1, skip: skipReasons, pickReasons: [] };

        // ── Scoring (higher = prefer) ──
        let score = 100;

        // Prefer employee with fewer shifts (balance)
        score -= totalCount[emp.id] * 12;

        // STRONG preference if employee submitted this slot in availability
        const submittedAvail = (availSubmissions||[]).find(s =>
          s.empId === emp.id &&
          s.slots.some(sl => sl.shift === shift && DAYS[new Date(dateStr+"T00:00:00").getDay()] === dayName || sl.day === new Date(dateStr+"T00:00:00").getDay())
        );
        if (submittedAvail) {
          score += 50;
          pickReasons.push("📋 הגיש זמינות");
        }

        // Explicit allow in dayConstraints = bonus
        const dayConAllow = emp.dayConstraints?.[dayName]?.[shift];
        if (dayConAllow === 1) {
          score += 20;
          pickReasons.push("✅ מותר ביום זה");
        }

        // Prefer preferred shifts
        if (emp.preferredShifts.includes(shift)) {
          score += 30;
          pickReasons.push("⭐ משמרת מועדפת");
        } else {
          pickReasons.push("✓ זמין");
        }

        // Prefer not assigning same employee two shifts in same day
        const alreadyToday = shiftNames.slice(0, shiftIdx).some(s =>
          (schedule[dateStr][s] || []).includes(emp.id)
        );
        if (alreadyToday) { score -= 50; skipReasons.push("⚡ כבר שובץ היום"); }

        // Workload balance boost for under-worked employees
        const avgShifts = employees.reduce((s, e) => s + totalCount[e.id], 0) / employees.length;
        if (totalCount[emp.id] < avgShifts) {
          score += 10;
          pickReasons.push("⚖️ פיזור עומס");
        }

        // Slight penalty for back-to-back days (not blocking, just deprioritise)
        const workedYesterday = dayIdx > 0 && Object.values(schedule[dateToStr(weekDates[dayIdx - 1])] || {}).flat().includes(emp.id);
        if (workedYesterday) score -= 8;

        return { emp, score, skip: skipReasons.length ? skipReasons : null, pickReasons };
      });

      // Always include locked first
      const lockedEntries = scored.filter(s => s.locked);
      const eligible = scored
        .filter(s => !s.locked && s.score >= 0)
        .sort((a, b) => b.score - a.score);

      const toAssign = [
        ...lockedEntries,
        ...eligible.slice(0, Math.max(0, 2 - lockedEntries.length))
      ];

      schedule[dateStr][shift] = toAssign.map(s => s.emp.id);

      // Record reasons
      toAssign.forEach(({ emp, pickReasons }) => {
        reasons[`${dateStr}|${shift}|${emp.id}`] = pickReasons;
      });

      // Update counters
      toAssign.forEach(({ emp, locked: isLocked }) => {
        if (!isLocked) {
          totalCount[emp.id]++;
          shiftTypeCount[emp.id][shift] = (shiftTypeCount[emp.id][shift] || 0) + 1;
        }
        lastShiftOfDay[emp.id] = { date: dateStr, shift };
      });

      // Warning if slot underfilled
      const needed = 1; // minimum 1 per shift
      if (schedule[dateStr][shift].length < needed) {
        const allSkipReasons = scored
          .filter(s => s.skip && !s.locked)
          .map(s => `${s.emp.name}: ${s.skip[0]}`);
        warnings[lockedKey] = allSkipReasons.length > 0
          ? `לא נמצאו עובדים. סיבות: ${allSkipReasons.slice(0, 3).join(" | ")}`
          : "אין עובדים זמינים למשמרת זו";
      }
    });
  });

  return { schedule, reasons, warnings };
}

  const WEEKDAYS = ["ראשון","שני","שלישי","רביעי","חמישי"];
  const WEEKEND  = ["שישי","שבת"];

  // 0=אסור, 1=מותר, undefined=ללא הגבלה (cycle: undefined→1→0→undefined)
  function cycleDay(day, shift) {
    setDayConstraints(p => {
      const n = JSON.parse(JSON.stringify(p));
      if (!n[day]) n[day] = {};
      const cur = n[day][shift];
      if (cur === undefined) n[day][shift] = 1;
      else if (cur === 1)    n[day][shift] = 0;
      else                   delete n[day][shift];
      return n;
    });
  }

  function cellStyle(day, shift) {
    const val = dayConstraints[day]?.[shift];
    const col = SHIFT_COLORS[shift]||"#94A3B8";
    if (val === 1) return { background:col+"33", border:`1px solid ${col}88`, color:col, fontWeight:800 };
    if (val === 0) return { background:"#EF444422", border:"1px solid #EF444433", color:"#EF4444", fontWeight:700 };
    return { background:"#1E293B", border:"1px solid #334155", color:"#475569" };
  }
  function cellLabel(day, shift) {
    const val = dayConstraints[day]?.[shift];
    if (val === 1) return "✓";
    if (val === 0) return "✗";
    return "~";
  }

}


// ─── Calendar Month View ──────────────────────────────────────────────────────
function CalendarView({
  employees, schedule, vacations, shiftHours, shiftNames,
  monthOffset, setMonthOffset, calFilterEmp, setCalFilterEmp,
  calDayDetail, setCalDayDetail, lockedSlots, publishedWeeks,
  readOnly = false
}) {
  const MONTH_HE = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

  // Base today = April 2026
  const base = new Date(); // החודש הנוכחי
  base.setMonth(base.getMonth() + monthOffset);
  const year  = base.getFullYear();
  const month = base.getMonth();

  // Build full 6-week grid (42 cells)
  const firstDay = new Date(year, month, 1);
  const startCell = new Date(firstDay);
  startCell.setDate(1 - firstDay.getDay()); // go back to Sunday

  const cells = Array.from({length: 42}, (_, i) => {
    const d = new Date(startCell);
    d.setDate(startCell.getDate() + i);
    return d;
  });

  const today = dateToStr(new Date());
  const getEmp = id => employees.find(e => e.id === id);
  const getEmpIdx = id => employees.findIndex(e => e.id === id);

  function getDayData(d) {
    const ds = dateToStr(d);
    const dayShifts = schedule[ds] || {};
    const dayVacs = vacations.filter(v =>
      v.status === "approved" && ds >= v.startDate && ds <= v.endDate
    );

    // Flatten assigned employees (filtered if needed)
    const allAssigned = [];
    shiftNames.forEach(shift => {
      (dayShifts[shift] || []).forEach(empId => {
        if (!calFilterEmp || empId === calFilterEmp) {
          allAssigned.push({ empId, shift });
        }
      });
    });

    const filteredVacs = calFilterEmp
      ? dayVacs.filter(v => v.employeeId === calFilterEmp)
      : dayVacs;

    return { ds, allAssigned, filteredVacs };
  }

  // Day detail modal data
  const detailData = calDayDetail
    ? (() => {
        const d = new Date(calDayDetail + "T00:00:00");
        const dayShifts = schedule[calDayDetail] || {};
        const dayVacs = vacations.filter(v =>
          v.status === "approved" && calDayDetail >= v.startDate && calDayDetail <= v.endDate
        );
        return { d, dayShifts, dayVacs };
      })()
    : null;

  return (
    <div>
      {/* Day detail modal */}
      {calDayDetail && detailData && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={() => setCalDayDetail(null)}>
          <div onClick={e => e.stopPropagation()} style={{
            background:"#1E293B", border:"1px solid #334155", borderRadius:16,
            padding:24, width:380, maxWidth:"92vw", boxShadow:"0 32px 80px rgba(0,0,0,0.6)", maxHeight:"80vh", overflowY:"auto"
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div>
                <div style={{ fontWeight:800, fontSize:17, color:"#E2E8F0" }}>
                  {DAYS[detailData.d.getDay()]} {detailData.d.getDate()} {MONTH_HE[detailData.d.getMonth()]}
                </div>
                <div style={{ fontSize:12, color:"#64748B" }}>{detailData.d.getFullYear()}</div>
              </div>
              <button onClick={() => setCalDayDetail(null)}
                style={{ background:"none", border:"none", color:"#64748B", fontSize:20, cursor:"pointer" }}>✕</button>
            </div>

            {/* Shifts */}
            {shiftNames.map(shift => {
              const assigned = detailData.dayShifts[shift] || [];
              const color = SHIFT_COLORS[shift] || "#94A3B8";
              return (
                <div key={shift} style={{ marginBottom:12, background:"#0F172A", borderRadius:10, padding:12, border:`1px solid ${color}33` }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <span style={{ width:8, height:8, borderRadius:"50%", background:color }}/>
                    <span style={{ fontWeight:700, fontSize:13, color }}>{shift}</span>
                    <span style={{ fontSize:11, color:"#475569" }}>{shiftHours[shift]?.start}–{shiftHours[shift]?.end}</span>
                  </div>
                  {assigned.length === 0
                    ? <div style={{ fontSize:12, color:"#475569" }}>לא שובץ אף עובד</div>
                    : assigned.map(empId => {
                        const emp = getEmp(empId);
                        const col = empColor(getEmpIdx(empId));
                        const locked = lockedSlots[`${calDayDetail}|${shift}`]?.has(empId);
                        return emp ? (
                          <div key={empId} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, background:col+"18", border:`1px solid ${col}44`, borderRadius:8, padding:"5px 10px" }}>
                            <span style={{ width:6, height:6, borderRadius:"50%", background:col, flexShrink:0 }}/>
                            <span style={{ fontSize:13, fontWeight:600, color:"#E2E8F0", flex:1 }}>{emp.name}</span>
                            {locked && <span style={{ fontSize:10, color:col }}>🔒</span>}
                          </div>
                        ) : null;
                      })
                  }
                </div>
              );
            })}

            {/* Vacations */}
            {detailData.dayVacs.length > 0 && (
              <div style={{ marginTop:4, background:"#F59E0B18", borderRadius:10, padding:12, border:"1px solid #F59E0B33" }}>
                <div style={{ fontWeight:700, fontSize:13, color:"#F59E0B", marginBottom:8 }}>🌴 חופשות</div>
                {detailData.dayVacs.map((v, i) => {
                  const emp = getEmp(v.employeeId);
                  return (
                    <div key={i} style={{ fontSize:12, color:"#FCD34D", marginBottom:3 }}>
                      {emp?.name}{v.reason ? ` — ${v.reason}` : ""}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ margin:0, fontWeight:800, fontSize:22 }}>
            {MONTH_HE[month]} {year}
          </h2>
          <div style={{ color:"#64748B", fontSize:13, marginTop:2 }}>תצוגה חודשית</div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
          {/* Employee filter — hidden in readOnly mode */}
          {!readOnly && <select
            value={calFilterEmp || ""}
            onChange={e => setCalFilterEmp(e.target.value ? parseInt(e.target.value) : null)}
            style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:8, padding:"8px 12px", color:"#E2E8F0", fontFamily:"Heebo", fontSize:13, cursor:"pointer" }}>
            <option value="">כל העובדים</option>
            {employees.map((emp, idx) => (
              <option key={emp.id} value={emp.id}>{emp.name}</option>
            ))}
          </select>}
          <button onClick={() => setMonthOffset(m => m - 1)}
            style={{ background:"#1E293B", border:"1px solid #334155", color:"#94A3B8", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:16 }}>←</button>
          <button onClick={() => setMonthOffset(0)}
            style={{ background:"#3B82F6", border:"none", color:"white", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:13 }}>
            החודש
          </button>
          <button onClick={() => setMonthOffset(m => m + 1)}
            style={{ background:"#1E293B", border:"1px solid #334155", color:"#94A3B8", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:16 }}>→</button>
        </div>
      </div>

      {/* Employee filter active badge */}
      {calFilterEmp && (
        <div style={{ display:"inline-flex", alignItems:"center", gap:8, background:"#3B82F622", border:"1px solid #3B82F644", borderRadius:8, padding:"5px 12px", marginBottom:14, fontSize:13, color:"#60A5FA" }}>
          <span style={{ width:8, height:8, borderRadius:"50%", background:empColor(employees.findIndex(e=>e.id===calFilterEmp)) }}/>
          מסנן: {getEmp(calFilterEmp)?.name}
          <button onClick={() => setCalFilterEmp(null)}
            style={{ background:"none", border:"none", color:"#475569", cursor:"pointer", fontSize:14, padding:"0 0 0 4px" }}>✕</button>
        </div>
      )}

      {/* Legend */}
      <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:16 }}>
        {shiftNames.map(shift => (
          <div key={shift} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12 }}>
            <span style={{ width:10, height:10, borderRadius:3, background:SHIFT_COLORS[shift]||"#94A3B8", flexShrink:0 }}/>
            <span style={{ color:"#94A3B8" }}>{shift}</span>
          </div>
        ))}
        <div style={{ display:"flex", alignItems:"center", gap:5, fontSize:12 }}>
          <span style={{ width:10, height:10, borderRadius:3, background:"#F59E0B", flexShrink:0 }}/>
          <span style={{ color:"#94A3B8" }}>חופשה</span>
        </div>
      </div>

      {/* Day-of-week header */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:3 }}>
        {DAYS.map(d => (
          <div key={d} style={{ textAlign:"center", fontSize:11, fontWeight:700, color:"#64748B", padding:"6px 0" }}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
        {cells.map((cellDate, ci) => {
          const isCurrentMonth = cellDate.getMonth() === month;
          const ds = dateToStr(cellDate);
          const isToday = ds === today;
          const { allAssigned, filteredVacs } = getDayData(cellDate);

          // Unique employees for this day (for dots)
          const uniqueEmps = [...new Set(allAssigned.map(a => a.empId))];
          const hasVac = filteredVacs.length > 0;
          const isEmpty = allAssigned.length === 0 && !hasVac;

          // Group by shift for compact display
          const byShift = {};
          allAssigned.forEach(({empId, shift}) => {
            if (!byShift[shift]) byShift[shift] = [];
            byShift[shift].push(empId);
          });

          // Is this date in a published week?
          const cellSunday = new Date(cellDate);
          cellSunday.setDate(cellDate.getDate() - cellDate.getDay());
          const isPublished = publishedWeeks.has(dateToStr(cellSunday));

          return (
            <div key={ci}
              onClick={() => isCurrentMonth && setCalDayDetail(ds)}
              style={{
                minHeight: 90,
                background: isToday ? "#1E3A5F" : isCurrentMonth ? "#1E293B" : "#0F172A",
                border: isToday ? "1px solid #3B82F6" : "1px solid #1E293B",
                borderRadius: 8,
                padding: "6px 5px",
                cursor: isCurrentMonth ? "pointer" : "default",
                opacity: isCurrentMonth ? 1 : 0.3,
                transition: "all 0.12s",
                position: "relative",
              }}>

              {/* Day number */}
              <div style={{
                fontSize: 12, fontWeight: isToday ? 800 : 600,
                color: isToday ? "#60A5FA" : isCurrentMonth ? "#CBD5E1" : "#475569",
                marginBottom: 4, display:"flex", alignItems:"center", gap:3
              }}>
                {cellDate.getDate()}
                {isPublished && isCurrentMonth && (
                  <span style={{ width:5, height:5, borderRadius:"50%", background:"#10B981", flexShrink:0 }}/>
                )}
              </div>

              {/* Shift rows */}
              {shiftNames.map(shift => {
                const empIds = byShift[shift] || [];
                if (empIds.length === 0) return null;
                const color = SHIFT_COLORS[shift] || "#94A3B8";
                return (
                  <div key={shift} style={{ display:"flex", alignItems:"center", gap:2, marginBottom:2 }}>
                    <span style={{ width:5, height:5, borderRadius:"50%", background:color, flexShrink:0 }}/>
                    <div style={{ display:"flex", gap:1, flexWrap:"wrap", flex:1 }}>
                      {empIds.slice(0,3).map(empId => {
                        const col = empColor(employees.findIndex(e=>e.id===empId));
                        const name = getEmp(empId)?.name?.split(" ")[0] || "";
                        return (
                          <span key={empId} style={{
                            fontSize:9, fontWeight:700, color:col,
                            background:col+"22", borderRadius:3, padding:"1px 4px",
                            border:`1px solid ${col}33`, lineHeight:"14px",
                            maxWidth:42, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"
                          }}>
                            {name}
                          </span>
                        );
                      })}
                      {empIds.length > 3 && (
                        <span style={{ fontSize:9, color:"#475569" }}>+{empIds.length-3}</span>
                      )}
                    </div>
                  </div>
                );
              })}

              {/* Vacation indicator */}
              {hasVac && (
                <div style={{ display:"flex", alignItems:"center", gap:2, marginTop:2 }}>
                  <span style={{ fontSize:9 }}>🌴</span>
                  <span style={{ fontSize:9, color:"#F59E0B" }}>
                    {filteredVacs.length === 1
                      ? getEmp(filteredVacs[0].employeeId)?.name?.split(" ")[0]
                      : `${filteredVacs.length} בחופשה`}
                  </span>
                </div>
              )}

              {/* Empty day */}
              {isEmpty && isCurrentMonth && (
                <div style={{ fontSize:9, color:"#334155", textAlign:"center", marginTop:8 }}>—</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Monthly summary */}
      <div style={{ marginTop:20, background:"#1E293B", borderRadius:12, padding:20, border:"1px solid #334155" }}>
        <div style={{ fontWeight:700, fontSize:14, marginBottom:14, color:"#94A3B8" }}>סיכום חודשי</div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
          {employees
            .filter(emp => !calFilterEmp || emp.id === calFilterEmp)
            .map((emp, idx) => {
              // Count shifts this month
              let count = 0;
              const byShift = {};
              shiftNames.forEach(s => byShift[s] = 0);
              cells.forEach(cellDate => {
                if (cellDate.getMonth() !== month) return;
                const ds = dateToStr(cellDate);
                shiftNames.forEach(shift => {
                  if ((schedule[ds]?.[shift]||[]).includes(emp.id)) {
                    count++;
                    byShift[shift]++;
                  }
                });
              });
              const color = empColor(idx);
              if (count === 0 && calFilterEmp && calFilterEmp !== emp.id) return null;
              return (
                <div key={emp.id} style={{ flex:"1 1 140px", background:"#0F172A", borderRadius:10, padding:12 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                    <span style={{ width:8, height:8, borderRadius:"50%", background:color }}/>
                    <span style={{ fontSize:13, fontWeight:700 }}>{emp.name.split(" ")[0]}</span>
                    <span style={{ fontSize:12, color:"#64748B", marginRight:"auto" }}>{count} משמרות</span>
                  </div>
                  <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                    {shiftNames.filter(s=>byShift[s]>0).map(s => (
                      <span key={s} style={{
                        fontSize:10, fontWeight:600, padding:"2px 6px", borderRadius:4,
                        background:(SHIFT_COLORS[s]||"#94A3B8")+"22",
                        color:SHIFT_COLORS[s]||"#94A3B8",
                        border:`1px solid ${SHIFT_COLORS[s]||"#94A3B8"}44`
                      }}>
                        {s} ×{byShift[s]}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
        </div>
      </div>
    </div>
  );
}

      if (session?.user) {
        setCurrentUser(session.user);

      } else {
        setAuthState("login");

    });

  useEffect(() => {

    const weekStart = dateToStr(getWeekDates(weekOffset)[0]);
    const timer = setTimeout(() => saveScheduleToDb(schedule, weekStart), 800);
    return () => clearTimeout(timer);
  }, [schedule, dbReady]);
  const weekDates   = getWeekDates(weekOffset);
  const shiftNames  = Object.keys(shiftHours);
  const weekStartStr = dateToStr(weekDates[0]);
  const isPublished  = publishedWeeks.has(weekStartStr);
  const weekLabel    = `${weekDates[0].toLocaleDateString("he-IL")} — ${weekDates[6].toLocaleDateString("he-IL")}`;

  useEffect(()=>{
    const { schedule: s, reasons: r, warnings: w } = smartSchedule(employees, vacations, weekDates, shiftNames, lockedSlots, availSubmissions);
    setSchedule(s);
    setScheduleReasons(r);
    setScheduleWarnings(w);
  }, [weekOffset, employees, vacations, shiftHours, lockedSlots, availSubmissions]);

  function showToast(msg,type="success"){ setToast({msg,type}); setTimeout(()=>setToast(null),3000); }
  function getEmployee(id){ return employees.find(e=>e.id===id); }
  function getEmpIndex(id){ return employees.findIndex(e=>e.id===id); }

  // ── Compute stats ──────────────────────────────────────────────────────────
  const totalShifts = useMemo(()=>{
    const t = {};
    employees.forEach(e=>t[e.id]=0);
    Object.values(schedule).forEach(day=>Object.values(day).forEach(ids=>ids.forEach(id=>t[id]=(t[id]||0)+1)));
    return t;
  },[schedule,employees]);

  const shiftTypeCounts = useMemo(()=>{
    const t = {};
    employees.forEach(e=>{ t[e.id]={}; shiftNames.forEach(s=>t[e.id][s]=0); });
    Object.values(schedule).forEach(day=>
      Object.entries(day).forEach(([shift,ids])=>
        ids.forEach(id=>{ if(t[id]) t[id][shift]=(t[id][shift]||0)+1; })
      )
    );
    return t;
  },[schedule,employees,shiftNames]);

  // Conflicts: employee assigned more than their limit
  const conflicts = useMemo(()=>{
    const list = [];
    employees.forEach(emp=>{
      if ((totalShifts[emp.id]||0) > emp.maxShifts) {
        list.push({ empId:emp.id, type:"total", msg:`${emp.name}: ${totalShifts[emp.id]} משמרות (מקסימום ${emp.maxShifts})` });
      }
      shiftNames.forEach(shift=>{
        const lim = emp.maxPerShift?.[shift];
        if (lim != null && (shiftTypeCounts[emp.id]?.[shift]||0) > lim) {
          list.push({ empId:emp.id, type:"perShift", msg:`${emp.name}: ${shiftTypeCounts[emp.id][shift]} משמרות ${shift} (מקסימום ${lim})` });
        }
      });
    });
    return list;
  },[employees,totalShifts,shiftTypeCounts,shiftNames]);

  const totalAssigned = Object.values(schedule).reduce((s,day)=>s+Object.values(day).reduce((s2,ids)=>s2+ids.length,0),0);
  const fillRate = weekDates.length * shiftNames.length > 0
    ? Math.round(totalAssigned / (weekDates.length * shiftNames.length * 2) * 100) : 0;
  const topEmployee = employees.reduce((best,e)=>(totalShifts[e.id]||0)>(totalShifts[best?.id]||0)?e:best, employees[0]);

  const pendingVacations = vacations.filter(v=>v.status==="pending");
  const filteredEmployees = employees.filter(e=>e.name.includes(empSearch)||empSearch==="");

  function approveVacation(id){ setVacations(p=>p.map(v=>v.id===id?{...v,status:"approved"}:v)); showToast("חופשה אושרה ✓"); }
  function rejectVacation(id){ setVacations(p=>p.map(v=>v.id===id?{...v,status:"rejected"}:v)); showToast("חופשה נדחתה","error"); }

  function runSmartSchedule() {
    const { schedule: s, reasons: r, warnings: w } = smartSchedule(employees, vacations, weekDates, shiftNames, lockedSlots, availSubmissions);
    setSchedule(s);
    setScheduleReasons(r);
    setScheduleWarnings(w);
    const warnCount = Object.keys(w).length;
    if (warnCount > 0) showToast(`שיבוץ הושלם עם ${warnCount} אזהרות ⚠️`, "error");
    else showToast("שיבוץ חכם הושלם ✓");
  }

  function submitSwapRequest(data) {
    // data: { type, requesterId, requesterShift, requesterDate, targetId, targetShift, targetDate, note }
    const req = {
      id: Date.now(),
      type: data.type,                         // "swap" | "take"
      requesterId: data.requesterId,
      requesterShift: data.requesterShift || null,
      requesterDate: data.requesterDate || null,
      targetId: data.targetId || null,         // null for "take" (unowned slot)
      targetShift: data.targetShift,
      targetDate: data.targetDate,
      peerStatus: data.type === "swap" ? "pending" : "n/a",
      // swap → needs peer first; take/join → go straight to manager
      status: data.type === "swap" ? "pending_peer" : "pending_manager",
      note: data.note || "",
      createdAt: new Date().toISOString(),
    };
    setSwapRequests(prev => [req, ...prev]);
    setShowSwapModal(false);
    if (data.type === "swap")  showToast("בקשת חילוף נשלחה — ממתין לאישור העובד השני ✓");
    else if (data.type === "take") showToast("בקשת קבלת משמרת נשלחה למנהל ✓");
    else showToast("בקשת הצטרפות למשמרת נשלחה למנהל ✓");
  }

  // Peer (the other employee) approves the swap request → moves to manager queue
  function peerApproveSwap(swapId) {
    setSwapRequests(prev => prev.map(s =>
      s.id === swapId ? { ...s, peerStatus: "approved", status: "pending_manager" } : s
    ));
    showToast("עובד אישר — ממתין לאישור מנהל ✓");
  }

  function peerRejectSwap(swapId) {
    setSwapRequests(prev => prev.map(s =>
      s.id === swapId ? { ...s, peerStatus: "rejected", status: "rejected" } : s
    ));
    showToast("העובד השני דחה את הבקשה", "error");
  }

  // Manager final approval — applies changes to schedule
  function managerApproveSwap(swapId) {
    const swap = swapRequests.find(s => s.id === swapId);
    if (!swap) return;
    setSchedule(prev => {
      const u = JSON.parse(JSON.stringify(prev));
      if (swap.type === "swap") {
        // A ↔ B: requester takes target slot, target takes requester slot
        const rShift = swap.requesterShift, tShift = swap.targetShift;
        // Remove requester from their slot
        if (u[swap.requesterDate]?.[rShift])
          u[swap.requesterDate][rShift] = u[swap.requesterDate][rShift].filter(id => id !== swap.requesterId);
        // Add requester to target slot
        if (!u[swap.targetDate]) u[swap.targetDate] = {};
        if (!u[swap.targetDate][tShift]) u[swap.targetDate][tShift] = [];
        if (!u[swap.targetDate][tShift].includes(swap.requesterId)) u[swap.targetDate][tShift].push(swap.requesterId);
        // Remove target from their slot
        if (u[swap.targetDate]?.[tShift])
          u[swap.targetDate][tShift] = u[swap.targetDate][tShift].filter(id => id !== swap.targetId);
        // Add target to requester slot
        if (!u[swap.requesterDate]) u[swap.requesterDate] = {};
        if (!u[swap.requesterDate][rShift]) u[swap.requesterDate][rShift] = [];
        if (!u[swap.requesterDate][rShift].includes(swap.targetId)) u[swap.requesterDate][rShift].push(swap.targetId);
      } else if (swap.type === "take") {
        // "take": remove original employee, add requester in their place
        if (!u[swap.targetDate]) u[swap.targetDate] = {};
        if (!u[swap.targetDate][swap.targetShift]) u[swap.targetDate][swap.targetShift] = [];
        if (swap.targetId) {
          u[swap.targetDate][swap.targetShift] = u[swap.targetDate][swap.targetShift].filter(id => id !== swap.targetId);
        }
        if (!u[swap.targetDate][swap.targetShift].includes(swap.requesterId))
          u[swap.targetDate][swap.targetShift].push(swap.requesterId);
      } else {
        // "join": just add requester to the slot (no one leaves)
        if (!u[swap.targetDate]) u[swap.targetDate] = {};
        if (!u[swap.targetDate][swap.targetShift]) u[swap.targetDate][swap.targetShift] = [];
        if (!u[swap.targetDate][swap.targetShift].includes(swap.requesterId))
          u[swap.targetDate][swap.targetShift].push(swap.requesterId);
      }
      return u;
    });
    setSwapRequests(prev => prev.map(s => s.id === swapId ? { ...s, status: "approved" } : s));
    const msgs = { swap:"חילוף אושר ✓ — הסידור עודכן", take:"קבלת משמרת אושרה ✓ — הסידור עודכן", join:"הצטרפות אושרה ✓ — הסידור עודכן" };
    const msg = msgs[swap.type] || "אושר ✓";
    showToast(msg);
  }

  function managerRejectSwap(swapId) {
    setSwapRequests(prev => prev.map(s => s.id === swapId ? { ...s, status: "rejected" } : s));
    showToast("בקשה נדחתה על ידי המנהל", "error");
  }

  function toggleLock(dateStr, shift, empId) {
    const key = `${dateStr}|${shift}`;
    setLockedSlots(prev => {
      const next = { ...prev };
      const set = new Set(next[key] || []);
      if (set.has(empId)) set.delete(empId); else set.add(empId);
      if (set.size === 0) delete next[key]; else next[key] = set;
      return next;
    });
  }

  function isLocked(dateStr, shift, empId) {
    return !!(lockedSlots[`${dateStr}|${shift}`]?.has(empId));
  }

  function toggleCellEmployee(dateStr, shift, empId) {
    const cellSunday = new Date(dateStr+"T00:00:00");
    cellSunday.setDate(cellSunday.getDate()-cellSunday.getDay());
    if (publishedWeeks.has(dateToStr(cellSunday))) {
      if (!window.confirm("השבוע הזה פורסם לעובדים. לשנות בכל זאת?")) return;
    }
    setSchedule(prev=>{
      const u=JSON.parse(JSON.stringify(prev));
      const list=u[dateStr]?.[shift]||[];
      u[dateStr][shift]=list.includes(empId)?list.filter(id=>id!==empId):[...list,empId];
      return u;
    });
  }

    setEmployees(p=>p.map(e=>e.id===constraintsEmp.id?{...e,maxShifts,maxPerShift,dayConstraints:dayConstraints||{}}:e));

  function deleteEmployee(empId) {
    const emp = getEmployee(empId);
    setEmployees(p => p.filter(e => e.id !== empId));
    setDeletedEmployeeIds(p => new Set([...p, empId]));
    setSchedule(prev => {
      const u = JSON.parse(JSON.stringify(prev));
      Object.keys(u).forEach(date => {
        Object.keys(u[date]||{}).forEach(shift => {
          u[date][shift] = (u[date][shift]||[]).filter(id => id !== empId);

      return u;

    showToast((emp?.name||"עובד") + " הוסר מהמערכת","error");

  function addEmployee(){
    if(!newEmployee.name.trim()){ showToast("נא להזין שם עובד","error"); return; }
    if(!newEmployee.email.trim()){ showToast("נא להזין אימייל","error"); return; }

    const emp={...newEmployee,id:Date.now()};
    setEmployees(p=>[...p,emp]);
    setNewEmployee({name:"",role:"עובד",maxShifts:5,maxPerShift:{},availability:[],preferredShifts:[],email:"",idNumber:""});

    showToast(`${emp.name} נוסף!`);

  // ── "My shifts" for a specific employee ───────────────────────────────────
  const viewingEmp = viewingEmpId ? getEmployee(viewingEmpId) : null;
  const myShifts = useMemo(()=>{
    if (!viewingEmpId) return [];
    return weekDates.flatMap(date=>{
      const dateStr=dateToStr(date);

  return (
    <div dir="rtl" style={{ fontFamily:"'Heebo',sans-serif", minHeight:"100vh", background:"#0F172A", color:"#E2E8F0" }}>

      {/* Modals */}
      {showShiftEditor && <ShiftHoursModal shiftHours={shiftHours} onSave={h=>{setShiftHours(h);setShowShiftEditor(false);showToast("שעות עודכנו ✓");}} onClose={()=>setShowShiftEditor(false)}/>}

      {/* Edit Cell Hours Modal */}
      {editCellHours && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={()=>setEditCellHours(null)}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:16, padding:28, width:360, maxWidth:"92vw", boxShadow:"0 32px 80px rgba(0,0,0,0.6)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ fontWeight:800, fontSize:16 }}>⏰ שעות אישיות</div>
              <button onClick={()=>setEditCellHours(null)} style={{ background:"none", border:"none", color:"#64748B", fontSize:20, cursor:"pointer" }}>✕</button>

              {editCellHours.empName} · {editCellHours.shift} · {new Date(editCellHours.date+"T00:00:00").toLocaleDateString("he-IL")}

                <button onClick={()=>setWeekOffset(0)} style={{ background:"#3B82F6", border:"none", color:"white", borderRadius:8, padding:"8px 16px", cursor:"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:13 }}>השבוע</button>

                <button onClick={()=>setShowShiftEditor(true)} style={{ background:"#1E293B", border:"1px solid #475569", color:"#94A3B8", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:13 }}>⏰ שעות</button>
                <button onClick={runSmartSchedule}
                  style={{ background:"linear-gradient(135deg,#10B981,#059669)", border:"none", color:"white", borderRadius:8, padding:"8px 18px", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:13, position:"relative" }}>
                  ⚡ שיבוץ חכם
                  {availSubmissions.filter(s=>s.weekStart===weekStartStr).length > 0 && (
                    <span style={{ position:"absolute", top:-6, right:-6, background:"#F59E0B", color:"white", borderRadius:"50%", width:16, height:16, fontSize:9, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center" }}>
                      {availSubmissions.filter(s=>s.weekStart===weekStartStr).length}
                    </span>
                  )}
                </button>
                <button onClick={()=>setShowExport(true)} style={{ background:"linear-gradient(135deg,#0F172A,#1E293B)", border:"1px solid #475569", color:"#94A3B8", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:13 }}>📄 ייצוא</button>
                {isPublished
                  ? <button onClick={()=>{setPublishedWeeks(p=>{const n=new Set(p);n.delete(weekStartStr);return n;});showToast("פרסום בוטל");}} style={{ background:"#1E293B", border:"1px solid #10B98166", color:"#10B981", borderRadius:8, padding:"8px 18px", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:13 }}>✓ פורסם — בטל</button>
                  : <button onClick={()=>setShowPublishModal(true)} style={{ background:"linear-gradient(135deg,#6366F1,#4F46E5)", border:"none", color:"white", borderRadius:8, padding:"8px 18px", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:13, boxShadow:"0 4px 16px #6366F133" }}>📢 פרסם</button>
                }
              </div>
            </div>

            {/* Grid */}
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"separate", borderSpacing:4 }}>
                <thead>
                  <tr>
                    <th style={{ width:110, padding:"10px 8px", color:"#64748B", fontWeight:600, fontSize:12, textAlign:"center" }}>משמרת</th>
                    {weekDates.map((date,i)=>{
                      const isToday=dateToStr(date)===dateToStr(new Date());
                      return (
                        <th key={i} style={{ padding:"10px 6px", textAlign:"center", borderRadius:8, background:isToday?"#1E3A5F":"transparent", border:isToday?"1px solid #3B82F6":"none" }}>
                          <div style={{ fontSize:11, color:"#64748B", fontWeight:500 }}>{DAYS[date.getDay()]}</div>
                          <div style={{ fontSize:15, fontWeight:700, color:isToday?"#60A5FA":"#E2E8F0" }}>{date.getDate()}</div>
                        </th>
                      );
                    })}
                  </tr>
                </thead>
                <tbody>
                  {shiftNames.map(shift=>(
                    <tr key={shift}>
                      <td style={{ padding:"6px 4px" }}>
                        <div style={{ background:(SHIFT_COLORS[shift]||"#94A3B8")+"22", border:`1px solid ${SHIFT_COLORS[shift]||"#94A3B8"}44`, borderRadius:8, padding:"8px 6px", textAlign:"center" }}>
                          <div style={{ fontSize:12, fontWeight:700, color:SHIFT_COLORS[shift]||"#94A3B8" }}>{shift}</div>
                          <div style={{ fontSize:10, color:"#64748B" }}>{shiftHours[shift].start}–{shiftHours[shift].end}</div>
                        </div>
                      </td>
                      {weekDates.map((date,di)=>{
                        const dateStr=dateToStr(date);
                        const assigned=schedule[dateStr]?.[shift]||[];
                        const isSelected=selectedCell?.date===dateStr&&selectedCell?.shift===shift;
                        const warnKey=`${dateStr}|${shift}`;
                        const warning=scheduleWarnings[warnKey];
                        return (
                          <td key={di} style={{ padding:"3px", position:"relative" }}>
                            {/* Warning badge */}
                            {warning && (
                              <div title={warning} style={{ position:"absolute", top:5, left:5, zIndex:10, background:"#EF4444", borderRadius:"50%", width:16, height:16, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, cursor:"help" }}>!</div>
                            )}
                            <div onClick={()=>setSelectedCell(isSelected?null:{date:dateStr,shift})} style={{ minHeight:76, background:isSelected?"#1E3A5F": warning?"#EF444408":"#1E293B", border:`1px solid ${isSelected?"#3B82F6":warning?"#EF444444":"#334155"}`, borderRadius:8, padding:"5px", cursor:"pointer", transition:"all 0.15s" }}>
                              {assigned.length===0
                                ? <div style={{ color: warning?"#EF4444":"#475569", fontSize:11, textAlign:"center", marginTop:20 }}>{warning?"⚠ ריק":"ריק"}</div>
                                : assigned.map(empId=>{
                                    const emp=getEmployee(empId);
                                    const color=empColor(getEmpIndex(empId));
                                    const isConflict=conflicts.some(c=>c.empId===empId);
                                    const locked=isLocked(dateStr,shift,empId);
                                    const reasonKey=`${dateStr}|${shift}|${empId}`;
                                    const empReasons=(scheduleReasons[reasonKey]||[]).join(" · ");
                                    return emp?(
                                      <div key={empId}
                                        title={empReasons || emp.name}
                                        style={{ fontSize:11, fontWeight:600, color:"#CBD5E1", background:locked?color+"33":color+"18", border:`1px solid ${locked?color:color+"44"}`, borderRadius:4, padding:"2px 5px", marginBottom:3, display:"flex", alignItems:"center", gap:3, cursor:"default" }}>
                                        <span style={{ width:6, height:6, borderRadius:"50%", background:color, flexShrink:0 }}/>
                                        {emp.name.split(" ")[0]}
                                        {locked && <span style={{ fontSize:9, color:color }}>🔒</span>}
                                        {isConflict&&<span style={{ color:"#F59E0B", fontSize:10 }}>⚠</span>}
                                      </div>
                                    ):null;
                                  })
                              }
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Edit cell */}
            {selectedCell && (
              <div style={{ marginTop:16, background:"#1E293B", border:"1px solid #334155", borderRadius:12, padding:20 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                  <div style={{ fontWeight:700, color:"#94A3B8", fontSize:14 }}>
                    עריכת משמרת — {selectedCell.shift} ({shiftHours[selectedCell.shift]?.start}–{shiftHours[selectedCell.shift]?.end}) | {new Date(selectedCell.date).toLocaleDateString("he-IL")}
                  </div>

                  {scheduleWarnings[`${selectedCell.date}|${selectedCell.shift}`] && (
                    <div style={{ background:"#EF444422", border:"1px solid #EF444455", borderRadius:8, padding:"4px 10px", fontSize:12, color:"#FCA5A5", maxWidth:340 }}>
                      ⚠️ {scheduleWarnings[`${selectedCell.date}|${selectedCell.shift}`]}
                    </div>
                  )}
                </div>

                {/* Currently assigned — with reasons + lock */}
                {(schedule[selectedCell.date]?.[selectedCell.shift]||[]).length > 0 && (
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, color:"#64748B", fontWeight:600, marginBottom:8 }}>משובצים כעת</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                      {(schedule[selectedCell.date]?.[selectedCell.shift]||[]).map(empId=>{
                        const emp=getEmployee(empId);
                        if (!emp) return null;
                        const color=empColor(getEmpIndex(empId));
                        const locked=isLocked(selectedCell.date,selectedCell.shift,empId);
                        const reasonKey=`${selectedCell.date}|${selectedCell.shift}|${empId}`;
                        const reasons=scheduleReasons[reasonKey]||[];
                        return (
                          <div key={empId} style={{ display:"flex", alignItems:"center", gap:8, background:"#0F172A", borderRadius:10, padding:"10px 14px", border:`1px solid ${locked?color:color+"44"}` }}>
                            <span style={{ width:8, height:8, borderRadius:"50%", background:color, flexShrink:0 }}/>
                            <div style={{ flex:1 }}>
                              <div style={{ fontWeight:700, fontSize:13, color:"#E2E8F0" }}>{emp.name}</div>
                              {/* Show custom or default hours */}
                              {(() => {
                                const hKey = `${selectedCell.date}|${selectedCell.shift}|${empId}`;
                                const ch = customEmpHours[hKey];
                                const def = shiftHours[selectedCell.shift];
                                const hasCustom = !!ch;
                                return (
                                  <div style={{ fontSize:11, marginTop:2, color: hasCustom ? "#60A5FA" : "#64748B" }}>
                                    {hasCustom ? "⏰ " : ""}{ch?.start||def?.start}–{ch?.end||def?.end}
                                    {hasCustom && <span style={{ color:"#3B82F6", marginRight:4 }}> (אישי)</span>}
                                  </div>
                                );
                              })()}
                              {reasons.length>0 && (
                                <div style={{ fontSize:11, color:"#64748B", marginTop:1 }}>
                                  {reasons.join(" · ")}
                                </div>
                              )}
                            </div>
                            <button
                              onClick={()=>setEditCellHours({ date:selectedCell.date, shift:selectedCell.shift, empId, empName:emp.name })}
                              title="ערוך שעות אישיות לעובד זה"
                              style={{ background: customEmpHours[`${selectedCell.date}|${selectedCell.shift}|${empId}`] ? "#3B82F622" : "#334155", border:`1px solid ${customEmpHours[`${selectedCell.date}|${selectedCell.shift}|${empId}`] ? "#3B82F644" : "#475569"}`, color: customEmpHours[`${selectedCell.date}|${selectedCell.shift}|${empId}`] ? "#60A5FA" : "#64748B", borderRadius:7, padding:"4px 8px", cursor:"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:11, flexShrink:0 }}>
                              ⏰
                            </button>
                            <button
                              onClick={()=>toggleLock(selectedCell.date,selectedCell.shift,empId)}
                              title={locked?"שחרר נעילה":"נעל שיבוץ"}
                              style={{ background:locked?color+"33":"#334155", border:`1px solid ${locked?color:"#475569"}`, color:locked?color:"#64748B", borderRadius:7, padding:"4px 10px", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:12, flexShrink:0 }}>
                              {locked?"🔒":"🔓"}
                            </button>
                            <button onClick={()=>toggleCellEmployee(selectedCell.date,selectedCell.shift,empId)}
                              style={{ background:"#EF444422", border:"1px solid #EF444455", color:"#FCA5A5", borderRadius:7, padding:"4px 10px", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:12 }}>
                              הסר
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Add employee buttons */}
                <div style={{ fontSize:11, color:"#64748B", fontWeight:600, marginBottom:8 }}>הוסף לשיבוץ</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {employees.filter(emp=>!(schedule[selectedCell.date]?.[selectedCell.shift]||[]).includes(emp.id)).map(emp=>{
                    const onVacation=vacations.some(v=>v.employeeId===emp.id&&v.status==="approved"&&selectedCell.date>=v.startDate&&selectedCell.date<=v.endDate);
                    const color=empColor(getEmpIndex(emp.id));
                    return (
                      <button key={emp.id} disabled={onVacation} onClick={()=>toggleCellEmployee(selectedCell.date,selectedCell.shift,emp.id)}
                        style={{ padding:"7px 14px", borderRadius:8, cursor:onVacation?"not-allowed":"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:12, border:`1px solid ${onVacation?"#334155":color+"55"}`, background:onVacation?"#1E293B":color+"18", color:onVacation?"#475569":color, opacity:onVacation?0.4:1, transition:"all 0.15s" }}>
                        {emp.name} {onVacation?"🌴":""}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Workload */}
            <div style={{ marginTop:20, background:"#1E293B", borderRadius:12, padding:20, border:"1px solid #334155" }}>
              <div style={{ fontWeight:700, fontSize:14, marginBottom:14, color:"#94A3B8" }}>עומס עובדים — השבוע</div>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                {employees.map((emp,idx)=>{
                  const count=totalShifts[emp.id]||0;
                  const pct=Math.min((count/emp.maxShifts)*100,100);
                  const over=count>emp.maxShifts;
                  const color=over?"#EF4444":pct>70?"#F59E0B":"#10B981";
                  const empC=empColor(idx);
                  return (
                    <div key={emp.id} onClick={()=>setViewingEmpId(emp.id)} style={{ flex:"1 1 150px", background:"#0F172A", borderRadius:10, padding:12, cursor:"pointer", border:`1px solid ${empC}22`, transition:"border-color 0.15s" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                        <span style={{ width:8, height:8, borderRadius:"50%", background:empC, flexShrink:0 }}/>
                        <span style={{ fontSize:13, fontWeight:700, flex:1 }}>{emp.name.split(" ")[0]}</span>
                        {over&&<span style={{ fontSize:12 }}>⚠️</span>}
                      </div>
                      <div style={{ height:6, background:"#334155", borderRadius:4, overflow:"hidden", marginBottom:5 }}>
                        <div style={{ height:"100%", width:`${pct}%`, background:color, borderRadius:4, transition:"width 0.5s" }}/>
                      </div>
                      <div style={{ fontSize:11, color:"#64748B" }}>{count}/{emp.maxShifts} משמרות</div>
                      {/* per-shift mini bars */}
                      {shiftNames.filter(s=>emp.maxPerShift?.[s]!=null).map(s=>{
                        const c=shiftTypeCounts[emp.id]?.[s]||0;
                        const lim=emp.maxPerShift[s];
                        const p2=Math.min((c/lim)*100,100);
                        return (
                          <div key={s} style={{ marginTop:4, display:"flex", alignItems:"center", gap:5 }}>
                            <span style={{ fontSize:9, color:SHIFT_COLORS[s]||"#94A3B8", width:28, flexShrink:0 }}>{s}</span>
                            <div style={{ flex:1, height:3, background:"#334155", borderRadius:2, overflow:"hidden" }}>
                              <div style={{ height:"100%", width:`${p2}%`, background:SHIFT_COLORS[s]||"#94A3B8", borderRadius:2 }}/>
                            </div>
                            <span style={{ fontSize:9, color:"#64748B" }}>{c}/{lim}</span>
                          </div>
                        );
                      })}
                      <div style={{ fontSize:10, color:"#475569", marginTop:5 }}>לחץ לפרטים</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ════════════════ EMPLOYEES ════════════════ */}

          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <h2 style={{ margin:0, fontWeight:800, fontSize:22 }}>ניהול עובדים</h2>
              <button onClick={()=>setShowAddEmployee(true)} style={{ background:"linear-gradient(135deg,#3B82F6,#6366F1)", border:"none", color:"white", borderRadius:10, padding:"10px 20px", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:14 }}>+ הוסף עובד</button>
            </div>

            {/* Availability submissions banner */}
            {availSubmissions.length > 0 && (
              <div style={{ background:"#F59E0B18", border:"1px solid #F59E0B44", borderRadius:12, padding:16, marginBottom:14 }}>
                <div style={{ fontWeight:700, fontSize:13, color:"#F59E0B", marginBottom:10 }}>
                  📋 זמינויות שהוגשו ({availSubmissions.length})
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {availSubmissions.map((sub,i) => (
                    <div key={i} style={{ background:"#0F172A", borderRadius:10, padding:"10px 14px", display:"flex", alignItems:"flex-start", gap:10 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:700, fontSize:13, color:"#E2E8F0", marginBottom:4 }}>
                          {sub.empName}
                          <span style={{ fontSize:11, color:"#64748B", fontWeight:400, marginRight:8 }}>{sub.weekStart}</span>
                        </div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                          {sub.slots.map((sl,si)=>{
                            const col=SHIFT_COLORS[sl.shift]||"#94A3B8";
                            return <span key={si} style={{ fontSize:11, color:col, background:col+"18", borderRadius:4, padding:"1px 7px", border:`1px solid ${col}33` }}>{DAYS[sl.day]} · {sl.shift}</span>;
                          })}
                        </div>
                        {sub.note && <div style={{ fontSize:11, color:"#64748B", marginTop:4 }}>💬 {sub.note}</div>}
                      </div>
                      <button onClick={()=>setAvailSubmissions(p=>p.filter((_,idx)=>idx!==i))}
                        title="סמן כנקרא"
                        style={{ background:"#10B98122", border:"1px solid #10B98144", color:"#10B981", borderRadius:7, padding:"3px 8px", fontSize:12, cursor:"pointer", fontFamily:"Heebo", fontWeight:700, flexShrink:0 }}>
                        ✓ קראתי
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Search */}
            <div style={{ marginBottom:16 }}>
              <input value={empSearch} onChange={e=>setEmpSearch(e.target.value)} placeholder="🔍  חיפוש עובד..." style={{ ...SI, width:260 }}/>
            </div>

            {showAddEmployee && (
              <div style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:12, padding:20, marginBottom:20 }}>
                <div style={{ fontWeight:700, fontSize:16, marginBottom:16 }}>עובד חדש</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
                  <div><label style={{ fontSize:12, color:"#94A3B8", display:"block", marginBottom:4 }}>שם מלא *</label><input value={newEmployee.name} onChange={e=>setNewEmployee(p=>({...p,name:e.target.value}))} style={SI} placeholder="ישראל ישראלי"/></div>
                  <div><label style={{ fontSize:12, color:"#94A3B8", display:"block", marginBottom:4 }}>תפקיד</label><select value={newEmployee.role} onChange={e=>setNewEmployee(p=>({...p,role:e.target.value}))} style={SI}><option>עובד</option><option>מנהל משמרת</option><option>חלקי</option></select></div>
                  <div><label style={{ fontSize:12, color:"#94A3B8", display:"block", marginBottom:4 }}>אימייל *</label><input type="email" value={newEmployee.email} onChange={e=>setNewEmployee(p=>({...p,email:e.target.value}))} style={SI} placeholder="name@example.com"/></div>
                  <div><label style={{ fontSize:12, color:"#94A3B8", display:"block", marginBottom:4 }}>תעודת זהות *</label><input value={newEmployee.idNumber} onChange={e=>setNewEmployee(p=>({...p,idNumber:e.target.value}))} style={SI} placeholder="000000000" maxLength={9}/></div>
                  <div><label style={{ fontSize:12, color:"#94A3B8", display:"block", marginBottom:4 }}>מקסימום משמרות/שבוע</label><input type="number" min={1} max={21} value={newEmployee.maxShifts} onChange={e=>setNewEmployee(p=>({...p,maxShifts:parseInt(e.target.value)||1}))} style={SI}/></div>
                </div>
                <div style={{ marginBottom:12 }}>
                  <label style={{ fontSize:12, color:"#94A3B8", display:"block", marginBottom:6 }}>ימי זמינות</label>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>{DAYS.map(day=>(<button key={day} onClick={()=>setNewEmployee(p=>({...p,availability:p.availability.includes(day)?p.availability.filter(d=>d!==day):[...p.availability,day]}))} style={{ padding:"6px 12px", borderRadius:6, border:"none", cursor:"pointer", fontFamily:"Heebo", fontSize:12, fontWeight:600, background:newEmployee.availability.includes(day)?"#3B82F6":"#334155", color:newEmployee.availability.includes(day)?"white":"#94A3B8" }}>{day}</button>))}</div>
                </div>
                <div style={{ marginBottom:16 }}>
                  <label style={{ fontSize:12, color:"#94A3B8", display:"block", marginBottom:6 }}>משמרות מועדפות</label>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>{shiftNames.map(shift=>(<button key={shift} onClick={()=>setNewEmployee(p=>({...p,preferredShifts:p.preferredShifts.includes(shift)?p.preferredShifts.filter(s=>s!==shift):[...p.preferredShifts,shift]}))} style={{ padding:"6px 16px", borderRadius:6, border:"none", cursor:"pointer", fontFamily:"Heebo", fontSize:13, fontWeight:600, background:newEmployee.preferredShifts.includes(shift)?(SHIFT_COLORS[shift]||"#3B82F6"):"#334155", color:"white" }}>{shift}</button>))}</div>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={addEmployee} style={{ background:"#10B981", border:"none", color:"white", borderRadius:8, padding:"10px 20px", cursor:"pointer", fontFamily:"Heebo", fontWeight:700, fontSize:14 }}>שמור</button>
                  <button onClick={()=>setShowAddEmployee(false)} style={{ background:"#334155", border:"none", color:"#94A3B8", borderRadius:8, padding:"10px 20px", cursor:"pointer", fontFamily:"Heebo", fontWeight:600, fontSize:14 }}>ביטול</button>
                </div>
              </div>
            )}

            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 }}>
              {filteredEmployees.map((emp,idx)=>{
                const color=empColor(idx);
                const count=totalShifts[emp.id]||0;
                const over=count>emp.maxShifts;
                return (
                  <div key={emp.id} style={{ background:"#1E293B", border:`1px solid ${color}33`, borderRadius:12, padding:18 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <div style={{ width:36, height:36, borderRadius:10, background:color+"22", border:`1px solid ${color}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:800, color }}>
                          {emp.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
                        </div>
                        <div>
                          <div style={{ fontWeight:700, fontSize:15 }}>{emp.name}</div>
                          <div style={{ fontSize:12, color:"#64748B" }}>{emp.role}</div>
                        </div>
                      </div>
                      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                        {over&&<span title="חריגה ממשמרות" style={{ fontSize:14 }}>⚠️</span>}
                        <div style={{ background:"#0F172A", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:over?"#EF4444":"#94A3B8" }}>{count}/{emp.maxShifts}</div>
                      </div>
                    </div>

                    {/* Constraints summary */}
